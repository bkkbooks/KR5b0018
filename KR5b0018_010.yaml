front:
  text: 太上靈寶元陽妙經卷之十皇十
  hash: sha256:59b28cc57baa78993f00cf591c07ada8a2250a644b225ec87ee8d35ae9780f6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_HFL_010-001a, image: hfl/0169/0169-174.png}
body:
  text: 升大羅品如是我聞一時天尊在蒲林國中樊華樹下元陽宫中與大聖真人大仙道士男女官等百萬人俱前後圍繞爾時天尊剋以七月七日升於大羅上宫思惟入定見威神力放大光明雜色青黃赤白遍照三千大千世界及至十方虛空邊際亦復如是其中所有六趣衆生遇斯光者四垢煩惱一切消除是諸衆生見聞是巳心大憂惱同時舉聲涕泣自相謂言且各裁抑莫大愁苦當共疾往詣元陽官中至天尊所頭靣著地頂禮勸請天尊莫向大羅住此元陽或百年或千載互相執手復作是言世間空虛衆生福盡不善諸業增長我等今當速往天尊不久即去又作是言世間虛空我等從今無有救護無所宗仰貧窮孤露一旦遠離無上天尊設有疑惑當復問誰時有無量諸大聖衆真人大仙道士男女官等及諸清信士清信女遇見天尊光者其身顫掉乃至大動不能自持心昏迷悶恍惚無寧爾時復有松靈真人光妙真人鬱羅真人等百千萬人心得自在所作巳辨離諸煩惱調伏諸根如大龍王有大威德成就空慧逺得己利如栴檀林栴檀圍繞如師子王師子圍繞成就如是無量功德一切皆是天尊弟子各於晨朝日初出時離常住處手執香罏遇天尊光明更相謂言我等冝速澡漱清淨作是言巳舉身毛竪不能自持涕泣盈目生大苦惱為欲利益安樂衆生成就大乘第一空行顯發大道方便密教為不斷絶種種說法為諸衆生調伏因緣故疾至天尊所稽首尊足圍繞百匝稽首恭敬却坐一靣爾時復有道士男官女官男職女職二十四職將領徒衆百千萬人等諸漏巳盡心得自在所作已辨離諸煩惱調伏諸根如大龍王有大威德成就空慧亦於晨朝日初出時舉身毛竪涕泣盈目生大苦惱亦欲利益安樂衆生成就大乘第一空行顯發大道方便密教為不斷絶種種說法為諸衆生調伏因緣故疾至尊所稽首尊足繞百千市稽首恭敬却坐一靣人中之龍位階十地安住不動方便現身其名曰大王納善真人決理真人最勝真人妙思真人大慧真人而為上首其心皆悉敬重大乘安住大乘深解大乘愛樂大乘守護大乘善能隨順一切世間作是誓言諸未度者當今得度巳於過世無數劫中修持淨戒善持所行解未解者紹三寶種使不斷絶於未來世當轉法輪以大莊嚴而自莊嚴成就如是無量功德等觀衆生如視一子亦於晨朝日初出時遇天尊光時舉身毛竪涕泣盈目生大苦惱亦為利益安樂衆生成就大乘第一空行顯發大道方便密教為不斷絶種種說法為諸衆生調伏因緣故疾至尊所稽首尊足繞百千匝稽首恭敬却坐一靣爾時復有無量淸信士女受持五戒威儀具足其名曰威德干吉逺遊董雙成許飛瓊宛陵華等而為上首深樂觀察諸對治門所謂苦樂常淨我無我寶不寶歸依非歸依衆生非衆生恆非恆安非安為無為斷不斷常不常如是觀察等法對治之門亦欲樂聞無上大乘如所聞已能為他說善持淨戒渴仰大乘既自充足復能充足餘渴仰者善能攝取無上智慧愛樂大乘守護大乘善能隨順一切世間度未度者解未解者紹三寶種使不斷絶於未來世當轉法輪以大莊嚴而自莊嚴心常染味淸淨戒行悉能成就如是功德於諸衆生生大悲心平等無二如視一子亦於晨朝日初出時為欲莊嚴道教人人各取香木萬束栴檀沉水牛頭栴檀天木香等是一一木文理及附皆有七寶微妙光明譬如種種雜綵畫飭以道力故有是妙色青黃赤白為諸衆生之所樂見諸木皆以種種香塗鬱金沉水殳膠香等以諸華而為莊嚴衆寶蓮華諸香木上懸五色幡柔軟微妙猶如天衣繡縠繒綵錦綺是諸香木載以寶車是諸寶車出種種光青黃赤白轅輻皆以七寶厠填是一一車駕以駟馬是一一馬駿疾如風一一車前建立五十七寶妙幢真金羅網彌覆其上一一寶車復有五十微妙寶蓋一一車上乘諸華等青蓮華白蓮華紅蓮華金蓮華紺蓮華其華純以真金為葉金剛為臺是華臺中多有黑蜂逰集其中歡娛受樂又出妙音所謂無常苦空無我是音聲中說真人本所道復有種種歌舞伎樂箏笛箜篌蕭瑟鼓吹是樂音中復出是言苦哉苦哉世間虛空一一車前有善男子擎四寶案是諸案上有種種雜華及鬱金諸香及餘薰香微妙第一諸淸信士女若老若少各各運心為天尊及徒衆辦諸食具種種備足皆是栴檀沉水香薪八味之水之所成熟甘食甘美有六種味一苦二酢三甘四辛五鹹六淡復有三德一者輕軟二者淨潔三者如法作如是等種種莊嚴王元陽宫中以黃金遍敷其地繒綵衣物寶蓋以覆地上周偏一宫為天尊徒衆敷置七寶師子之座其座髙大如玉京山是諸座上皆有寶帳垂諸瓔珞悉懸種種微妙幡蓋種種好香用塗其座復以種種名華以散座間諸淸信士女各作是念一切衆生若有飲食衣服頭目肢體隨其所須悉皆給與作是施時離欲瞋恚穢濁毒心無餘思願求世福樂唯志無上清淨法戒是清信士女等皆以安住真人之道復作是念天尊今者受我食巳當向大羅上界捨離我等作是念巳身毛皆竪涕泣盈目生大苦惱各各賫持供養之具載以寶車香水幢幡寶蓋飲食並至尊所稽首尊足以其所持供養之具供養天尊圍繞百匝舉聲號泣哀動天地淚下如雨復相謂言苦哉仁者世間虛空便自舉身投天尊前而白尊言唯願天尊大慈大悲哀憐我等受我等施受我懴悔除我宿愆我等從無始世界百千萬劫來至于今日凡經無量生凡經無量死六欲枷鎖五隂𦆑縳貪愛吝惜惟知造罪不識大乘今籍天尊大乘光明業力各自呵貴自觀巳身如四毒蛇是身常為無量諸蟲之所唼食是身臭穢貪欲獄縳是身可惡猶如死狗是身不淨九孔常流是身如城血肉筋骨皮𠂻其上手足以為却敵樓櫓目為察孔頭為殿堂心王處中如是身城諸善真仙之所棄捨凡夫愚人常所味著貪淫瞋恚愚癡羅剎止住其中是不堅固猶如蘆葦伊蘭水沫芭蕉之樹是身無常念念不住猶如電光卑水幻炎亦如畫水隨畫隨合是身易壞猶如河岸臨峻之樹是身不久當為狐狼鴟裊鵰鷲鳥鵲餓狗之所食噉惟有智者當樂此身寧以牛跡盛大海水不能具說是身無常不淨臭穢寧久大地使如棗等漸漸轉小猶華藶子乃至微塵不能具說是身過患是故當捨如棄涕唾以是因緣諸人士女以空無相無願之法常修其心深樂咨受大乘經典聞巳亦能為他演說護持本願毁訾是身甚患猒不堅牢心常修集如是正觀破壞生死無際輪轉渴仰大乘既自充足復能充足餘渴仰首深樂大乘守護大乘雖現是身實是真仙等類善能隨世間度未度者解未解者紹三寶種使不斷絶於未來世當轉法輪以大莊嚴而自莊嚴堅持禁戒皆悉成就如是功德於諸衆生生大悲心平等無二如視一子皆發是願伏願天尊受我供施容我懴悔久住下界開度衆生授度經典得法益利莫捨我等向於上界譬如父母未象成就忽捨而去無所成就諸子孤劣貧窮失於覆廕天尊還於上方捨我等去亦復如是伏願天尊且住世間成就諸法覆廕我等如此咨請鳴𠰸頓悶大衆哀泣淚下盈目不能自止爾時天尊從其靣門出種種光明其光明曜大衆大衆遇斯光巳即知是事傳相告語天尊今者現是瑞相不久必當反於上界所有供養之具宜施天尊及於大衆松靈真人及大衆等知天尊放是種種光明非無因緣松靈真人等默然良久天尊告松靈真人汝等所奉施天尊及大衆今正是時天尊正爾當欲還上方第二第三亦復如是爾時松靈真人等大衆聞此語巳舉聲號哭悲咽而言苦哉苦哉世間虛空復白大衆我等今者一切當共五體投地同聲勸諸天尊且住下界覆廕我等勿捨我去還於上方爾時天尊告松靈等莫大啼哭自亂各當觀是身猶如芭蕉熱時之炎水泡幻化乾闥婆城壞器電光亦如畫水臨死之囚熟果假肉如織碓上下當觀諸行猶雜毒食有為之法多諸過患於是松靈真人復白天尊言尊不久住於下界我等云何而不啼哭苦哉苦哉世間虛空唯願天尊哀愍我等及諸衆生久住於下方勿返於上界天尊告松靈真人汝今不應發如是哀憐我故久住於下方我以哀憐汝及一切是故今日欲還上界何以故諸尊法爾有為亦然是故天尊而說偈言有為之法其性無常生巳不住寂滅為樂松靈真人汝今當觀一切行新諸法無我無常不住此身多有無量過患猶如水泡是故汝今不應啼泣爾時松靈復白天尊言如是如是誠如尊教雖知天尊方便示現欲還上方捨我等去我等不能不懷憂惱得自思惟復生慶恱天尊讃松靈善哉善哉能知天尊示同衆生方便去來諸法皆如幻相大聖在中以方便力無所染著何以故諸有教化隨方利益欲度脫衆生死老病苦悉皆當得不動果報常受安樂何以故我是衆生良福田故汝若復欲為諸衆生作福田者速辦所施不冝久停爾時松靈為諸衆生得度脫故低頭飮淚而白天尊言善哉善哉我若堪任為福田時則能了知天尊還於上方及非還上方我等今者及諸真人仙人等猶如蚊蚋實不能量天尊還於上方及非還上方爾時松靈真人及其徒衆憂愁啼泣圍繞天尊燒香散花盡心敬奉尋與衆真從座而去共辦食具松靈去後神洲赤懸三界內外地大震動一切衆生聞見知覺天尊還於上方是故此地大動時諸三界內外一切衆生聞是語巳身毛皆竪同聲哀泣而說偈言稽首調御師我等今勸請違離於人仙永無有救護尊今還上方我等沒苦海悲戀懷憂惱如犢失其毋貧窮無救護猶如困病人無醫隨自心食所不應食衆生煩惱病常為諸見害遠離法醫王服食邪毒藥是故大聖仙不應見遺捨如國無君主人民皆飢饉我等亦如是失廕及法味天尊還上方我等心迷亂如彼大地動迷失於諸方大仙向上界我等於今日云何不愁苦天尊見放捨猶如棄涕唾譬如日初出光明甚暉炎既能還自照亦滅一切暗天尊神通光能除我苦惱處在大衆中譬如玉京山天尊言譬如國王生育諸子心常愛念教以仁義忠孝悉令通曉然後聽之不意諸子所習不善王乃棄之天尊告松靈曰我今為法教誨汝等已具正見願莫放捨如其放捨則同王子矣天尊譬如有人善學諸論復於此論而生怖畏天尊亦爾通達諸法而於諸法復生怖畏若使天尊久住於世說甘露味充足一切如是衆生則不復畏墮於地獄天尊譬如有人初學作務為官所收閉之囹圄有人問之汝受何事答言我今受大憂苦若其得脫則得安樂天尊亦爾為我等故修諸苦行我等今者猶未得免生死苦惱云何天尊得受安樂天尊譬如醫王善解方藥偏以祕方教授其子不教其餘外受學者天尊亦爾獨以甚深袐密之藏偏教老子遺棄我等不見顧愍天尊於法應無祕吝如彼醫王偏教其子不教外來諸受學者彼醫所以不能苦教情存勝負故有袐惜天尊之心終無勝負何故如是不見教誨唯願久住莫向上方天尊譬如老少病苦之人捨逺夷途而行險道險道多難備受衆苦更有異人見而愍之即便示以平坦好路天尊我亦如是所言少者譬未增長法身之人所言老者譬重煩惱所言病苦譬未脫生死所言險道譬二十五有准願天尊示導我等甘露正道久住於世勿遠上方爾時天尊告諸法衆汝等莫如凡夫諸天人等愁憂啼哭當勤精進繫心正念時諸天人及大衆等聞天尊所說止不啼哭猶如有人喪其愛子殯送巳訖抑止不哭爾時天尊為諸大衆說是偈言汝等當開意不應大愁苦大道法皆爾是故當默然樂不放逸行守心正憶念逺離諸非法自慰受歡樂復次松靈等若有疑惑今皆當問若空不空若常無常若苦不苦若依非依若去不去若歸非歸若恆非恆若斷非斷若衆生非衆生若有若無若實不實若真不真若滅不滅若密不密若二不二如是等種種法中有所疑者今應咨問我當隨順為汝斷之亦當為汝先說甘露然後乃當還於上方諸大衆等天尊出世歎人身難得值道生信是事亦難能忍是亦復難成就禁戒具足無缺得無上道果是事亦難如求金玉衆寶妙華亦難離於八難得人身難汝等遇我不應空過我於往昔種種苦行今得如是無上方便為汝等故無量劫中捨身手足頭目髓腦是故汝等不應放逸汝等大衆云何莊嚴正法寶城具足種種功德珍寶戒定智慧以為墻塹汝今遇是道法寶城不應取此虛僞之物譬如商主過真寶城取諸瓦礫而便還家汝亦如是值遇寶城取虛僞物汝諸大衆勿以下心而生知足汝等今者雖得出家於此大乘不生貪慕汝諸大衆身雖得服黃褐染衣心猶未染丸乘淨法汝諸大衆雖行乞食經歷多處初未曾求大乘法食汝諸大衆雖復大衆未為正法除諸結縳汝諸大衆今當真實教勑汝等我今見在大衆和合法性真實不倒是故汝等應當精進攝心勇猛摧諸結縳十方慧曰既潜沒巳汝等當為無明所覆諸法衆等譬如大地諸山藥草為衆生用我法亦爾出生妙善甘露法味而為衆生種種煩惱病之良藥我今當令一切衆生及我諸子四部之衆悉皆安住袐密藏中我亦復當安住是中入於上方何等名為袐密之藏猶如三際去來不斷何以故前際不去中際不住後際不來來無所從去無所至上中下亦復如是上不上中不中下不下去不去住不住諸法如是三法各異亦非向於上方汝等應如是觀時到當還上方爾時諸法衆聞天尊定向上方皆悉憂愁身毛為竪涕淚交流稽首尊足繞無量匝白天尊言天尊妙說無常苦空無我天尊譬如一切衆生迹中鳥迹為上是無常想亦復如是於諸想中最為第一若有精勤修習之者能除一切欲界貪愛色無色愛無明驕慢及無常想天尊大聖若離無常想者今則不應向於上方若不離者云何說言修無常想離三界愛無明驕慢及無常想天尊譬如農夫於秋月時深耕其地能除穢草是無常想亦復如是能除一切欲界貪愛色無色愛無明驕慢及無常想天尊譬如耕田秋耕為上如諸迹中鳥迹為勝於諸想中無常為最天尊譬如帝王知將升遐恩赦天下獄囚繫閉悉令得脫然後捨命天尊今者亦應如是度諸衆生一切無知無明繫閉皆令解脫然後向於上方我等今者皆未得度云何天尊便欲放捨向於上方天尊譬如有人為鬼所持遇良呪師以呪力故便得除差天尊亦爾為諸法衆除無明鬼令得安住大善福業譬如香鳥為人所縳雖有良師不能禁制須絶羈鎖自恣而去我未如是脫五十七煩惱繫縛云何天尊便欲放捨向於上方天尊如人病瘧值遇良醫所苦得除我亦如是多諸患苦邪冷熱病雖遇天尊病未除愈未得無上去穩常樂云何天尊欲放捨向於上方天尊譬如醉人不自知不識親踈母女姊妹迷荒淫亂言語放逸卧不淨中時有良師與藥令服服巳即吐還自憶識心懷慙愧深自尅責酒為不善諸惡根本若能除斷則遠衆罪天尊我亦如是往昔巳來轉輪生死情色所醉貪嗜王欲非母母想非姊姊想非女女想於非衆生生衆生想是故輪轉受生死苦如彼醉人卧不淨中天尊今當施我法藥令我還吐煩惱惡酒而來未得醒寤之心云何天尊便欲放捨向於上方天尊譬如有人歎芭蕉樹以為堅實無有是處天尊衆生亦爾若歎我人衆生壽命養育知見作者受者是真實者亦無是處我等如是修無我想天尊譬如漿滓無所復用是身亦爾無我無主天尊如七葉華無有香氣是身亦爾無我無主我等如是心常修習無我之想如尊所說一切諸法無我想汝諸法衆應當修習如是修己則除我慢離我慢巳便向上方天尊譬如鳥迹空中現者無有是處有能修習無我想者而有諸見亦無是處爾時天尊讃諸法衆善哉善哉汝等善能修無我想時諸法衆即白天尊我等不但修無我想亦更修習其餘諸想所謂苦想無常無我想天尊譬如人醉其心眩亂視諸山川城郭宫殿日月星辰皆悉回轉天尊若有不修苦無常想無我等想如是之人不名為聖多諸放逸流轉生死天尊以是因緣我等善修如是諸想爾時天尊告諸大衆言諦聽諦聽汝向所引醉人譬者但知文字未逹其義何等為義如彼醉人見上日月實非回轉生回轉想衆生亦爾為諸煩惱無明所覆生顛倒心我計無我常計無常淨計不淨樂計為苦以為煩惱之所覆故雖生此想不逹其義如彼醉人於非轉處而生轉想我者即是道義常者是法身義樂者上方義淨者是法義汝等法衆云何而言有我想者驕慢嗊嗃流轉生死汝等若我言亦修習無常苦無我等想是三種修無有寶義我今當說勝三修法苦者計樂樂者計苦是顛倒法無常計常常計無常是顛倒法無我計我我計無我是顛倒法不淨計淨淨計不尊是顛倒法有如是等四顛倒法是人不知正修諸法汝諸法衆於苦法中而生樂想於無常中而生常想於無我中而生我想於不淨中而生淨想世間亦有常樂我淨出世亦有常樂我淨世間法者有字無義出世間者有字有義何以故世間之法有四顛倒故不知義所以者何有想顛倒心倒見倒以三倒故世間之人樂中見苦常見無常我見無我淨見不淨是名顛倒以顛倒故世間知字而不知義何等為義無我者即生死我者即天尊無常者聲聞緣教常者天尊法身苦者一切外道樂者即是上方不淨者即有為法淨者諸天尊真人所有正法是名不顚倒以不倒故知字知義若欲遠離四顛倒者應知如是常樂我淨時諸法衆復白天尊言如天尊所說離四倒者則得了知常樂我淨天尊今者永無四倒則巳了知常樂我淨若以了知常樂我淨何故不住一劫半劫教道我等令離四倒而見放捨欲向上方天尊若見顧念教勑我當至心頂受修習天尊若當向上方者我等云何與是毒身同共止住修於梵行我等亦當隨天尊向於上方爾時天尊告諸法衆汝等不應作如是語我今所有無上正法悉以付囑老君是老君者當為汝等作大指歸猶如天尊為諸衆生作指歸處老君亦復如是當為汝等作指歸處譬如大王多所統領若遊巡時悉以國事付囑大臣天尊亦爾所有正法亦以付囑老君汝等當知先所修智無常苦想非是真實譬如春時有諸人等在大池浴乘船遊戲失琉璃寶珠沒深水中是時諸人悉共入水求覔是寶競捉瓦石草木沙礫各各自謂得琉璃珠歡喜持出乃知非真是時寶珠猶在水中以珠力故水皆澄清於是大衆乃見寶珠故在水下猶如仰觀虛空月形是時衆中有一智人以方便力安徐入水即便得珠汝等法衆不應如是修習無常苦無我想不淨想等以為實義如彼諸人各以瓦石草木沙礫而為寶珠汝等應當善學方便在在處處常修我想常樂淨想復應當知先所修習四法相貌悉是顛倒欲得真實修諸想者如彼智人巧出寶珠所謂我想常樂淨想爾時諸法衆白天尊言如天尊先說諸法無我汝當修學修學是巳則離我想離我想者則離驕慢離驕慢者得向上方是義云何天尊告諸法衆善哉善哉汝今善能咨問是義為自斷疑譬如國王暗鈍少智有一醫師性復頑囂而王不別厚賜俸䘵療治衆病純以乳藥亦復不知病起根源雖知乳藥復不善解風泠熱病一切諸患悉教服乳是王不别是醫知乳好醜善惡復有明醫曉八種術善療衆病知諸方藥從遠方來是時舊醫不知咨受反生嗊嗃輕慢之心彼時明醫即便依附請以為師咨受醫方袐奧之法語舊醫言我今請仁以為師範唯願為我宣暢解說當醫答言卿今若能為我給便四十八年然後乃當教汝醫法時彼明醫即受其教我當如是我當如是隨我所能常給走使是時舊醫即將客醫共入見王是時客醫即為王說種種醫方及餘伎藝大王當知應善分别此法如是可以治國此法如是可以療病爾時國王聞是語巳方知舊醫癡暗無智即便驅逐令出國界然後倍復恭敬客醫是時客醫作是念言欲教王者今正是時即語王言大王於我實受念者當求一願王即答言從此右臂及餘身分隨意所求一切相與彼客醫言王雖許我一切身分然我不敢多有所求今所求者願王宣令一切國內從今巳往不得復服舊醫乳藥所以者何是藥毒害多傷損故若故照者當斬其首斷乳藥巳絡無復有橫死之人常處安樂故求是願時王答言汝之所求蓋不足言尋為宣令一切國內凡諸病人皆悉不聽以乳為藥若為藥者當斬其首爾時客醫和合衆樂謂辛苦鹹甜酢等味以療衆病無不得差其復不久王復得病即命是醫我今病困當云何治醫占王病應用乳藥尋白王言如王所患應當服乳我於先明所斷乳藥是非實語今若服者最能除病王今患熱正當服乳時王語醫汝今狂邪為熱病乎而言服乳能除此病汝先言毒今云何服欲欺我邪先醫所讃汝言是毒令我驅遣今復言好最能除病如汝所言我本舊醫定為勝汝是時客醫復語王言王今不應作如是語如蟲食木有成字者此蟲不知是字非字智人見之終不唱言是蟲解字亦不驚怪大王當知舊醫亦爾不別諸病悉與乳藥如彼蟲道偶得成字是先舊醫不解乳藥好醜善惡時王問言云何不解客醫答王是乳藥者亦是毒害亦是甘露云何是乳復名甘露若是乳牛不食酒糟滑草麥戮其犢調善放牧之處不在髙原亦不下濕飮以清水不令馳走不與犢牛同共一群飲食調適行住得所如是乳者能除諸病是則名為甘露妙藥除是乳巳其餘一切皆名毒害爾時大王聞是語巳讃言大醫善哉善哉我從今日始知乳藥善惡好醜即便服之病得除愈尋時宣令一切國內從今巳往當服乳藥國人聞之皆生瞋恨咸相謂言大王今者為鬼所持為是狂邪而誑我等復令服乳一切人民皆懷瞋恨悉集王所王言汝等不應於我而生瞋恨如此乳藥服與不服悉是醫教非是我咎爾時大王及諸人民踊躍歡喜倍共恭敬供養是醫一切病者皆服乳藥病原闕太上靈寶元陽妙經卷之十終
