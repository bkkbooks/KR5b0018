front:
  text: 太上靈寶元陽妙經卷之九皇九
  hash: sha256:11dec35deca52ccba2042906a6921018cb73c2560f320ff0ccb12b4c85750b2f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_HFL_009-001a, image: hfl/0169/0169-130.png}
body:
  text: 德行髙貴品爾時元始天尊告元陽真人言善男子善女人若有能修行供養無上元陽妙經得於十種功德不可恩議聞者驚疑非隱非顯非去非來非生非滅非難非易非相非非相如是法相無有形貌世間所無何等為十種功德一者有五何等為五一者所未聞者而能得聞二者既聞玄妙能為利益三者能斷諸疑體於至理四者智慧之心質直無曲五者深知元陽袐藏是為五事何等所未聞者而能得聞所謂甚深玄妙之義一切衆生俱得道性一切經法無有差別若有善男女至心願念所營在法究竟得入無上正真之道常住無變恆無懈退非有為非無為非有漏非無漏非色非不色非空非不空非名非不名非相非不相非有非不有非因非不因非果非不果非明非不明非暗非不暗非出非不出非常非不常非斷非不斷非過去非不過去非未來非不未來非因緣非不因緣如是等法甚深甚妙甚玄甚奧昔所未聞而令得聞苦所未見而令得見所謂一切經書所謂一切方法所謂一切伎藝所謂一切科律如是等經昔未曾聞今於此經而得了悟復有三清祕要七部神圖如是深奧之義今因此經而得知之善男子善女人是名所未聞者而能得聞既得聞巳是大利益若能讀誦受持具自然道意能具知一切方法大乘經典甚深義味譬如有人懸於明鏡見其色像曉了分明無有障蔽元陽寶鏡亦復如是真人執持得見元陽經典深奧之義亦如有人處於暗室執大炬火悉見諸物元陽法烥亦復如是真人執持得見元陽深奧之義亦如日出睗谷有大光明悉能照朗令得一切遠見虛空是大元陽清淨慧日亦復如是照了幽冥深遽之處令一切衆生遠見真道所以者何以能聽受是元陽上品妙經皆獲無上道果善男子若有至心讀誦元陽微妙經典得知一切諸法名諱通達玄義為他廣說開悟凡夫能知元陽諸法至理善男子其聽受者雖知元陽經字不知元陽義理深妙若能書寫授持讀誦為人演說開導沉迷令知其義則能知其義是大利益增長法橋復次善男子聽此經者聞有道法未能得見至心願念即得悟解書寫讀誦為人演說尋思其義則得見之聽是元陽經者聞有神通未能得見發心願念至慕神仙作是念巳便能知法具諸道意了逹道源於諸天魔惡鬼虎狼毒獸怖畏之處得無所畏開示分别玉簡金文丹章紫字演說其義無有差違不從他聞而能自知無上正真道意是名聞巳能為利益又復除疑心者疑有二種一者疑名二者疑義聽是經者斷除疑心思惟義者斷疑義心復次善男子疑有五種一者疑道虛空有指的不二者疑道恍惚是真常不三者疑道隱祕是真樂不四者疑道幽玄是清淨不五者疑道顯晦是實義不聽是經者則得永斷疑惑之心書寫讀誦為人演說思惟其義五疑永斷復次善男子疑有三種一疑無上正真之道為有為無二疑三十六部尊經為有為無三疑一切妙法為有為無聽是經者如是三疑永滅無餘書寫讀誦為他廣說思惟其義則能了知一切衆生悉有法性復次善男子若有衆生不聞如是元陽經典疑心甚多所謂如常不常如樂不樂如淨不淨如我無我如命非命如凡夫非凡夫如究竟不究竟如未來非未來若有若非有若苦若非苦若樂若非樂若道若非道若滅若非滅若法若非法若真若非真聽是經者如是諸惑悉能除斷復以善男子若有不聞如是經者復有種種衆生多有疑心所謂色是我邪受質相因識是我邪眼能見邪我能見邪乃至識能知邪我能知邪色受報邪我受報邪乃至識受報邪我受報邪色至他境邪我至他境邪乃至識亦如是生死之法有始有卒邪無始無卒邪聽是經者如是等疑亦得永斷復有人疑邪見犯四盟科作五逆罪毁謗道經如是等人有法性邪無法性邪聽是經者如是等疑悉得永斷復有人疑世間有際邪世間無際邪有十方法界邪無十方法界邪聞是經者如是衆疑亦能除斷是名斷疑惑之心復次善男子慧心正直無邪曲者意若有疑則所視不正一切衆生若不得聞是元陽上品微妙經典所見邪疑乃至下仙悟道之人猶懷邪曲云何名為一切衆生所見邪曲於有漏中見常樂我淨於天尊所見無常苦不淨無我見有凡夫壽命長短非有相處非無相處以為元陽之宮有八聖道有見斷見如是等見名為邪曲善男子善女人若得聞是大乘經典修行聖道則得斷除如是邪曲云何名為一切邪曲若復有人書寫讀誦為他演說通解其義則得正直無邪曲見善男子修如是元陽上品經典知此經微妙從無量劫來至心修行晨夕願念得入無上正真之道復次善男子能知元陽上品深密之義為他演說曉悟衆生悉能知道除謗法心盡惡逆罪然後得成無上正真道果是名甚深袐密之義復次善男子云何復名甚深之義雖知衆生實無有我而於未來不失業果雖知六情於此滅盡善惡之業終不敗亡雖有業根不得作者雖有妙處無有去者雖有執縳無受縳者雖有劫濁終無滅者是名元陽德行髙貴甚深袐奧之義爾時元陽真人上白天尊言如向所說聞不聞義是義不然何以故道若有者便應定有道若無者便應定無無不應生有有不應滅無如我所聞是則為聞若不聞者則為不聞云何而言聞所不聞天尊若不可聞是為不聞若巳聞者則便不聞何以故巳得聞於道故云何而言聞所未聞見所未見譬如去者至則不去去則不至亦如生巳不生亦如聞巳不聞天尊若不聞聞者一切衆生未有道心即應有之未得尸解亦應得之未見法性應見法性云何復言真人雖有法性未得明了天尊若不聞者真人往昔曉悟從誰得聞若言得聞何故真人於天尊所復言不聞若其不聞真人何以得稟無陽之號若如是者一切衆生不聞經典亦得稟元陽之號不真人若當不聞如是經典見無上道者一切衆生不聞是經亦應得見無上正真道不天尊言是色者或可見或不可見響亦如是或是可聞或不可問是大變動非色非聲云何而言可得見聞真人於是了然驚悟言過去巳滅則不可聞未來未至亦不可聞見在聽時則不名聞聞巳聲滅更不可聞亦非末來過去見在若非三世則不可說若不可說則不可聞云何而言真人修是元陽妙經聞所不聞爾時天尊歡喜讃歎元陽真人及諸大衆言善哉善哉汝今深知妙理洞達玄微一切諸法如幻如化如風如電亦如泡沫芭蕉之樹空無有實非命非我無有真相時大衆中倏欻之頃有大光明遍照國境非青非黃非白非黑爾時大衆遇斯光巳身心快樂譬如真人初得道果爾時元陽真人白天尊言今此光明從何而有天尊默然不答元陽真人心懷戰懼逡巡不安叩頭稽首瞻視靈顏輒敢咨問天尊以何因緣有此光明照於大衆天尊默然不答爾時無鞅數衆浮空道士見此明朗自相謂言今此光明誰之所有天尊又復默然不說明律仙人總持法衆復白天尊以何因緣有此盛光遍照虛空無有障蔽如是大衆自相咨問無能曉者爾時元陽真人殷勤慊款頭腦至地泣淚和聲低心下意咨審尊顏願垂開示曉悟來生天尊於是含笑告元陽真人曰如是光明名為智慧智慧者即是真道真道之法無有因緣云何有問有何因緣故有是光明是光明者名為元陽妙法元陽妙法者則名為真道真道之法不從緣生云何仙人疑問何因緣故有是光明是光明者即是元始智慧元始智慧者即是真道之法不從緣生云何道士問於因緣光明者名為大慈大悲大慈大悲者名為元陽真道元陽真道之法者不從緣生云何仙人問於緣生光明者即是思真念道思真念道者是名真道之法不從緣生云何仙人問於因緣光明者即是一切學道之人吞精咽氣吐納服御之法即名真道真道之法不從因緣云何仙人問於因緣光明者即是元陽上品法燈天尊言真人汝今莫入諸法粗穢之義我今於此東方恆河世界名曰不動之處國土緬平無有沙磧其地七寶莊嚴無有溝坑其諸樹木華果茂盛無時不有若有衆生聞其華香身心清淨曉悟大乘譬如仙士獲於道果復有一大河水其水香美八味具足若有衆生在中浴者皆得清淨了然悟道其河有種種之華種種之香一切衆生聞其華香皆得清淨釋然悟道復有無量虎狼獅子諸惡鳥獸其心相視猶如赤子彼世界中一切衆生無有犯負之者毁謗道法及有惡逆等罪其土調適無有瘴癘煩惱貪欲嫉妬之人無有日月晝夜時節猶如龍漢之運其土人民聰明正直無有憍慢之心一切衆生皆悉悟道具大功德其心悉皆尊重正法修於大乘愛樂大乘思念大乘護惜大乘功行成遂得大總持心常憐愍一切衆生復有達解真人光妙音深曉元陽正教調御天人師隨其處所宣告衆生無不得聞為十方至真大聖衆講說如是大乘經典善男子及諸眷屬若能修行大乘元陽妙經所不聞者皆能得聞無上要道西方去此二十恆河沙國土彼有世界名曰大堂國土多有山陵岡阜沙礫荆棘周遍充滿其土人民常有飢渴四時苦惱恆無歡泰為其愚癡不能恭敬求於正道貪著非法之緣於非法緣中習行邪法不信正道壽命短促常行奸詐王法持之王雖有國不知滿足於他所有生貪利心與兵相伐枉死者衆國王尋行如是非法諸天神祗心無歡喜故降災旱五榖不登人民飢餓多有疾病國土不寧達解真人光妙音調御天人師愍念衆生遊行世界於其國土化作七寶香林種種莊嚴種種神變種種竒麗與諸總持大聖獨步仙人演說元陽上品妙經開發衆生令解智慧歸依無上正真之道其土人民聞說是經各各驚疑人人嗟訝以何因緣忽聞聖人微妙經典從何而來我今歡喜得遇真道爾時達解真人光妙音與七千四百真仙春屬俱持幡蓋華香種種枝樂種種莊嚴供養之具至於極樂土中鶱林寶樹之間巳用所持供養之具供養元始天尊稽首恭敬左繞三匝恭敬巳畢却退一面天尊問逹解真人光妙音及諸善男子等汝為至來為不至來真人光妙音白天尊言至亦不來不至亦不來我觀此義都無有來天尊諸行若常亦復不來若是無常亦無有來若人見有衆生性者有來不來我今不見衆生定性云何當言有來不來有輕慢者見有去來無輕慢者則無去來有取行者見有去來無取行者則無去來若見真人畢竟無上道者則有去來不見真人畢竟無上道者則無去來不聞道性者則有去來聞道性者則無去來若見狐疑下仙之人則有去來不見狐疑下仙之人則無去來若見真人無常樂我淨則有去來若見真人有常樂我淨則無去來天尊且置斯事敢有咨問願垂哀愍少見聽許天尊言善男子隨汝所問今正是時我當為汝次第分别一一解說曉悟諸疑所以者何諸法難見千載因緣有遇靈文三淸七部何由可見汝等應當精進專心聽受爾時逹解真人光妙音元陽真人等既蒙聽許兼被教戒即白天尊言云何真人有能修行元陽上品聞所不聞爾時天尊答言善哉善哉善男子汝今受持元陽妙經復值我能善為講說汝今有所疑滯我為大醫王為汝剖判深疑汝於道性猶未明了我有法炬能為照明汝今欲濟煩惱大河我能為汝作於舟揖汝於我所生父母想我亦於汝生赤子心汝心今者貪正法寶諦聽諦聽善思念之吾當為汝次第開張使無疑滯真人善男子欲聽法者今正是時若得聞法當生恭敬至心讀誦尊重正法於其法所莫求其過莫念貪欲瞋恚愚癡莫覩法師縱性行惡既聞經巳莫生輕慢莫為貪求名譽利養當為度世甘露法藥莫生憎愛起於疑心我聽法巳先自度身然後濟人先自悟身然後悟人先自安身然後安人於道法之中應生念想於生死中生大苦想於道法之中應生常樂我淨之想當為大乘莫為小見於一切法當無所住亦莫專執一切法相於諸法中莫生貪想常生知法見法之想善男子必須精進讀誦如是經典則能永出生死苦海登於慈善之岸汝冝遵奉不得起疑惑之心真人光妙音稽首禮問元始天尊言有漏之法若有生者為是常耶是無常耶生若是常有漏之法則典有生生若無常即有漏是常天尊若生自生生無自性若能生他以何因緣不生無漏天尊若未生時有生者云何於今名為生若未生時無生者何故不說虛空為生耶於是天尊告諸大衆善哉善哉善男子深達法相具了道源不生生不可說生生亦不可說生不生亦不可說不生生何以故以修道得故云何生亦不可說以生無故云何不生不可說以有得故云何有因有因緣故亦得說十因緣法為生作因以是義故故亦可得說善男子汝今莫入甚深空定何以故大衆鈍故善男子有為之法生亦是常以住無常生亦無常住亦是常亦生生故住亦無常以本無今壞亦無常善男子以性故生皆悉是常念念滅故不可說常是正真之道能除滅故名無常善男子有漏之法未生之時己有生性故生能生無漏之法本無生性是故生不能生如火有本性遇緣即發眼有見性因色乃明故見一切衆生生法亦復如是由其有性遇感因緣父母和合便則有生爾時達解真人光妙音元陽真人及七千四百萬衆聞是經巳心懷踴躍恭敬殷戁叩頭稽首齊執玉板敢問元始天尊言今蒙故誨宣暢泠然元陽袐藏始得悟解聞所不聞亦令七千四百萬衆深解諸法不生生等天尊我今巳解斷諸疑網然此衆中有一真人名曰真定光復欲咨問唯願垂許爾時天尊告真定光善男子隨意問難吾當為汝分别解說於是真定光與諸徒衆俱從座起更整衣冠長跪稽首而白天尊言此土衆生當造何業而得生彼不動世界其土真人云何而得智慧成就人中之尊有大威德具修諸行利智捷疾聞則能解爾時天尊而說偈言一切諸衆生皆含至道性若能受妙經即登常樂淨布施及衆生救濟諸貧病斷除疑惑心調和於識鏡思念元陽經晨夕常歌詠從容出九天逍遙登八正善神相擁護天真悉暉映既得離三災復能超九橫書寫及受持當須勤苦行憐愍善男女成使終天命輪轉成高真因緣偶賢聖今日得苦空永息於馳競天尊說此偈巳一切時衆咸皆醒悟更無疑滯爾時元陽真人真定光白天尊言我今巳知所造業因得生彼國是元陽髙貴之品憐愍一切衆生上所咨問天尊演此妙法則能利益安樂人天爾時天尊即告元陽真人善哉善哉善男子汝今於此當須至心聽吾分别一一解說有因緣故未至不至有因緣故不至至有因緣故至善男子夫不至至者是大元陽高貴之品凡夫未至以有貪欲瞋恚愚癡故身口意業不清淨故及受一切不淨物故犯五逆罪謗真善法故是義故未至不至善男子夫不至至者以無貪欲瞋恚愚癡身口惡故不受一切不淨物故不犯四重故不謗無上道故不作邪疑心故不作五逆罪故以是因緣名至不至善男子以何因緣故名至不至至者名為二十五有一切衆生常為無量煩惱諸結之所覆蔽往來不捨猶如輪轉是名為至為欲濟度諸衆生故示現在中亦名為至善男子何因緣故名為至至至者即是二十五有一切凡夫煩惱因緣故名至至善男子聞所不聞亦復如是有不聞聞有不聞有聞聞云何不聞聞善男子不聞者名大元陽之品何故不聞非有為故非音聲故不可說故云何亦聞得聞名故所謂常樂我淨以是義故名不聞聞爾時元陽真人一切時衆稽首長跪白天尊言如天尊所說元陽髙貴袐密之義不可得聞云何復言常樂我淨而可得聞何以故天尊斷煩惱者名為元陽髙貴之品若未斷者名為不得以是義故元陽髙貴之品本無今有若世間法本無今有則名無常譬如汝等本無今才巳有還無故名無常元陽髙貴之品若爾云何說言常樂我淨復次天尊凡因莊嚴而得成者悉名無常元陽髙貴之品若爾應是無常何等因緣所謂三十六部尊經三清祕藏七部真書如是等法皆是成就一切因緣故名無常復次天尊才名無常若元陽髙貴之品是有亦應無常如天尊昔於元始之先說諸妙經皆有變化以是義故名為無常復次天尊可見之法名為無常如昔所說元陽髙貴之品則得斷除一切煩惱復次天尊譬如虛空於諸衆生等無障礙故名為常若使元陽髙貴是常何故衆生有得有不得元陽髙貴若爾於諸衆生不平等者則不名常天尊譬如百人共有一怨若害此怨則多人受樂若使元陽髙貴是平等法一人得時應多人得一人斷結應多人亦斷若不如是云何名常譬如有人恭敬三寶供養經書尊重讃歎晨夕不倦國王王子父毋師長則得利養是不名常元陽高貴亦爾不名為常何以故如天尊昔於元始之運演說此經告元陽真人言若有人能恭敬讀誦此經則得斷結受無量樂以是義故不名為常天尊若於元陽中有常樂我淨名者不名為常如其無者云何可說爾時天尊告逹解真人曰元陽之體非本無今有若元陽之體本無今有者則非無漏常住之法有道無道性相常住以諸衆生煩惱覆故不學真道便謂為無元陽真人以戒定慧勤修其心斷煩惱巳便得見之當知真道是常住法非本無今有是故為常善男子如暗室中種種七寶人亦知有暗故不見有智之人善知方便燃大明燈持往照朗皆得無之是人於此終不生念種種七寶本無今有真道亦爾昔自有之非始今也煩惱暗故衆生不見大智真人以善方便燃智慧燈令諸大衆得見真道常樂我淨是故智者於此真道不應說言本無今有如是大衆汝言因莊嚴故成真應無常者是亦不然何以故如是大衆真道之體非生非出非實非虛非作業生非是有漏才為之法非聞非見非墮生死非別異相亦非同相非往非還非因非果以是義故真道是常恆不變易是以無量劫中修習善法以自莊嚴皆得了見如是大衆譬如地有八味之水一切衆生而不能得才慧之人用功穿鑿則便得水真道亦爾譬如盲人不覩日月良醫療之而能得見如是日月非是今有真道亦爾昔來有之非在今也善男子如人有罪繫之牢獄久乃得出還家得見六親眷屬真道亦爾如是大衆汝言因緣故真道之法應無常者是亦不然何以故善男子因有五種何等為五一者生因二者和合因三者住因四者增長因五者逺因云何生因生因者即是種種煩惱種種狐疑及諸草木子是名生因云何和合因如善與善心和合不善與不善心和合無記與不記心能和合是名和合因云何住因如下有住屋則不傾山河樹木因大地故而得住立何有四大無量煩惱衆生得住是名住因云何增長因因緣服玩飲食等具故今衆生增長如諸種子火所不燒鳥所不食則得增長如諸道士四衆男女等依於真人善能之者而得增長如因父毋子得增長是名增長因云何逺因譬如天尊往昔劫時演說此經為諸來生作大因緣所有疑滯皆能除洗是名遠因又如父母血氣為衆生遠因如時節等名為遠因善男子真道之體非如是等五因所成云何當言是無常因復次善男子復有二因一者作因二者了因何等為作因如陶師輪繩是為作因如燈燭照暗中物是名了因善男子元陽髙貴經者不從作因而有唯有了因了因者所謂明了元陽上品深奧義味為諸來生作大舟楫作大橋梁作大因緣作大福田令諸時衆皆得無上正真道果爾時元陽逹解真人光妙音稽首上白元始天尊曰既蒙訓誨開導衆生種種方便種種宣說委曲教化子細讃揚過泰之歡實為無量然由宿滯尚才狐疑不鄙卑陋輕觸靈顏叩頭上啓更有咨問天尊未審一切衆生修何功德免離哀憂修何布施可得富饒修何福田可得豐足發何志願可得道真天尊曰如人種樹為得隂涼為得花果及以材木若人修行心力專精默念洞思自然廣作功德布施窮乏貧賤之人慈念衆生恩愛萬物不惜珍寶所營在法修如是行則能深解妙法成於真道能為一切衆生斷除業障善男子譬如有人墮大海水抱持死尸則得度脫真人修無上道行布施時亦復如是如彼死尸善男子譬如有人閉在深獄門户堅牢唯有厠孔便從中至無礙處真人修無上道行布施時亦復如是善男子譬如貴人恐怖急危更無恃怙發心願念元陽經者皆得安穩真人修無上道者行於布施亦復如是善男子及諸時衆汝等當知元陽祕藏即是無上正真之道若能按經修行晨夕願念於家别立精舍方丈之室燒香供養積年不退如此精誠皆獲自然之果見世得免憂危煩惱之患爾時元陽真人及諸大衆神仙眷屬七千四百萬衆一時稱善而作偈言真道體靈妙至法甚冲玄祕跡紫微宫曜景大羅天玄都至學士清虛常自然轡鵠遊碧漠策鳳往青煙金閣禮大聖玉戶會髙賢元陽時四衆偶此大因緣三淸既啓蘊七部己相傳開發深疑滯晚悟昔憂煩一切善男子皆得淨身田逍遙四正道放曠九華巔蕭聲出雲外梵響度風前偶逢元始運不謝上皇年調御天人師割我恩愛纒損絶諸疑網瞋癡遂乃捐四衆稽首慶辭謝大神仙今日蒙開度願卒大慈憐元陽真人及諸時衆說偈都畢一時恭敬作禮而去太上靈寶元陽妙經卷之九
