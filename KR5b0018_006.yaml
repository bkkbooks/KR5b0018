front:
  text: 太上靈寳元陽妙經卷之六皇六
  hash: sha256:2db2051fd34337727e0cfa7c500ae69828fe14aa26c6d15250140ac3ff4be722
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_HFL_006-001a, image: hfl/0169/0169-004.png}
body:
  text: 觀行品中爾時元陽妙樂眞人與諸天大衆神仙眷屬八萬四千童子俱㑹元陽世界設大髙座香華伎樂幡幢寳蓋萬種羅列徧滿虚空一時剖析玄微元陽祕藏得使來生男女咸聞聖教天尊於是發大慈悲動諸光相演說微宻經典開悟衆生如世間知者我亦得知世間不知者我亦悉知甚義云何善男子一切世間不知不見不覺道性若有知見知覺道性者不名世間名爲眞人世間凡夫亦復不知不見不覺三十六部尊經三十六種因縁元陽上品觀行之義若能知見覺者不名世間當名眞人善男子是名世間不知見覺云何世間所知見覺所謂造化之法主世界終始斷常二見說言初心至非非想名爲眞道善男子是名世間所知見覺眞人童子於如是事亦知見覺眞人如是知見覺巳若言不知不見不覺是爲虛妄虚妄之法則爲是罪以是罪故墮於地獄若男若女説言無道當知是軰則名爲外魔之親屬名爲毀謗道法如是毀謗法者名謗天尊如是之人即墮三惡道中非人之類受諸苦報爾時妙樂眞人及諸法衆聞是事巳即以讃歡而作偈言恩愛愍衆生爲義說元陽善拔衆毒箭故稱大醫王世醫所療治雖差還復傷天尊所治者究竟得无殃聖人甘露樂是諸神妙漿衆生旣服巳不死亦不亡天尊今爲説剖析隱宻章衆生聞袐藏即登自在場妙樂眞人説是偈巳即啓天尊如尊所說一切世間不知見覺元陽童子悉能知見覺者若使元陽童子是世間者不得說言世間不知不見不覺唯是元陽童子能知見覺若非世間有何異相天尊言善男子言眞人童子者亦是世間亦非世間不知見覺者名爲世間知見覺者不名世間汝言有何異者我今當說善男子若男若女若有初聞是元陽上品觀行妙經即生敬信發无上正眞大道之心是則名爲世間童子一切世間不知見覺如是童子亦同世間不知見覺覺子聞是經巳知有世間不知見覺應是童子所知見覺知是事巳即白思惟我當云何方便修習得知見覺復念念言唯當至心修持法戒善男女以是因縁於未來世在處常无驕慢邪見疑綱終不說言天尊畢竟入於玄妙是名眞人修持戒行行旣清浄次修眞法故在生處正念不忘所謂一切衆生悉有道性三十六部尊經天尊眞人常樂我浄一切眞人童子悉見道性如是等事憶而不忘因修定故得十二空是名眞人童子修清浄法戒法戒巳備次修浄慧以修浄慧故所受持法戒牢固不動善男子譬如玉京之山不爲四風之所摇動眞人童子亦復如是不爲四倒之所傾動善勇子眞人爾時自知見覺所持法戒無有傾動是名眞人所知見覺非世間也善男子眞人所持法戒牢固不動心無悔恨故心得歡喜得歡喜故心得悦樂得悅樂故心得安穩心安穩故得无動定得无動定故得實知見得實知見故猒離生死猒離生死故便得自在得自在故明曉道性是名眞人所知見覺非世間也善男子是名世間不知見覺而是眞人所知見覺妙樂眞人復言云何元陽童子修持法戒心无悔恨乃至明了見於法性天尊言善男子世間戒者不名清淨何以故世間戒者爲於有故性不定故非畢竟故不能廣爲一切衆生以是義故名爲不淨以不淨故有悔恨心以悔恨心故心無歡喜无歡喜故則无恱樂无恱樂故則无安吉无安吉故无不動定无不動定故无實知見无實知見故則无猒離无猒離故則无解脱无解脫故不見法性不見法性故終不能得无上大道之果是名世間法不清淨善男子眞人童子清淨法者法非法故非爲有故定畢竟故爲衆生故是名眞人法清淨也善男子眞人童子於法戒中雖不欲生无悔恨心無悔恨心故自然而生善男子譬如有人執持明鏡不期見靣靣像自現亦如農人散種良田不期生芽而芽自生亦如燃燈不期滅闇而闇自滅善男子眞人童子能持法戒无有悔恨之心自然而生亦復如是以淨法故心得歡喜善男子如端正人自見面貌心生歡喜能持法戒者亦復如是善男子破法戒之人見法戒不淨心不歡喜如形殘跛陋者自見形像靣貌不生歡恱破法戒之人亦復如是善男子譬如牧牛有二人一持酪缾一持漿缾俱共詣市而欲賣之於路脚跌二缾俱破一則喜恱一則愁惱持戒破法亦復如是能用心恭敬持淨法戒者心生歡恱心生歡恱故則便思惟天尊諸法中說有能持淸淨法戒者則得眞道我今修習如是法戒亦應得之以是因縁心則歡樂元陽眞人復言喜之與樂有何差别善男子不作惡時名爲喜恱心持法戒名之爲樂善男子觀於生死則名爲喜見於法相名之爲樂下名爲喜上名爲樂離諸共法名之爲喜得不共法名之爲樂以汝戒淨故形貌輕柔口无麤過眞人童子爾時若見若聞悉无諸惡以无惡故心得安穩以安穩故則得静定得靜定故得實知見得實知見故猒離生死猒生死故則得逍遥得逍遙故得見法性見法性故得於眞道是名眞人童子清淨持於法戒非世間法戒何以故善男子所受持清淨法戒五法佐助云何爲五法佐助一者信二者慙三者愧四者善知識五者宗敬眞法離五蓋故所見清淨離五見故心無疑滯離五疑故云何名五疑一者疑道二者疑法三者疑眞四者疑戒五者疑不放逸眞人爾時即得五根所謂信念精進定慧得五根故得五種眞法謂色道遥乃至識逍遙是名眞人童子清淨持戒非世間有也善男子是名世間之所不知見覺而是眞人所知見覺善男子若我弟子受持讀誦元陽上品經有破戒者有人呵貴輕賤毀辱而作是言若元陽眞藏大乘經典有威力者云何今汝毁謗所受法戒若人受持元陽妙經毁禁戒者當知是經爲无威力若无威力雖復讀誦爲无利益若是輕毁元陽經故今无量无邊衆生墮於地獄受持是經而毀戒者則是衆生大惡知識非我弟子是諸邪魔眷屬如是之人我亦不聽受微妙經典不以毀戒謗法受持修習善男女若我弟子中有人能精進受持讀誦書冩演說元陽袐藏大乘經者當正身心愼莫調戲輕躁舉動口爲調戲心爲輕動求有之心名爲輕動身造諸業名爲調戲若我弟子中求有造業不應受持是元陽經品微妙之義若是受持經者人當輕呵而作是言若天尊袐藏大乘經有威力者云何令汝求有造業若受持經者求有造業當知是輕爲有威力若无威力雖復受持讀誦爲无利益縁是輕慢元陽經故復令无量无邊衆生墮於三塗地獄受持讀誦是經求有造業則是衆生大惡知識非我弟子是邪魔親屬復次善男子若我弟子中有人讀誦書冩演說大乘經義莫非時說莫非法說莫不淨説莫輕心說莫滅道法説莫熾然法說善男子若我弟子受持是經非時而説乃至熾然世法説者人當輕呵而作是言若元陽祕藏大乘經有威力者云何令汝非時而説乃至識然世法而說若持經者作如是說當知是經爲无威力若无威力雖復讀誦爲无利益縁是輕慢大乘經故令无量衆生墮於地獄受持是經非時而說乃至熾然世法而說則是衆生大惡知識非我第子是魔眷屬善男子若欲受持讀誦者說大元陽經者說法性者說大乘袐藏者說神仙經者說童子得道者說逍遙解脫者見法性者先當清淨其身浄故則无呵責无呵責故令无量人於元陽經生清淨心恭敬讀誦受持是經若聞一偈一句一字嗟歎歡喜爲人演說開悟衆生便得无上正眞大道之心當知是人則是衆生眞善知識是我弟子非爲外魔眷屬是名眞人也善男子善女人是名世間之所不知不見不覺而是眞人知見覺復次善男子云何名一切世間所不知見覺而是眞人所知見覺所謂六念處何等爲六一者念天尊二者念眞人三者念童子四者念法戒五者念道士六者念慈悲善男子云何念天尊聖人應正徧知明行足善逝世間解无上士調御天人師常不變易具足威力身无所畏畢竟清淨到於彼岸无能勝者无見傾者无有怖畏不驚不恐无侣无師自悟疾知大智利智深智解脫智成就人王調御天人師爲大施主爲大法師以知法故名大法師以知義故名大法師以知時故名大法師以知足故名大法師以知我故名大法師知衆生種種性故名大法師知一切衆生諸根利鈍中故名大法師說元陽妙道故名大法師復次妙樂眞人上白天尊言云何爲應天尊答曰世間之法悉名怨家法應害故故名爲應夫四魔者是善男子怨天尊爲善男子時能以智慧破壞四魔是故名應復次應者名爲逺離爲善男子時應當逺離无量煩惱故名爲應復次應者名樂過去天尊爲善男子時雖於无量劫爲衆生故受諸煩惱終无不樂而常樂之天尊亦爾是故名應又復應者一切人天應以種種香華伎樂而供養之故名爲應云何正徧知正者名不顚倒徧知者於顚倒中无不通逹又復正者名爲苦行徧知者知因苦行定有苦果又復正者名世間中徧知者畢竟定知修習中道得於无上正眞之果又復正者名爲可數可量徧知者不可數不可量是故號天尊爲正徧知善男子假使眞乘於无量劫觀一色不除不能盡知以是義故无有徧知云何明行足明者名得无量善果行名脚足善果者名無上正眞之道是故名爲明行足又復明者名呪行者名吉足者善男子是名世間義呪者名爲解脫吉者名爲无上正真之果是故名爲明行足又復明者名光行者名業足者善男子是名世間義光者名不放逸業者皆得自在之果又復明者名爲三明云何爲三明一者眞人明二者天尊明三者无明明眞人明者即是自然之果天尊明者即是慧眼无明明者即是畢竟空行者於无量劫爲衆生故修諸善業足者明見法性以是義故名明行足云何善逝善者名髙逝名不髙善男子是名世間義髙者名爲无上正眞大道不髙者即是天尊心也善男子心若髙者不名天尊是故天尊名爲善逝又復善者名爲善知識善男子是名世間義善知識善知識者即是初發心果名爲元陽上品天尊不捨最初發心得大妙經是故天尊名爲善逝善男子是世間義名見法性得深妙理善男子眞道之性實非有也天尊因世間故説言是有善男子譬如有人實无有人實無有子謬稱有人實无有道德謬言有道德眞法亦爾因世間故謬言是有眞人成无上道故名善逝云何名无上士上士者名之爲斷无所斷者名无上士天尊眞人无有煩惱故无所斷是故號天尊爲无上士又上士者名爲闘爭无上士者无有闘爭聖人无爭故號天尊爲无上士又上士者名語可壞无上士者語不可壞天尊所言一切衆生所不能壞是故號天尊爲无上士又上士者名爲上座无上士者爲无上座三世聖人更无過者是故號天尊爲无上士爾時妙樂眞人心復有疑諮問天尊云何調御大丈夫天人師天尊答曰一切眞人童子若能修於四法則名大丈夫天人師何等爲四一者依善知識修學眞法二者心能聽法深解妙意三者思惟玄義无有疑難四者遵於法戒行能伏物善男子具是四法則名大丈夫无此四法則不名爲大丈夫何以故身雖是丈夫心懷諂曲意有邪婬是故不得稱爲大丈夫天尊威力能調伏衆生令知正法是故號曰調御大丈夫天人師復次善男子諮問天師云何謂調御天人師天尊曰師有二種一者善教二者惡教我今以善法教諸衆生何等善法謂身口意善哉今教諸衆生作如是言善男子汝當遠離身不善業何以故以身惡業是可遠離得自在是故我以此法教汝若此惡業不可逺離得自在者終不教汝令逺離也若諸衆生離惡業巳墮三惡道者无有是處以能遠離成无上正眞之果是故我今常以此法教化衆生口意亦爾是故號曰天人師復次昔未得道今以悟解以所得道爲衆生説從本巳來未修善行今以修竟以所修爲衆生説自破无明復爲衆生破滅无明自得淨眼復爲衆生破除肓𡨕令得浄眼自知二智演說二智旣自解悟復爲衆生說解悟法自度无量无邊生死大海復令衆生皆悉度脱自得无礙復教衆生令无怖畏自得无上正眞之道復爲衆生演說無上正眞之道是故號天尊爲調御天人師復次善男子心又生疑輙敢諮問云何名天答曰天者名晝晝長夜短是故名天又復天者名无愁惱常受歡樂是故名天又復天者名爲燈明能破黑闇而爲大明是故名天亦以能破惡業黑暗得諸善業而生天上是故名天又復天者名吉以吉禎故得名爲天又復天者復名爲日日有光明故名日爲天以是義故名爲天也人者名爲能多恩義又復人者身口清香又復人者名有傲慢又復人者能破傲慢善男子我今雖爲一切衆生无上調御師而經中說爲天人師何以故善男子諸衆生中唯天與人能發自然道意修十善業能得无上正眞大道之果是故號我爲天人師復次善男子諮問天尊疑心未盡更有諮請云何名爲大道天尊答曰道者名通旣自通曉復能通佗善男子譬如有人通知有賊賊无能爲眞人童子能通一切无量煩惱旣通子巳令諸煩惱无所能爲是故名道爲通以是通故不生不老不病不死是名眞道善男子當知我道法中有大吏兵天騶甲卒天丁力士能收邪魔惡鬼一切煩惱盡皆消伏又能成就諸善法故有大威力徧十方故又能種種大布施故又於无量劫中不毁壞故善男子若男若女能如是念道者若行若住若坐若卧若晝若夜若明若闇常得不離見諸眞道善男子何故名爲眞道應正徧知乃至眞人童子而有如是无量功德大名稱耶善男子具人於昔无量劫中恭敬父母師長於无量劫常爲衆生而行布施堅持禁戒修集忍辱勤行精進眞定智慧大慈大悲是故今得七十二相八十種好眞金之體又復眞人童子於昔无量劫中修習信念進定慧根於諸師長供養朝拜當爲法利不爲苦害眞人童子若持三十六部尊經若讀若誦若講若說常爲衆生令得逍遙解脫无爲安穏歡樂終不自爲何以故眞人常修出世間心無取捨心元繫縳心无生死心无疑網心无貪欲心无瞋恚心无愚癡心无驕慢心作如是心巳皆得清淨深曉道源无穢濁意无煩惱意无苦意无量意无廣大意无空虚意无世間意常自在意常解脫意无報意无願意善願意无語意柔軟意不住意不退意无常意正直意无曲意淳善意如是意巳故得无所畏常樂我淨是故修无上正眞大道之心是故眞人童子之果云何眞人童子念法善男子思惟諸法所可說法最妙最上因是法故能令衆生得見在果唯此正法无有時節天明所見非肉眼見然不可以譬喻爲比不生不出不住不滅不始不終不去不來不動不轉不長不短永斷諸樂而安穩樂畢竟微妙非色斷色而亦是色乃至非識斷識而亦是識非業斷業而亦是業非結斷結而亦是結非界斷界而亦是界非有斷有而亦是有非出斷出而亦是出非入斷入而亦是入非因斷因而亦是因非果斷果而亦是果非眞斷眞而亦是眞作是觀行即能體逹苦空成於妙道復次非虚非實斷一切實而亦是實非生非滅永斷生滅而亦是滅非相非非相斷一切相而一是相非教非不教而亦是教非怖非不怖斷一切怖而亦是怖非忍非不忍永斷一切忍而亦是忍如是一切法永能除一切煩惱永能消息清淨无相永斷諸相无量衆生畢竟住處能斷一切生死熾然乃是天尊所遊居魔常不變易是名眞人童子念法云何念法諸天眞人如法而住不可破壞无能撓害不可思議一切衆生橋梁福田雖爲福田无所受取清淨无穢无惡其意調和平等一心无有二見常不變易无有撓觸是名念法云何念戎真人童子思惟有戒不破不犯不壞不雜雖无形色而可護持雖无觸對善修方便可得具足无有過咎眞人童子之所讃歎皆獲无量妙因善男子若能修持淨界一切劫盗不敢撓害火不能焚水不能漂若修是戒得自然之果則得无上正眞大道之心當爲一切衆生廣說妙法而作救護是名眞人我念戒云何念施眞人深觀此施乃是无上正眞大道之因諸善男子親近修集如是布施我亦如是親近修習若不惠施不能莊嚴供養四部之衆施雖不能畢竟斷結而能除破見在煩惱以施因縁故常爲十方无量无邊恒河沙數世界衆生之所讃歎善男子施衆生食則施其命以是果報得道之時常不變易以施樂故成道之時則得安樂童子施時如法求則不侵彼施此是故成道得清淨之果眞人施時令諸衆生不求自得是故成道得自然果我以施因縁令他得力是故成道得二種施因縁令他得語是故成道得三種善根眞人童子修習此施爲无上因我亦如是修習布施爲眞善因是名念施云何念天有九天神仙處乃至非想非非想多聞布施智慧得九天神仙處乃至得非想非非想處我亦有分然非我欲何以故九天神仙處乃至非想非非想處皆是无常以無常故生老病死以是義故非我所欲譬如幻化誑於愚夫智慧之人所不惑著如幻化者即是九天神仙處乃至非想非非想處愚者即是一切凡夫我則不同凡夫愚人我曾聞有第一義天謂諸眞人童子常不變易以清浄常住故不生不滅不老不病不死我爲衆生精勤志求第一義天何以故第一義天能令衆生除齗煩惱猶如意樹若我有信乃至有慧則能得是第一義天是名眞人念天善男子是名眞人非世間也是爲世間不知見覺而是眞人所知見覺善男子若我弟子謂受持讀誦書冩演說元陽上品微妙袐藏經典及以受持讀誦書冩敷演解說大乘經教等無差異者是義不然何以故善男子元陽經者即是一切諸天眞人神仙甚深祕藏以是諸天眞人甚深袐藏是則爲勝善男子以是義故元陽妙經甚竒微妙不可思議妙樂眞人白天尊言我今亦知元陽妙經甚竒微妙不可思議道法尊髙不可思議眞人童子亦不可思議以何義故復言眞人不可思議善男子无有教者而能自發无上道心旣發心巳勤修精進正使大火焚燒身首終不求救捨念法心何以故眞人童子常自思惟我於無量劫中或在三塗地獄畜生之中天上人間爲諸劫火所燒初未曾得一決定法決定法者即是无上正眞大道之因終不護惜身心與命我今爲无上正眞大道正使碎身猶如微塵終不放捨勤修精進也何以故勤精進心即是无上正眞大道之因善男子如是眞人未見无上正眞大道乃能如是不惜身命況復見巳是眞人不可思議又復眞人童子所見生死无量无邊諸惡過患非是一切邪魔所及雖知生死无量无邊諸惡過患爲衆生故於中受苦不生猒離是故復名不可思議眞人童子爲衆生故雖在地獄受諸苦惱託跡同凡故名受苦不可思議善男子譬如長者其家失火長者見巳從舍而出諸子在後未脫火難長者爾時定知火害爲諸子故旋還救護不見其難眞人童子救護衆生亦復如是雖知生死多諸過患爲衆生故處之不猒是故復名不可思議善男子无量无邊一切衆生發自然道意見生死中多諸過患心即退悔歛閉六情絶除五欲修於妙道思念眞經是故復名不可思議善男子若有唱言我能浮度大海如是之言不可思議不天尊曰如是之言或可思議或不可思議何以故若人度者則不可思議如妄言度者即名可思議善男子我令所說論其實録必无虛謬天尊言人中亦有可思議者不可思議者天尊曰人有二種一者聖人二者凡人凡夫之人則不可思議賢聖之人則可思議善男子我說凡夫不說聖人天尊曰若凡夫之人實不可思議善男子凡夫之人實不能度大海水也而是眞人實能度彼生死大海是故復名不可思議善男子若有人能將藕絲曵懸王京山者可思議不天尊曰善男子於一念頃悉能稱量一切生死是故復名不可思議善男子我於无量劫中常觀生死无常无樂无淨而爲衆生分別演說常樂我淨雖如是說然非邪見是故復名不可思議善男子如人入水水不能溺入猛火火不能燒如是之事不可思議眞人童子亦復如是雖處生死不爲生死之所惱害是故復名不可思議善男子人有三品謂上中下云何名爲上中下下品之人初入胞時作是念言我今在厠衆穢歸處諸死屍間棘剌叢林大幽闇中初出胎時復作是念我今岀厠諸穢惡處乃至岀於大幽闇中中品之人作是念言我今入於衆樹果林清淨河中閨閤宫宅出時亦爾上品之人作是念言我昇殿堂在騫林間乘於駿馬登上高山出時亦爾眞人童子初入胎住時知住出時知岀不起貪欲瞋恚之心而未得初住之地是故復名不可思議善男子元陽上品袐宻奥藏實不可思議不可以譬喻爲比善男子心亦不可譬喻比量眞人童子无有師資受學之處而能得是元陽上品甚深意義得此法巳心无慳恡常爲衆生而演說之是故名不可思議善男子有身逺離非口有口遠離非身有非身口而亦逺離身逺離者謂殺盗婬是名身逺離非口口逺離者謂離妄語談毀經論惡口赤舌諂曲誹謗是名口逺離非身非身口亦逺離者所謂逺離貪嫉惡妬瞋恚邪見善男子是名非身非口而能逺離善男子不見一法是身是業一切過患是諸惡業而能逺離是故復名不可思議口亦如是善男子從身離身從口離口從惡離惡從業離業非身非口悉能除洗是名逺離善男子无有一法能壊能作有爲法性異生異滅是故此慧不能逺離善男子慧不能破火不能燒水不能溺風不能動地不能持生不能生老不能老住不能住壤不能壤貪不能貪瞋不能瞋癡不能癡以有爲性易生易滅故眞人童子終不生念我以此慧破諸煩惱而自説言我破煩惱雖作是説非是虛妄是故復名不可思議妙樂眞人白天尊言今者始知眞人童子深曉法藏不可思議道法微妙元陽經藏及受持者披析至理功德深重不可思議天尊曰无上道者住當人近幾時而滅善男子若元陽祕要有四種觀行云何爲四一者觀身常淨不染穢惡二者觀心常定无有異想三者觀諸法中无有我相四者觀於萬物一想平等是爲四種觀行我弟子有能受持讀誦書冩演說其義爲諸衆生之所恭敬尊重讚歎種種供養當知爾時道縁未滅善男子若元陽經具足流布當爾之時我諸弟子多犯禁戒造作衆罪不能敬信如是微妙經典以不信故不能受持讀誦書冩解説其義不爲衆人之所恭敬乃至供養見受持者輕毁誹謗是爲慢法非我弟子當知是人將滅不久妙樂眞人復白天尊言我親從聖人受如是經義云何爲一慢法誹謗道法即當滅乎天尊曰聖人隱形託跡變見无方非是慢法而能毁謗應滅身乎若如是義云何爲理若其无者无者說言聖人過去善男子如是之義今當重説至心諦聽有二種法云何二種法一者世法二者第一義法世法可求第一義法則不可求復有二種云何二種一者无常无我无樂无淨二者常樂我淨无常无我无樂无淨則有顯晦常樂我淨則无顯晦復有二種法云何二種法一者外二者内外法者則有可顯内法者則无可顯復有二種云何二種一者有爲二者无爲有爲之法則有可得无爲之法則無可得復有二種云何名爲二種一者可得二者不可得可得之法則有始終不可得法則元始終善男子若我弟子受持讀誦書冩解說元陽經典恭敬供養尊重讃歎晨夕禮拜思念神仙當知爾時道法興盛无有終始善男子汝尚所聞眞人童子有是經不善男子元陽經者悉是一切聖人祕藏何以故天尊雖說如是經典不說法性不說天尊常樂我淨一切眞人不畢究妙道是故此經名爲元陽祕宻之藏三十六部尊經所不說故故名爲藏如人七寳不出外用名之爲藏善男子是人所以藏積實物爲未來事故何等未來事所謂飢年積榖狂賊侵境值遇惡首爲用贖命道路艱難財寳得時乃當出賑善男子諸天尊袐宻之藏亦復如是爲未來世諸惡道士畜不淨物爲四衆説天尊畢竟无有滅神虛費供養不敬經典如是等惡見於世時天尊爲欲滅是諸惡令得逺離邪見有能供養天尊則爲演說是經若是經典袐宻之藏无不見時爾時道法興盛善男子元陽經典常不變易云何難言元始之時有此經不善男子元始之時所有人民悉皆淳善智慧滋多雖復志性未曉眞道身心清淨調柔易化有大威徳總持不退善男子今世衆生貪慾辱重多諸煩惱愚癡喜忘无有智慧多諸疑綱信根不立世界不淨一切衆生咸謂聖人无常遷變畢竟人於眞道是故天尊演說如是經典善男子聖人之法實亦不盡何以故常不變故善男子若有衆生我見无我无我見我常見无常无常見常樂見无樂无樂見樂淨見不淨不淨見淨眞見不眞不眞見眞道見非道非道見道生見非生非生見生滅見非滅非滅見滅昧道之語名爲魔語實是魔語以爲眞語如是巧黠種種詭誑當知此人墮三惡道不見善因萬劫沉溺无有生期善男子寜說以索繫縳猛風不敢説言眞道盡昧寜言大火之中生大蓮華不敢說言眞道昧寜說月可令熱日可令冷不敢說言眞道昧善男子若眞人初出得元陽微妙无上正眞大道之果未有弟子解甚深義而聖人隱形變化當知是法長久住世復次善男子若眞人初得大道之果巳有諸弟子解甚深義聖人雖復變化當知是法久住於世復次善男子若眞人初出得大道之果雖有弟子解甚深義无有篤信白衣忠良之人敬重道法聖人過去當知是法長久住世復次善男子若眞人初出得於道果巳有諸弟子解深義味多有篤信俗人敬重道法聖人過去當知眞道久住於世復次善男子若眞人初出得大道之果巳有諸弟子解甚深義雖有篤信俗人敬重道法而諸弟子演說經時貪爲利益雖復如此終爲過去當知此法長久住世復次善男子若眞人初岀得大道之果巳有諸弟子解甚深義復有忠信俗人敬重道法彼諸弟子凡所演說不貪利益度脫衆生令歸正法雖復如此終爲誘引當知是法久住於世復次善男子若眞人初得道果巳雖有弟子解甚深義復有忠信白衣清信之人敬重神仙心念道法而諸弟子多起爭訟互相是非聖人過去當知是人不久住世復次善男子若眞人初出得於妙果有諸弟子解甚深義復有敬信凡人尊重道法彼諸弟子修和敬法不相是非逓相愛重聖人雖復過去當知是法久住不息復次善男子若眞人初得道果雖有弟子解甚深義復有敬信凡人尊重妙法彼諸弟子爲一切衆生演說元陽妙法互相恭敬不起爭訟然去一切不淨之物復自讚言我今必定得於道果聖人過去當知此法常當住世善男子若眞人初得正眞道果巳有諸弟子解甚深義復有中信凡人愛重道法彼諸弟子能說元陽袐藏甚深經法善修和敬互相尊重不去一切不淨之物亦不自言須於妙果聖人過去當知此法久住於世善男子汝等當知諸法无有定相不可測量不可忖度何以故隨衆生受性利鈍業根受識有麤有妙善男子我今慈念衆生无有偏恩貴賤之心无有人我貪著之心是故我今平等一相无有二邊善男子譬如良醫爲病服藥隨其病根應病與藥天尊觀諸衆生煩惱病根方便教化令知經戒修於正法我今救度衆生除煩惱業令得清淨无復遺餘汝今當知聖人久住於世非是過去元有休息爾時元陽世界神仙眷屬皆得明了无有疑滯妙樂眞人旣得總持深解妙理於是歡喜讃歎恭敬禮拜左繞七帀而說偈言大道體玄妙至理甚希夷寄名眞實相隨運應明時開度諸衆主號曰天人師是能合妙藥爲世作良醫剖析元陽教袐宻實可思八萬諸徒衆皆得附光威三塗悉解脫五苦永停悲罪䰟皆得返餓鬼悉充飢神仙乃交映珠玉自相暉䇿鳯徃玄都乘鸞上紫微衆生旣曉悟无爲信可期今日蒙恩愛福作永巍巍諸天盡歡樂稽首辭退歸太上靈寳元陽妙經卷之六
