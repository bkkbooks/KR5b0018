front:
  text: 太上靈寶元陽妙經卷之六皇六
  hash: sha256:d100cea1f3411671fbf4487d510a29e145337ec3b6023d04eaddf378ae00ab7e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_HFL_006-001a, image: hfl/0169/0169-004.png}
body:
  text: 觀行品中爾時元陽妙樂真人與諸天大衆神仙眷屬八萬四千童子俱㑹元陽世界設大髙座香華伎樂幡幢寶蓋萬種羅列遍滿虛空一時剖析玄微元陽祕藏得使來生男女咸聞聖教天尊於是發大慈悲動諸光相演說微密經典開悟衆生如世間知者我亦得知世間不知者我亦悉知甚義云何善男子一切世間不知不見不覺道性若有知見知覺道性者不名世間名為真人世間凡夫亦復不知不見不覺三十六部尊經三十六種因緣元陽上品觀行之義若能知見覺者不名世間當名真人善男子是名世間不知見覺云何世間所知見覺所謂造化之法主世界終始斷常二見說言初心至非非想名為真道善男子是名世間所知見覺真人童子於如是事亦知見覺真人如是知見覺巳若言不知不見不覺是為虛妄虛妄之法則為是罪以是罪故墮於地獄若男若女說言無道當知是輩則名為外魔之親屬名為毀謗道法如是毀謗法者名謗天尊如是之人即墮三惡道中非人之類受諸苦報爾時妙樂真人及諸法衆聞是事巳即以讃歡而作偈言恩愛愍衆生為義說元陽善拔衆毒箭故稱大醫王世醫所療治雖差還復傷天尊所治者究竟得無殃聖人甘露樂是諸神妙漿衆生既服巳不死亦不亡天尊今為說剖析隱密章衆生聞袐藏即登自在場妙樂真人說是偈巳即啓天尊如尊所說一切世間不知見覺元陽童子悉能知見覺者若使元陽童子是世間者不得說言世間不知不見不覺唯是元陽童子能知見覺若非世間有何異相天尊言善男子言真人童子者亦是世間亦非世間不知見覺者名為世間知見覺者不名世間汝言有何異者我今當說善男子若男若女若有初聞是元陽上品觀行妙經即生敬信發無上正真大道之心是則名為世間童子一切世間不知見覺如是童子亦同世間不知見覺覺子聞是經巳知有世間不知見覺應是童子所知見覺知是事巳即白思惟我當云何方便修習得知見覺復念念言唯當至心修持法戒善男女以是因緣於未來世在處常無驕慢邪見疑綱終不說言天尊畢竟入於玄妙是名真人修持戒行行既清淨次修真法故在生處正念不忘所謂一切衆生悉有道性三十六部尊經天尊真人常樂我淨一切真人童子悉見道性如是等事憶而不忘因修定故得十二空是名真人童子修清淨法戒法戒巳備次修淨慧以修淨慧故所受持法戒牢固不動善男子譬如玉京之山不為四風之所搖動真人童子亦復如是不為四倒之所傾動善勇子真人爾時自知見覺所持法戒無有傾動是名真人所知見覺非世間也善男子真人所持法戒牢固不動心無悔恨故心得歡喜得歡喜故心得悅樂得悅樂故心得安穩心安穩故得無動定得無動定故得實知見得實知見故猒離生死猒離生死故便得自在得自在故明曉道性是名真人所知見覺非世間也善男子是名世間不知見覺而是真人所知見覺妙樂真人復言云何元陽童子修持法戒心無悔恨乃至明了見於法性天尊言善男子世間戒者不名清淨何以故世間戒者為於有故性不定故非畢竟故不能廣為一切衆生以是義故名為不淨以不淨故有悔恨心以悔恨心故心無歡喜無歡喜故則無恱樂無恱樂故則無安吉無安吉故無不動定無不動定故無實知見無實知見故則無猒離無猒離故則無解脫無解脫故不見法性不見法性故終不能得無上大道之果是名世間法不清淨善男子真人童子清淨法者法非法故非為有故定畢竟故為衆生故是名真人法清淨也善男子真人童子於法戒中雖不欲生無悔恨心無悔恨心故自然而生善男子譬如有人執持明鏡不期見靣靣像自現亦如農人散種良田不期生芽而芽自生亦如燃燈不期滅暗而暗自滅善男子真人童子能持法戒無有悔恨之心自然而生亦復如是以淨法故心得歡喜善男子如端正人自見面貌心生歡喜能持法戒者亦復如是善男子破法戒之人見法戒不淨心不歡喜如形殘跛陋者自見形像靣貌不生歡恱破法戒之人亦復如是善男子譬如牧牛有二人一持酪瓶一持漿瓶俱共詣市而欲賣之於路腳跌二瓶俱破一則喜恱一則愁惱持戒破法亦復如是能用心恭敬持淨法戒者心生歡恱心生歡恱故則便思惟天尊諸法中說有能持淸淨法戒者則得真道我今修習如是法戒亦應得之以是因緣心則歡樂元陽真人復言喜之與樂有何差别善男子不作惡時名為喜恱心持法戒名之為樂善男子觀於生死則名為喜見於法相名之為樂下名為喜上名為樂離諸共法名之為喜得不共法名之為樂以汝戒淨故形貌輕柔口無粗過真人童子爾時若見若聞悉無諸惡以無惡故心得安穩以安穩故則得靜定得靜定故得實知見得實知見故猒離生死猒生死故則得逍遙得逍遙故得見法性見法性故得於真道是名真人童子清淨持於法戒非世間法戒何以故善男子所受持清淨法戒五法佐助云何為五法佐助一者信二者慙三者愧四者善知識五者宗敬真法離五蓋故所見清淨離五見故心無疑滯離五疑故云何名五疑一者疑道二者疑法三者疑真四者疑戒五者疑不放逸真人爾時即得五根所謂信念精進定慧得五根故得五種真法謂色道遙乃至識逍遙是名真人童子清淨持戒非世間有也善男子是名世間之所不知見覺而是真人所知見覺善男子若我弟子受持讀誦元陽上品經有破戒者有人呵貴輕賤毀辱而作是言若元陽真藏大乘經典有威力者云何今汝毁謗所受法戒若人受持元陽妙經毁禁戒者當知是經為無威力若無威力雖復讀誦為無利益若是輕毁元陽經故今無量無邊衆生墮於地獄受持是經而毀戒者則是衆生大惡知識非我弟子是諸邪魔眷屬如是之人我亦不聽受微妙經典不以毀戒謗法受持修習善男女若我弟子中有人能精進受持讀誦書寫演說元陽袐藏大乘經者當正身心愼莫調戲輕躁舉動口為調戲心為輕動求有之心名為輕動身造諸業名為調戲若我弟子中求有造業不應受持是元陽經品微妙之義若是受持經者人當輕呵而作是言若天尊袐藏大乘經有威力者云何令汝求有造業若受持經者求有造業當知是輕為有威力若無威力雖復受持讀誦為無利益緣是輕慢元陽經故復令無量無邊衆生墮於三塗地獄受持讀誦是經求有造業則是衆生大惡知識非我弟子是邪魔親屬復次善男子若我弟子中有人讀誦書寫演說大乘經義莫非時說莫非法說莫不淨說莫輕心說莫滅道法說莫熾然法說善男子若我弟子受持是經非時而說乃至熾然世法說者人當輕呵而作是言若元陽祕藏大乘經有威力者云何令汝非時而說乃至識然世法而說若持經者作如是說當知是經為無威力若無威力雖復讀誦為無利益緣是輕慢大乘經故令無量衆生墮於地獄受持是經非時而說乃至熾然世法而說則是衆生大惡知識非我第子是魔眷屬善男子若欲受持讀誦者說大元陽經者說法性者說大乘袐藏者說神仙經者說童子得道者說逍遙解脫者見法性者先當清淨其身淨故則無呵責無呵責故令無量人於元陽經生清淨心恭敬讀誦受持是經若聞一偈一句一字嗟歎歡喜為人演說開悟衆生便得無上正真大道之心當知是人則是衆生真善知識是我弟子非為外魔眷屬是名真人也善男子善女人是名世間之所不知不見不覺而是真人知見覺復次善男子云何名一切世間所不知見覺而是真人所知見覺所謂六念處何等為六一者念天尊二者念真人三者念童子四者念法戒五者念道士六者念慈悲善男子云何念天尊聖人應正遍知明行足善逝世間解無上士調御天人師常不變易具足威力身無所畏畢竟清淨到於彼岸無能勝者無見傾者無有怖畏不驚不恐無侣無師自悟疾知大智利智深智解脫智成就人王調御天人師為大施主為大法師以知法故名大法師以知義故名大法師以知時故名大法師以知足故名大法師以知我故名大法師知衆生種種性故名大法師知一切衆生諸根利鈍中故名大法師說元陽妙道故名大法師復次妙樂真人上白天尊言云何為應天尊答曰世間之法悉名怨家法應害故故名為應夫四魔者是善男子怨天尊為善男子時能以智慧破壞四魔是故名應復次應者名為逺離為善男子時應當逺離無量煩惱故名為應復次應者名樂過去天尊為善男子時雖於無量劫為衆生故受諸煩惱終無不樂而常樂之天尊亦爾是故名應又復應者一切人天應以種種香華伎樂而供養之故名為應云何正遍知正者名不顚倒遍知者於顚倒中無不通逹又復正者名為苦行遍知者知因苦行定有苦果又復正者名世間中遍知者畢竟定知修習中道得於無上正真之果又復正者名為可數可量遍知者不可數不可量是故號天尊為正遍知善男子假使真乘於無量劫觀一色不除不能盡知以是義故無有遍知云何明行足明者名得無量善果行名腳足善果者名無上正真之道是故名為明行足又復明者名呪行者名吉足者善男子是名世間義呪者名為解脫吉者名為無上正真之果是故名為明行足又復明者名光行者名業足者善男子是名世間義光者名不放逸業者皆得自在之果又復明者名為三明云何為三明一者真人明二者天尊明三者無明明真人明者即是自然之果天尊明者即是慧眼無明明者即是畢竟空行者於無量劫為衆生故修諸善業足者明見法性以是義故名明行足云何善逝善者名髙逝名不髙善男子是名世間義髙者名為無上正真大道不髙者即是天尊心也善男子心若髙者不名天尊是故天尊名為善逝又復善者名為善知識善男子是名世間義善知識善知識者即是初發心果名為元陽上品天尊不捨最初發心得大妙經是故天尊名為善逝善男子是世間義名見法性得深妙理善男子真道之性實非有也天尊因世間故說言是有善男子譬如有人實無有人實無有子謬稱有人實無有道德謬言有道德真法亦爾因世間故謬言是有真人成無上道故名善逝云何名無上士上士者名之為斷無所斷者名無上士天尊真人無有煩惱故無所斷是故號天尊為無上士又上士者名為鬪爭無上士者無有鬪爭聖人無爭故號天尊為無上士又上士者名語可壞無上士者語不可壞天尊所言一切衆生所不能壞是故號天尊為無上士又上士者名為上座無上士者為無上座三世聖人更無過者是故號天尊為無上士爾時妙樂真人心復有疑咨問天尊云何調御大丈夫天人師天尊答曰一切真人童子若能修於四法則名大丈夫天人師何等為四一者依善知識修學真法二者心能聽法深解妙意三者思惟玄義無有疑難四者遵於法戒行能伏物善男子具是四法則名大丈夫無此四法則不名為大丈夫何以故身雖是丈夫心懷諂曲意有邪淫是故不得稱為大丈夫天尊威力能調伏衆生令知正法是故號曰調御大丈夫天人師復次善男子咨問天師云何謂調御天人師天尊曰師有二種一者善教二者惡教我今以善法教諸衆生何等善法謂身口意善哉今教諸衆生作如是言善男子汝當遠離身不善業何以故以身惡業是可遠離得自在是故我以此法教汝若此惡業不可逺離得自在者終不教汝令逺離也若諸衆生離惡業巳墮三惡道者無有是處以能遠離成無上正真之果是故我今常以此法教化衆生口意亦爾是故號曰天人師復次昔未得道今以悟解以所得道為衆生說從本巳來未修善行今以修竟以所修為衆生說自破無明復為衆生破滅無明自得淨眼復為衆生破除肓𡨕令得淨眼自知二智演說二智既自解悟復為衆生說解悟法自度無量無邊生死大海復令衆生皆悉度脫自得無礙復教衆生令無怖畏自得無上正真之道復為衆生演說無上正真之道是故號天尊為調御天人師復次善男子心又生疑輒敢咨問云何名天答曰天者名晝晝長夜短是故名天又復天者名無愁惱常受歡樂是故名天又復天者名為燈明能破黑暗而為大明是故名天亦以能破惡業黑暗得諸善業而生天上是故名天又復天者名吉以吉禎故得名為天又復天者復名為日日有光明故名日為天以是義故名為天也人者名為能多恩義又復人者身口清香又復人者名有傲慢又復人者能破傲慢善男子我今雖為一切衆生無上調御師而經中說為天人師何以故善男子諸衆生中唯天與人能發自然道意修十善業能得無上正真大道之果是故號我為天人師復次善男子咨問天尊疑心未盡更有咨請云何名為大道天尊答曰道者名通既自通曉復能通他善男子譬如有人通知有賊賊無能為真人童子能通一切無量煩惱既通子巳令諸煩惱無所能為是故名道為通以是通故不生不老不病不死是名真道善男子當知我道法中有大吏兵天騶甲卒天丁力士能收邪魔惡鬼一切煩惱盡皆消伏又能成就諸善法故有大威力遍十方故又能種種大布施故又於無量劫中不毁壞故善男子若男若女能如是念道者若行若住若坐若卧若晝若夜若明若暗常得不離見諸真道善男子何故名為真道應正遍知乃至真人童子而有如是無量功德大名稱耶善男子具人於昔無量劫中恭敬父母師長於無量劫常為衆生而行布施堅持禁戒修集忍辱勤行精進真定智慧大慈大悲是故今得七十二相八十種好真金之體又復真人童子於昔無量劫中修習信念進定慧根於諸師長供養朝拜當為法利不為苦害真人童子若持三十六部尊經若讀若誦若講若說常為衆生令得逍遙解脫無為安穩歡樂終不自為何以故真人常修出世間心無取捨心元繫縳心無生死心無疑網心無貪欲心無瞋恚心無愚癡心無驕慢心作如是心巳皆得清淨深曉道源無穢濁意無煩惱意無苦意無量意無廣大意無空虛意無世間意常自在意常解脫意無報意無願意善願意無語意柔軟意不住意不退意無常意正直意無曲意淳善意如是意巳故得無所畏常樂我淨是故修無上正真大道之心是故真人童子之果云何真人童子念法善男子思惟諸法所可說法最妙最上因是法故能令衆生得見在果唯此正法無有時節天明所見非肉眼見然不可以譬喻為比不生不出不住不滅不始不終不去不來不動不轉不長不短永斷諸樂而安穩樂畢竟微妙非色斷色而亦是色乃至非識斷識而亦是識非業斷業而亦是業非結斷結而亦是結非界斷界而亦是界非有斷有而亦是有非出斷出而亦是出非入斷入而亦是入非因斷因而亦是因非果斷果而亦是果非真斷真而亦是真作是觀行即能體逹苦空成於妙道復次非虛非實斷一切實而亦是實非生非滅永斷生滅而亦是滅非相非非相斷一切相而一是相非教非不教而亦是教非怖非不怖斷一切怖而亦是怖非忍非不忍永斷一切忍而亦是忍如是一切法永能除一切煩惱永能消息清淨無相永斷諸相無量衆生畢竟住處能斷一切生死熾然乃是天尊所遊居魔常不變易是名真人童子念法云何念法諸天真人如法而住不可破壞無能撓害不可思議一切衆生橋梁福田雖為福田無所受取清淨無穢無惡其意調和平等一心無有二見常不變易無有撓觸是名念法云何念戎真人童子思惟有戒不破不犯不壞不雜雖無形色而可護持雖無觸對善修方便可得具足無有過咎真人童子之所讃歎皆獲無量妙因善男子若能修持淨界一切劫盜不敢撓害火不能焚水不能漂若修是戒得自然之果則得無上正真大道之心當為一切衆生廣說妙法而作救護是名真人我念戒云何念施真人深觀此施乃是無上正真大道之因諸善男子親近修集如是布施我亦如是親近修習若不惠施不能莊嚴供養四部之衆施雖不能畢竟斷結而能除破見在煩惱以施因緣故常為十方無量無邊恆河沙數世界衆生之所讃歎善男子施衆生食則施其命以是果報得道之時常不變易以施樂故成道之時則得安樂童子施時如法求則不侵彼施此是故成道得清淨之果真人施時令諸衆生不求自得是故成道得自然果我以施因緣令他得力是故成道得二種施因緣令他得語是故成道得三種善根真人童子修習此施為無上因我亦如是修習布施為真善因是名念施云何念天有九天神仙處乃至非想非非想多聞布施智慧得九天神仙處乃至得非想非非想處我亦有分然非我欲何以故九天神仙處乃至非想非非想處皆是無常以無常故生老病死以是義故非我所欲譬如幻化誑於愚夫智慧之人所不惑著如幻化者即是九天神仙處乃至非想非非想處愚者即是一切凡夫我則不同凡夫愚人我曾聞有第一義天謂諸真人童子常不變易以清淨常住故不生不滅不老不病不死我為衆生精勤志求第一義天何以故第一義天能令衆生除齗煩惱猶如意樹若我有信乃至有慧則能得是第一義天是名真人念天善男子是名真人非世間也是為世間不知見覺而是真人所知見覺善男子若我弟子謂受持讀誦書寫演說元陽上品微妙袐藏經典及以受持讀誦書寫敷演解說大乘經教等無差異者是義不然何以故善男子元陽經者即是一切諸天真人神仙甚深祕藏以是諸天真人甚深袐藏是則為勝善男子以是義故元陽妙經甚竒微妙不可思議妙樂真人白天尊言我今亦知元陽妙經甚竒微妙不可思議道法尊髙不可思議真人童子亦不可思議以何義故復言真人不可思議善男子無有教者而能自發無上道心既發心巳勤修精進正使大火焚燒身首終不求救捨念法心何以故真人童子常自思惟我於無量劫中或在三塗地獄畜生之中天上人間為諸劫火所燒初未曾得一決定法決定法者即是無上正真大道之因終不護惜身心與命我今為無上正真大道正使碎身猶如微塵終不放捨勤修精進也何以故勤精進心即是無上正真大道之因善男子如是真人未見無上正真大道乃能如是不惜身命況復見巳是真人不可思議又復真人童子所見生死無量無邊諸惡過患非是一切邪魔所及雖知生死無量無邊諸惡過患為衆生故於中受苦不生猒離是故復名不可思議真人童子為衆生故雖在地獄受諸苦惱託跡同凡故名受苦不可思議善男子譬如長者其家失火長者見巳從舍而出諸子在後未脫火難長者爾時定知火害為諸子故旋還救護不見其難真人童子救護衆生亦復如是雖知生死多諸過患為衆生故處之不猒是故復名不可思議善男子無量無邊一切衆生發自然道意見生死中多諸過患心即退悔斂閉六情絶除五欲修於妙道思念真經是故復名不可思議善男子若有唱言我能浮度大海如是之言不可思議不天尊曰如是之言或可思議或不可思議何以故若人度者則不可思議如妄言度者即名可思議善男子我令所說論其實録必無虛謬天尊言人中亦有可思議者不可思議者天尊曰人有二種一者聖人二者凡人凡夫之人則不可思議賢聖之人則可思議善男子我說凡夫不說聖人天尊曰若凡夫之人實不可思議善男子凡夫之人實不能度大海水也而是真人實能度彼生死大海是故復名不可思議善男子若有人能將藕絲曵懸王京山者可思議不天尊曰善男子於一念頃悉能稱量一切生死是故復名不可思議善男子我於無量劫中常觀生死無常無樂無淨而為衆生分別演說常樂我淨雖如是說然非邪見是故復名不可思議善男子如人入水水不能溺入猛火火不能燒如是之事不可思議真人童子亦復如是雖處生死不為生死之所惱害是故復名不可思議善男子人有三品謂上中下云何名為上中下下品之人初入胞時作是念言我今在厠衆穢歸處諸死尸間棘剌叢林大幽暗中初出胎時復作是念我今出厠諸穢惡處乃至出於大幽暗中中品之人作是念言我今入於衆樹果林清淨河中閨閣宫宅出時亦爾上品之人作是念言我升殿堂在騫林間乘於駿馬登上高山出時亦爾真人童子初入胎住時知住出時知出不起貪欲瞋恚之心而未得初住之地是故復名不可思議善男子元陽上品袐密奧藏實不可思議不可以譬喻為比善男子心亦不可譬喻比量真人童子無有師資受學之處而能得是元陽上品甚深意義得此法巳心無慳吝常為衆生而演說之是故名不可思議善男子有身逺離非口有口遠離非身有非身口而亦逺離身逺離者謂殺盜淫是名身逺離非口口逺離者謂離妄語談毀經論惡口赤舌諂曲誹謗是名口逺離非身非身口亦逺離者所謂逺離貪嫉惡妬瞋恚邪見善男子是名非身非口而能逺離善男子不見一法是身是業一切過患是諸惡業而能逺離是故復名不可思議口亦如是善男子從身離身從口離口從惡離惡從業離業非身非口悉能除洗是名逺離善男子無有一法能壞能作有為法性異生異滅是故此慧不能逺離善男子慧不能破火不能燒水不能溺風不能動地不能持生不能生老不能老住不能住壤不能壤貪不能貪瞋不能瞋癡不能癡以有為性易生易滅故真人童子終不生念我以此慧破諸煩惱而自說言我破煩惱雖作是說非是虛妄是故復名不可思議妙樂真人白天尊言今者始知真人童子深曉法藏不可思議道法微妙元陽經藏及受持者披析至理功德深重不可思議天尊曰無上道者住當人近幾時而滅善男子若元陽祕要有四種觀行云何為四一者觀身常淨不染穢惡二者觀心常定無有異想三者觀諸法中無有我相四者觀於萬物一想平等是為四種觀行我弟子有能受持讀誦書寫演說其義為諸衆生之所恭敬尊重讚歎種種供養當知爾時道緣未滅善男子若元陽經具足流布當爾之時我諸弟子多犯禁戒造作衆罪不能敬信如是微妙經典以不信故不能受持讀誦書寫解說其義不為衆人之所恭敬乃至供養見受持者輕毁誹謗是為慢法非我弟子當知是人將滅不久妙樂真人復白天尊言我親從聖人受如是經義云何為一慢法誹謗道法即當滅乎天尊曰聖人隱形託跡變見無方非是慢法而能毁謗應滅身乎若如是義云何為理若其無者無者說言聖人過去善男子如是之義今當重說至心諦聽有二種法云何二種法一者世法二者第一義法世法可求第一義法則不可求復有二種云何二種一者無常無我無樂無淨二者常樂我淨無常無我無樂無淨則有顯晦常樂我淨則無顯晦復有二種法云何二種法一者外二者內外法者則有可顯內法者則無可顯復有二種云何二種一者有為二者無為有為之法則有可得無為之法則無可得復有二種云何名為二種一者可得二者不可得可得之法則有始終不可得法則元始終善男子若我弟子受持讀誦書寫解說元陽經典恭敬供養尊重讃歎晨夕禮拜思念神仙當知爾時道法興盛無有終始善男子汝尚所聞真人童子有是經不善男子元陽經者悉是一切聖人祕藏何以故天尊雖說如是經典不說法性不說天尊常樂我淨一切真人不畢究妙道是故此經名為元陽祕密之藏三十六部尊經所不說故故名為藏如人七寶不出外用名之為藏善男子是人所以藏積實物為未來事故何等未來事所謂飢年積榖狂賊侵境值遇惡首為用贖命道路艱難財寶得時乃當出賑善男子諸天尊袐密之藏亦復如是為未來世諸惡道士畜不淨物為四衆說天尊畢竟無有滅神虛費供養不敬經典如是等惡見於世時天尊為欲滅是諸惡令得逺離邪見有能供養天尊則為演說是經若是經典袐密之藏無不見時爾時道法興盛善男子元陽經典常不變易云何難言元始之時有此經不善男子元始之時所有人民悉皆淳善智慧滋多雖復志性未曉真道身心清淨調柔易化有大威德總持不退善男子今世衆生貪欲辱重多諸煩惱愚癡喜忘無有智慧多諸疑綱信根不立世界不淨一切衆生咸謂聖人無常遷變畢竟人於真道是故天尊演說如是經典善男子聖人之法實亦不盡何以故常不變故善男子若有衆生我見無我無我見我常見無常無常見常樂見無樂無樂見樂淨見不淨不淨見淨真見不真不真見真道見非道非道見道生見非生非生見生滅見非滅非滅見滅昧道之語名為魔語實是魔語以為真語如是巧黠種種詭誑當知此人墮三惡道不見善因萬劫沉溺無有生期善男子寧說以索繫縳猛風不敢說言真道盡昧寧言大火之中生大蓮華不敢說言真道昧寧說月可令熱日可令冷不敢說言真道昧善男子若真人初出得元陽微妙無上正真大道之果未有弟子解甚深義而聖人隱形變化當知是法長久住世復次善男子若真人初得大道之果巳有諸弟子解甚深義聖人雖復變化當知是法久住於世復次善男子若真人初出得大道之果雖有弟子解甚深義無有篤信白衣忠良之人敬重道法聖人過去當知是法長久住世復次善男子若真人初出得於道果巳有諸弟子解深義味多有篤信俗人敬重道法聖人過去當知真道久住於世復次善男子若真人初出得大道之果巳有諸弟子解甚深義雖有篤信俗人敬重道法而諸弟子演說經時貪為利益雖復如此終為過去當知此法長久住世復次善男子若真人初出得大道之果巳有諸弟子解甚深義復有忠信俗人敬重道法彼諸弟子凡所演說不貪利益度脫衆生令歸正法雖復如此終為誘引當知是法久住於世復次善男子若真人初得道果巳雖有弟子解甚深義復有忠信白衣清信之人敬重神仙心念道法而諸弟子多起爭訟互相是非聖人過去當知是人不久住世復次善男子若真人初出得於妙果有諸弟子解甚深義復有敬信凡人尊重道法彼諸弟子修和敬法不相是非遞相愛重聖人雖復過去當知是法久住不息復次善男子若真人初得道果雖有弟子解甚深義復有敬信凡人尊重妙法彼諸弟子為一切衆生演說元陽妙法互相恭敬不起爭訟然去一切不淨之物復自讚言我今必定得於道果聖人過去當知此法常當住世善男子若真人初得正真道果巳有諸弟子解甚深義復有中信凡人愛重道法彼諸弟子能說元陽袐藏甚深經法善修和敬互相尊重不去一切不淨之物亦不自言須於妙果聖人過去當知此法久住於世善男子汝等當知諸法無有定相不可測量不可忖度何以故隨衆生受性利鈍業根受識有粗有妙善男子我今慈念衆生無有偏恩貴賤之心無有人我貪著之心是故我今平等一相無有二邊善男子譬如良醫為病服藥隨其病根應病與藥天尊觀諸衆生煩惱病根方便教化令知經戒修於正法我今救度衆生除煩惱業令得清淨無復遺餘汝今當知聖人久住於世非是過去元有休息爾時元陽世界神仙眷屬皆得明了無有疑滯妙樂真人既得總持深解妙理於是歡喜讃歎恭敬禮拜左繞七匝而說偈言大道體玄妙至理甚希夷寄名真實相隨運應明時開度諸衆主號曰天人師是能合妙藥為世作良醫剖析元陽教袐密實可思八萬諸徒衆皆得附光威三塗悉解脫五苦永停悲罪魂皆得返餓鬼悉充飢神仙乃交映珠玉自相暉䇿鳯往玄都乘鸞上紫微衆生既曉悟無為信可期今日蒙恩愛福作永巍巍諸天盡歡樂稽首辭退歸太上靈寶元陽妙經卷之六
