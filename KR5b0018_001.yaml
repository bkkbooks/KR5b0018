front:
  text: 太上靈寶元陽妙經卷之一皇一
  hash: sha256:6082e137f3810d64bbbd9190a098125a7802234b667fc52edde3ba594439718b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_HFL_001-001a, image: hfl/0168/0168-004.png}
body:
  text: 聖行品上爾時元陽真人光妙音聞天尊在玄都寶殿紫微上宫妙樂國土元陽世界與諸天大聖飛天神王演説大乘經教為諸神仙眷屬開闡玄義微妙經典神通變現不可思議妙音既聞斯事心生歡悅即率門徒弟子八萬四千人我今聞有聖尊威德堂堂不可譬喻汝等可辨名香貴寶幡蓋輿輦音聲伎樂供養之具剋明日中尋訪明師爾時弟子既聞斯語巳各各驚疑歎未曽有即辦行裝珊瑚琥珀明珠寶幢香華馥郁盡世𤤽竒侍從徒衆乘雲駕龍浮空而去既到天尊之所妙音眷屬心懷戰懼動止不寧時衆之中有一真人名曰賢智髙聲唱言我今弟子整頓衣冠明潔視聽以百和名香立空之案幡幢寶蓋音聲伎樂備衛左右羅列虛空賢智身被正帔手執香爐低眉斂膝下氣和聲叩頭稽首前進作禮咨審靈顏問訊尊體開揚法教德無損和賢智宿因有幸過忝上真輪轉因緣遭遇道運慈愍之歡實為無量然猶宿滯尚有深疑沉迷既久無緣曉悟今聞天尊發大鴻恩開慈愍路為諸百姓子男凡夫衆生作大舟航作大梯磴作大明師作大道主賢智敢籍威光憑斯妙力輒有咨問心所疑滯伏願大師憐愍凡愚降垂辨答天尊默然良久五色開顏三光朗曜七十二相八十種好遍明十方恆河世界發大法音喧動國土善哉善哉子之所問要乎深矣隨汝所問當為解析賢智上白天尊言既蒙開示曉悟衆生未審修何行願可登道果天尊答曰若修自然妙道當須除身六種弊行賢智真人白言以何因緣名為六種弊行天尊答言一者慳貪二者破戒三者嗔恚四者懈怠五者散亂六者愚癡真人修自然道者當須除此六種弊行真道可獲復次五種觀身何等為五一者觀身不淨二者觀身苦惱三者觀身無常四者觀諸法無我五者觀身空寂一無所有善男子真人道士常當修習是五種觀行復有一行是天尊所謂元陽上品妙經云何真人所修聖行真人道士若從天尊得聞如是大聖經巳心生敬信敬信法巳應行如是思惟有無上道有大正法有元陽經典我今思惟常為愛樂求至要故捨離所愛妻子父母兄弟六親眷屬所居住宅金銀𤤽寶僮僕奴婢之屬復作是念居家迫迮猶如繫縛一切罪根由之而生出家間靜猶如虛空一切善因緣之利益若在居家不得讀誦元陽經典修於智慧我今應當拾離恩愛出家學道復作是念我今定當割愛修學無上正真自然之果真人道士如是欲出家時有諸天魔鬼生於撓惱即當與我興大鬪爭善男子如是真人云何復與人鬪爭爾時真人道士即至元陽宫中若見天尊及諸弟子威儀具足諸根清淨其心和軟寂靜無為即至其所而求出家棄捨俗衣著於法服既出家巳奉持法戒威儀不缺舉止安詳不犯愆過乃至小罪心不敢作護持法戒猶如赤子譬如有人帶持浮瓠欲濟巨海爾時海中有一海神即從此人乞取浮瓠其人聞巳即作念言我今乞汝必定沉溺答言海神汝寧殺我浮瓠必不可得海神復言若不全與我者可乞一半是人猶故不肯與之海神復言汝若不能與我半者可三分之一其人又復不肯海神又言汝可與我如手許大其人又復不許海神又言我今飢寒困苦願當濟我如絲毫許又復不肯復言汝今所索計自不多然我今日方涉海水不知邊際去岸逺近云何與汝我今何緣出海之難脫喪身命悔將何及善男子真人道士守持法戒亦復如是如彼涉海愛惜浮瓠真人如是守持法戒時常有煩惱諸惡海神語其人曰汝當信我終不欺誑但破五禁護持法戒以是因緣令汝安穗得入元陽仙品爾時應作是言我今寧持如是禁戒墮玄沙地獄終不毀戒犯法而生天上煩惱海神復作是言汝若不能破五禁法者可食人肉以是因緣令汝安穩得入元陽仙品真人亦不復從其語海神又言汝若不能食人內者亦可犯偷劫罪以是因緣令汝安穩得入元陽仙品真人爾時亦復不從海神復言汝若不能犯偷劫罪可犯五逆罪以是因緣可得安穩入於元陽仙品真人爾時又復不從海神復言汝若不能犯五逆罪者可入淫室以是因緣令汝安穩得入元陽仙品真人爾時亦復不從海神又言汝不犯淫室者可破四盟戒以是因緣可得安穩入於元陽仙品真人爾時心自念言我今若犯四盟戒律不首悔者則不能度生死岸而得元陽仙品真人道士於是微小諸戒律守護堅固心如金剛真人道士持百八十戒智惠上品戒供養尊重等無差異真人若能如是堅持則為具足真道禁戒回向元始正真之道爾時賢智真人復有五録戒一者不殺生二者不盜人物三者不邪淫人婦女四者不嗊嗃妄語五者不飲酒食肉真人若修五緑戒者終不為惡即入無為真常之樂復次善男子有二種戒一者修心清淨戒二者息世機嫌戒修心清淨戒者謂行無點汚志不犯非息世機嫌戒者不作販賣財寶以求福樂不假他人形勢以顯己身不求世問肉味以潤飢虛不樂華麗衣物以為服用不樂髙廣屋舍牀席屏幃氈褥錦繡等物如是之事並能除斷善男子名曰息世機嫌戒真人道士堅持如是禁戒等無差異善男子真人道士受持如是法戒以發是願寧以此身投於猛火深坑終不破犯元始天尊所制法戒與諸凡夫衆生而行不淨復次善男子真人道士又發願言寧以熱一硬丨不破法而受侣心吁者束服禮袂善男子真人道士又發願言寧以此口吞熱鐵汁終不敢破法而食信心賢者飲食復次善男子真人道士又發願言寧以此身卧熱鐵牀終不敢以破法而受信心賢者牀卧褥具復次善男子真人道士又發願言寧以此身受於重病終不敢破法而受信心賢者醫藥復次善男子真人道士又發願言寧以此身投沸鐵鑊中終不敢破法而受信心賢者房舍屋宅復次善男子真人道士又發願言寧以鐵棒碎我此身不以破法而受信心賢者恭敬禮拜復次善男子真人道士復作願言寧以鐵鈎挑我眼瞳不以邪心玩他好色復次善男子真人道士又發願言寧以鐵錐刺耳不以染心聽好音聲復次善男子真人道士復發願言寧以利刀割去其鼻不以染心貪諸香氣復次善男子真人道士復發願言寧以利刀割去舌根終不染心貪著諸味復次善男子真人道士復發願言寧以利斧斬身終不染心貪諸色觸何以故以是因緣願令一切衆生守持法戒得清淨法善男子真人道士修治如是清淨法時即得住不動之地云何名不動之地真人住是不動之地不動不墮不退不散善男子譬如玉京山猛風不能搖動真人道士住是地中亦復如是不為色聲滋味所動不為邪見淫風所散善男女不動傾者不為貪欲嗔恚所撓又不墮者不墮三惡又不退者不退法還家又不散者不為退逆元陽經之所散壞復次真人道士亦復不為諸煩惱魔王所動不為邪鬼所傾乃至坐於道場騫林樹下雖有魔王不能令其退無上正真大道亦復不為死魔所撓是名真人修習真行善男子云何名為真行真行者天尊及諸仙之所行故故名真行以何因緣故名天尊真人為聖人耶如是等人有聖法故常觀諸法性寂靜故以因緣故名為真人有聖法故故名真人有定惠故故名真人有七真財所謂信法慚悚多聞智惠捨離故故名真人以是因緣復名真行復次善男子真人道士真行者觀察是身不淨因緣和合共成此身云何而得坐起行住屈伸俯仰視瞬喘息悲泣喜笑此中無主誰使之爾作是問巳座中諸仙忽然不見復作是念或識是我故使諸聖人不為我復觀此識次第生滅猶如流水亦復非我又作是念若識非有出息入息或能是我又作是念出息入息直是風性而風性乃是四大四大之中何者是真地性非真水火風性亦復非真又作是念此身一切悉無有真唯有心風因緣和合變現種種所作事業譬如呪術所作亦如鳴鍾隨意出聲是故此身如是不淨因緣混合共成其體當於何處而生貪欲若被罵辱復於何處而生瞋怒如我此身百關不淨六根臭穢何處堪當罵辱者若聞其罵即便思惟以何音響而見罵耶一一音響不能見罵若一不能衆亦如是以何義故不應生瞋若他來觸亦應思惟如是觸者因何而生復作是念因心因作反以我身故名為觸我今何緣橫瞋於他乃是我身自作其罪以為我身受於五隂故譬如因的則有弓箭我身亦爾有身有觸我若不忍心則迷散心若迷亂則失正念若失正念則不能觀真不真義若不能觀真不真義則行惡事惡事因緣則墮三塗十惡地獄真人爾時作如是觀巳得四種念處得四種念處巳則可住於堪忍之地具人道士住是地巳則能堪忍貪欲嗔恚亦應堪忍寒熱飢渴種種惡觸種種疾疫惡口罵詈鞭杖楚撻身心苦惱一切能忍是以為住堪忍之地元陽真人賢智白天尊言仙人道士未得住於不動之地淨持戒時頗有因緣得破法罪善男子真人未得住不動之地有因緣故可得破法真人言唯然天尊何者因是耶天尊告真人賢智若有真人道士知以破法因緣則能令人受持愛樂元陽經典又能令其受持讀誦文句通利書寫經卷廣為人説志不退轉無上正真自然大道為如是故故得破法真人爾時應作是念我寧一切墮於玄沙地獄受於苦惱要令是人不退轉於無上正具自然大道爾時元陽真人賢富子林等白天尊言者有真人攝取守持如是之人令不退轉自然之心為是毁法若墮玄沙地獄無有是處爾時天尊讚賢智真人善哉善哉如汝所説我念過去於闔浮地作大國王名曰受見愛念敬重元陽經典其心純善無有穢惡嫉妬慳貪口常宣説柔軟之語心常攝護貧窮孤獨布施精進無有休息時世無聖人我於爾時愛樂元陽上品大乘經典九年之中事道士為師供給所須過於九年施安巳訖即作是言師等今應發無上正真自然法心道士言曰大王自然之性是無所有元陽經教亦復如是大王云何乃欲令人同於虛空善男子我於爾時心樂元陽妙經恭敬讀誦乃有如是無量功德復次善男子修聖行者當知有漏之法有二種事有因有果無漏法者亦應有二種有因有果有漏果者是則名苦有漏因者則名為集無漏果者則名為滅無漏因者是名為法復次善男子真人道士有八種苦相所謂生老病死愛憎離别能生如是八苦法者是名為集無有如是八法之處是名為滅善男子生者出相所謂五種一者初出二者至終三者增長四者出胎五者種類生云何為老老有二種一者念念老二者終身老復有二種一者增長老二者滅壞老是名為老以何因緣名之為病謂身寧毒蛇互不謂適以是義故復有二種一者體病二者意病體病復有五等云何為五一者因水為病二者因風為病三者因熱為病四者雜惡為病五者外物為客病以是因緣客病之中復有四種一者非意強為二者忘誤墮落三者器仗瓦石四者魍魎邪鬼所著心病之中亦有四種一者邪心踊躍二者心生恐怖三者心有憂愁四者志性愚癡復次善男子真人道士心性之病復有三種以何因緣名之為三一者身心作罪受於業報二者不得遠離諸惡對罪三者四時代謝如是因緣名為分别病諸病名字心意迷亂是名為病云何為死死者捨離所受之身捨離受身有二種别一者夀命盡死二者攀緣死命盡死者復有二種事一者壽命盡非是福盡二者福盡非是命盡攀緣死者復有二種義云何二種義一者非分自害死二者橫為他人害死又有三種死一者放逸死二者破法死三者壞命死云何名為放逸死若有毀謗元陽上品大乘經典是名為放逸死云何名為破法死毀謗過去未來見在諸聖人所制法律是名破法死云何名為壞命死拾棄五隂是名壞命死如是等死名曰大苦何等名曰愛别離苦所愛之物破壞離散如是愛别有二種别云何名為二種一者人中陰懷二者天中隂懷如是人天所受隂懷分别計數有無量種是名愛苦云何名為怨憎會苦所集聚其有三種一者地獄二者餓鬼三者畜生如是三趣分别多少有元量數如是之名為怨憎會苦云何名為求不得苦其有二種一者有所冀望求之難得二者多用氣力不獲福報如是之事名求不得苦云何名為五隂苦五隂苦者生老病死愛憎别離是煩惱根本善男子當知八苦之中為身大患若能挫鋭閉情専心斂意修行供飬元陽上品大乘經典可得免離如是八種煩惱八種憂患之苦爾時元始天尊告賢智真人曰一切凡夫衆生顛倒覆心貪著生相猒離老病我今不爾觀於初生巳見病患真人如有女人名曰善信入於蒲鄰世界長者之舍是女端正顏貌美麗世間錦繡紋繒服玩莊嚴其身長者見巳即便問言汝今名字云何從何而來女人答曰我即是今世界中功德大富主長者問曰汝今所至之處為何利益女言我所至處能生種種甘果飲食之味金銀銅鐡錦繡紋繒牛馬車乘奴婢僮僕長者聞之心生歡喜我乘昔因緣逢善知識為大利益即便恭敬禮拜燒香散華至心稽首願能慈愍爾時門外復有女人形容醜陋衣裳臭穢長者見巳問言汝自何等女人答言我名黑業長者曰以何因故名為黑業女人答曰我所經遊能令其家財物襄耗長者聞巳即持利刀趂逐令去如有留滯即害汝命黑業答言汝莫愚癡無有善心長者問言何故名我愚癡無有善心黑業答曰汝家中女人名曰善信即是我姊常共經遊汝若趂我姊亦須逐去長者還入問善信門外女人是汝妹不善信答言實是我妹我等姊妹處處經遊未曾相離在所履歷我常為善彼常為惡我作善業彼為惡業長者既能愛我亦復須憐彼長者答言若有是事我皆不用即便急去勿復有遲是時二女便去還其所住爾時長者心生喜恱歡無無量是時二女相隨便至貧家貧人見巳心生踊躍即請之言從今巳去願二女常在我舍女人答言我等先巳為他驅逐汝今何緣俱留我住貧人答曰汝今念我我亦念汝是故俱請令住我舍賢智真人等亦復如是不願生天以生當有老病死故是以俱棄曹無愛心凡夫衆生不知老病死是故心常貪愛生死二業復次真人道士如有妙智童子為飢所逼見糞穢中有諸果子即便取之有賢者見之即便呵責汝妙智童子種性淸虛何故取此糞穢之果妙智聞之心直慙愧即答之言我實不食為欲洗淨還棄捨之賢者語言汝大愚閣若還棄者更不須取善男子真人道士亦復如是於此生中不取不捨如彼賢者呵責妙智童子凡夫衆生欣生惡死如彼妙智童子取果還棄復次賢智真人譬如有人於四逹道中器盛美食而欲賣之有人遠行飢乏見其美食即復問言此是何物食主答言此食香美若食此食能除飢渴得見諸仙唯有一病所謂命終是人聞巳即作是念我今不用仙亦不用死即作生言食此食巳若運命終盡汝今何為賣之食主答言有惠之人終不肯買唯有愚癡不知是事多與我值貪食其食真人道士亦復如是不願生天但免煩惱何以故以其不免諸苦惱故凡夫衆生隨其生處貪受諸觸以其不見老病死故復次善男子猶如毒樹之根汁能殺人真人道士於受生處所受五賊隂身亦復如是一切能殺復次善男女猶如糞穢多少俱臭真人道士生亦如是設受千年下至十歲俱亦受苦復次賢智真人猶如嶮處有草覆於岸邊多有甘露若有食者壽年千嵗永除諸病安穩快樂凡夫衆生貪其味故不知其下有深坑即前欲取不覺墮坑遂殞其命賢者知巳捨棄遠離真人道士亦復如是尚不欲受諸天妙食況在人中凡夫衆生乃於地獄吞噉鐵汁況復人天妙膳而能不食真人道士以如是譬及諸無量無邊當知生為大苦真人道士是名聖人住於元陽世界讀誦大乘微妙經典觀於生苦真人道士云何聖人於元陽世界觀於老苦者能為嗽逆上氣能懷勇力憶念進持盛年歡樂自恣及斯老苦皮肉消瘦形容臭穢為人所輕真人道士譬如池有蓮華光色鮮榮芬芳可愛忽值天雹一時零落真人道士老亦如是悉能破壞盛壯好色復次賢智真人譬如國有忠臣善知兵法有他國拒捍不從威令王遣忠臣往彼伐之即便擒縛將來詣王老亦如是擒縛壯色將付於王復次善男子譬如折輪無所復用老苦將至亦復如是復次善男子如大富家豐諸珍寶衣服卧具怨賊入家劫奪家資悉皆空盡善男子盛年壯色亦復如是常為老賊之所劫奪復次善男子猶如窮人貪諸衣服雖復冀望而不能得善男子老亦如是雖有貪心欲求富樂而不能得復次善男子猶如陸龜心念於水真人道士老亦如是既為衰賊之所乾涸心念壯時所受富樂復次真人道士譬如秋月所有蓮華為人所愛及期銷歇人不欲見善男子壯年盛色亦復如是皆為人愛及其老至人所輕賤復次真人道士猶如甘蔗既被壓巳無復甘味美年壯色亦復如是既為老賊侵壓無有道味出家讀誦精進之味復次善男子猶如滿月盛光盡則不明善男子老亦如是少則端正刑貌鮮潔老至憔悴顏容枯瘦復次善男子譬如有帝王以正法治國理人無曲時為敵國之所侵奪流離波逬遠入他境他境人民見而愍之俱作是言大王往昔正法治國不濫百姓如何一朝波逬流離乃至於此善男子人亦如是既為衰老所毁常念少時所為事業復次善男子譬如燈炷唯藉於油油既消盡勢不久停真人道士老亦如是唯籍油明油既消盡衰老之炷焉得久明復吹真人道士猶如枯池不能潤益人及非人飛禽走獸善男子老亦如是為老所枯不能利益生所作業復次真人道士猶如河岸臨險之樹若遇驚飈必當顛墮善男子老亦如是臨老險岸飛飈一生勢不得住復次真人道士如車無輪不堪運載善男子老亦如是不能請受自然之法復次真人道士猶如嬰兄為人所賤善男子老亦如是恆為萬物輕毁真人道士以是因緣譬喻及諸無量無邊不可思議如是老苦實為大病善男子是名真人道士修行元陽上品大乘經典觀於老苦爾時賢智真人云何善男子修行元陽上品大乘妙典觀於病苦所謂諸病能消滅一切樂事譬如雨雹傷毁苗稼損於榖實復吹真人道士如人有愁意恆愁惱而常恐怖善男子一切衆生凡夫之人亦復如是常憂病苦心懷愁惱復次真人道士譬如有人形貌端正為王妃后欲心所念遣信逼呼與其交通時王知之挑其一眼截其一耳斷其一手刖其一足是人爾時形儀攺異人所輕賤善男子病亦如是先雖端正六根具足既為病苦之所纏逼則為衆人心所輕賤復次真人道士譬如芭蕉及騾有子為死所逼善男子病亦如是有病則死復次真人道士猶如鳳輪王主兵大臣恆在前導王後隨行亦如四種畜生王商主在前行亦如是諸衆悉隨無捨離者善男子死風輪王亦復如是常有病臣不相棄離四種商主亦復如是常為死衆之所縈逐真人道士病因緣者所謂苦惱愁怖憂恐身心或為怨賊之所惱害破壞浮瓠發撒梯磴亦能欺奪正念根本復能毁美貌怒色能為身心燋損膚體如是等喻當知病苦是為大賊善男子是名真人道士能行元陽大乘微妙經典觀於病苦爾時賢智真人云何善男子修行讀誦元陽上品大乘經典觀於死苦所謂死苦能消滅故真人道士如劫火起能燌一切善男子死火亦爾能燌一切唯除真人道士住於元陽世界因天尊力勢不及故復次真人道士如水災起一切漂溺唯除三仙力不至故善男子死水亦復如是漂溺一切唯除真人住於元陽國土大乘世界復次真人道士如風災起能搖動一切諸物悉令消壞唯除四仙力不至故善男子死風既至能吹一切所有唯除真人道士住於元陽國土大乘世界賢智真人白天尊言彼四仙力以何因緣火不能銷水不能溺風不能搖天尊告賢智真人曰四仙力者是諸過患一切元故善男子初仙過患內有觀察外有火災二仙過患內有歡喜外有水災三仙過患內有喘息外有風災善男子彼四仙者內外過患諸漏悉無是故諸災不能及之善男子真人道士亦復如是安住元陽國土大乘世界內外咎過悉皆却盡是故死至不能及之復次真人道士如金翼之鳥能食能消一切禽魚金銀等物唯除金剛不能吞噉真人道士死金翼鳥亦復如是能食噉諸衆生唯不能消住元陽國土大乘世界真人道士復次賢智真人猶如嶮岸所有樹木洪水暴長悉隨漂溺流入大海唯除楊樹以其軟故善男子是諸衆生亦復如是悉皆沿流入於死海唯除真人道士住於元陽國土大乘世界復次賢智真人猶如天丁力士能摧伏一切魔鬼唯除大風何以故以無礙故善男子死天丁力士亦復如是悉能摧伏凡夫衆生唯除真人道士住元陽國土大乘世界以何因緣以無礙故復次賢智真人有人於怨憎中妄作親善恆相隨從如響從聲伺候其便而欲殺之其怨謹守堅固自防故使怨人不能得害善男子死怨亦爾伺候凡夫一切衆生而欲殺之唯不能殺住元陽國土大乘世界真人道士何以故如是真人不遊放逸故復次賢智真人猶如卒降暴兩破壞山林樹木土石沙礫一切諸物唯不能毀壞金剛之寶善男子金剛死亦復如是悉能消滅凡夫衆生唯除金剛真人道士住於元陽國土大乘世界復次賢智真人如金翼鳥能噉龍魚不能噉三洞法師善男子死金翼鳥亦復如是能食無量衆生一切舍識唯除真人道士住三洞者何謂三洞空無之相復次賢智真人有如毒蛇放毒螫人雖有良呪世之草藥無如之何唯有聖人甘露妙藥能消其毒善男子死毒所害亦復如是一切醫療無奈之何唯除真人住於元陽國土大乘世界復次賢智真人猶如有人為官所嗔若能卑辭遜謝低言軟語償於珍寶便可免脫善男子死官所逼其事不爾雖以軟語珍寶償之死不得脫善男子夫死者於臉難處無有糧食去人懸遠而無伴侣心懷煩惱不知何處深邃幽暗無有光明入無門戶而有處所雖有楚痛非可療治為無遮遏往不復脫無所毀壞見者愁憂非是惡色令人恐怖敷在體上不可覺知賢智真人如是譬喻當知是死真為大苦賢智是名真人道士修行元陽上品大乘經典觀於死苦爾時賢智真人云何真人道士修於元陽上品大乘經典愛别離苦能為一切凡夫衆苦根本以是因緣則生憂苦以憂苦故則令衆生生於衰老恩愛別離苦所謂壽命終盡善男子以别離故能生種種諸苦能生種種微細煩惱今當為汝分別一一顯説善男子過去之世人壽長遠無量劫時有王名曰受見其王爾時身為太子及登王位夀四萬嵗時王頂上生一肉髻其䯽柔軟如綿細軟漸漸增長不以為患滿一年中肉䯽自開生一童子形貌端正世界罕雙色相妍華人中獨步父王喜悅字曰莊嚴時受見王因以國事委付莊嚴棄捨國內珍寶妻子眷屬入妙樂之山蒲鄰世界修學元陽上品大乘經典滿一千歲爾時莊嚴於一月間處在髙臺洙浴冠帶受齋即於東方大福堂鄉納善世界有金輪寶車其輪轂軸盡皆具足不由規矩自然華麗而來應之莊嚴大王即作是念我往劫時曹聞六通聖人説若普惠王於一月間處在高臺沐浴受齋若有金輪寶車轂軸具足不由規矩自然華麗而來應者應知是王當得作人天聖帝復作是念我今當試即以左擎輪寶右執香爐長跪禮拜而發誓願如是輪寶若實不虛應如過去人天聖王所行道去作是誓巳如是輪寶飛升虛空遍滿十方還來住在莊嚴左手爾時莊嚴心生喜悅歡樂屏營復作是言我今定作人天聖王其後不久復有金寶狀貌端嚴如蓮華葉七枝柱地莊嚴見巳復作是念我往昔時曹聞六通聖人説若人天聖王於一月間處在髙臺沐浴受齋若有赤金寶象狀貌端嚴如蓮華葉七枚柱地而來應者當知是王即是人天聖帝復作是念我今當試左擎香爐右膝著地而發誓言是金寶象若寶不虛應如過去人天聖王所行道去作是誓巳是金寶象從旦至夕周遍十方盡大海際還住本處爾時莊嚴王心生歡樂喜躍無量復作是言我今定是人天聖王其後不久次有白銀寶馬狀貌端嚴髦尾金色莊嚴見巳復作是念我往昔時曾聞六通聖人説若人天聖王於一月間處在髙臺沐浴受齋若有白錦寶馬其色華麗髦尾金色而來應者當知是王即是聖帝復作是念我今當試即執香爐長跪禮拜而發誓願如是寶馬若實不虛應如過去人天聖王所行道去作是願巳寶馬馳驟從旦至暮周遍十方盡大海際還住本處爾時莊嚴心生踊躍歡喜無量復作是言我今定是人天聖王其後不久復有妍麗女寶容儀琬琰姿貌第一身上毛孔出諸名香口氣香潔其眼能視見十由旬耳聞鼻嗅心識聰哲有大智慧於諸衆生常有軟語是女以手指王衣時即知未來安樂休否亦知王心所緣之處爾時莊嚴復作是念若有女人能知王心即是女人之寶其後不久於王宫內自然而有珍寶有大明珠能於黑暗之中照一世界若有魔王邪鬼來撓世界凡夫衆生此珠照了魔不能近爾時莊嚴復作是念若人天聖王得是寶珠必為聖帝其後不久當有賢臣主藏自然而出增益珍寶庫藏充滿無有少乏報得眼根力能徹視十方世界所有伏藏王所思求應念即來爾時莊嚴復欲試之即共乘船泛於大海語藏臣言我今隨汝入海心有所求欲得珍寶臣聞王言即以手撓海水時手指頭出諸寶藏以奉聖王而白王言大王有所求須隨王意玩爾時莊嚴心大歡喜即作念言我今定是人天聖王其後不久有主兵智臣自然輔相勇健第一智慧無比善知術數妙解兵書若有不賔之國而能摧伏巳摧伏者力能守護爾時莊嚴復作是念若人天聖王是臣守護當知之是聖王爾時莊嚴人天聖帝告諸大臣卿相當知此閻浮世界安穩福樂我今巳有珍寶具足更無所之諸臣答曰東方大福堂世界猶未歸德大王親往教化彼國爾時莊嚴聖王即以七寶珍玩人物侍從而往彼國人民歡樂悉皆歸化復告臣言我今國土安穩人民豐樂七寶充滿臣子具足更何所為諸臣答言西方盛行世界猶未賔伏爾時莊嚴聖王復與七寶珍玩人物侍從而往彼國人民歡喜悉皆歸伏復告臣言我今國土安穩人民豐樂七寶充滿臣子具足復何所為諸臣答言比方清淨世界猶末歸化爾時莊嚴聖王復與七寶珍玩人物侍從而往彼國人民歡樂悉皆歸伏復告臣言我今國土安穩人民豐樂七寶充滿臣子具足更何所為諸臣答言南方棄賢世界猶未歸化爾時莊嚴聖王復與七寶珍玩人物侍從而往彼國人民歡喜悉皆歸伏復告臣言我今國土安穩人民豐樂七寶充滿臣子具是復何所為諸臣答言三十二天壽命長遠安穩快樂彼天形客端嚴獨步所居卧具悉是珍寶自恃福樂未來歸化今當往詣令其賔伏爾時莊嚴聖王復與七寶珍玩人物侍從飛騰虛空上至三十二天世界見有一樹枝葉鬱茂果實葳蕤聖王見巳即問天主神寶天王此是何色之樹神寶天王答言此名騫木諸天神仙四時節月常於其下歡娛愛樂又見雲色猶如紫氣復間神寶天王彼是何色答言是善福堂處諸天仙聖常集其中論人天之事於是神寶天王知莊嚴王有大威德即共升善福堂分座而坐彼時二王形容相貌等無差異是時聖王即生念言我今退彼王位即住其中為天王不真人道士爾時神寶天王受持讀誦元陽上品微妙經典剖析玄義皆悉通達以是讀爾受持分別為他廣説因緣力故有大威德善男子是莊嚴王於神寶天王生諸惡心即便墮落還閻浮世界與所愛念遂乃分離生大苦惱忽遇惡病即便命終爾時元始天尊是人天聖王則我身是善男子當知如是愛别離苦拯為大患善男子真人尚憶過去如是等事愛別離苦何况真人住於元陽國土大乘世界而當不觀見在之世有别離苦善男子云何真人道士修行元陽上品大乘經典觀於怨憎會苦善男子是真人道士觀於天上人間地獄畜生餓鬼皆有如是怨憎會苦猶如有人觀於牢獄禁繫枷鎖揣以為憂苦真人道士亦復如是觀於六道一切衆生皆悉怨憎合會為大苦惱復次善男子譬如有人常畏怨家捨棄父母妻子産業服具而遠逃避善男子真人道士亦復如是恐懼生死具足修行尊六度行求於無上道果善男子是名真人道士修行元陽上品大乘經典觀於怨憎苦善男子云何真人修行元陽上品大乘經典觀於衆生求不得苦一切衆生盡求不得盡求者有二種義一者求善法不得二者求不善法未得苦惡法未離苦是則略説五隂盛苦善男子真人道士是名求不得苦爾時賢智真人白天尊言如尊所説五隂盛苦是義不然何以故如天尊往時告富子元若色苦者凡夫衆生不應求色若有求者則何名若如天尊告諸道士有受苦受樂受不苦不樂如天尊先為諸道士女冠善男子説若有能修行善法則得受樂又如天尊説於善道中六染受樂眼好諸色是名為樂耳好諸聲是名為樂鼻好諸香是名為樂舌好諸味是名為樂身受細滑是名為樂意好榮華是名為樂六味好法皆悉受苦天尊即為而説偈曰持戒為歡樂身不受衆苦誦詠元陽品名入不死户如是怨憎會聞經病自愈金法愛浮瓠魔鬼不得腐轉輪為聖王因緣作慈父愼莫行惡心有惡傾天主若能愍衆生以法為梁柱晝夜常恭敬願去三官府真人及道士精心鳴法鼓晚悟六道中常與法為伍大乘是世界天堂為淨土一切罪根盡皆由我規矩天尊説偈巳如諸經中所説事相其義如是賢智真人等既聞斯義了然解悟稽首作禮辭退而去太上靈寶元陽妙經卷之一
