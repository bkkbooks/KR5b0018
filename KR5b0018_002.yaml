front:
  text: 太上靈寶元陽妙經卷之二皇二
  hash: sha256:68967d9f232f2f3c67940ae06da5d33cbea8b71e240bce170f3bb5f73005a1ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_HFL_002-001a, image: hfl/0168/0168-064.png}
body:
  text: 聖行品下爾時髙上玉晨天尊告元陽定光真人曰我觀一切諸法皆悉無常性相不定若有諸法從因生者則是無常是諸仙人無有一切不因緣生善男子道性無隱無顯無生無滅無去無來非見在非未來非過去非因所作非緣所生是故名常善男子道性即是天尊天尊即是法法即是常善男子常者即是天尊天尊即是真人真人是常道性是常以是義故從因生法不名為常是諸下仙之人無有一切不從因生善男子是諸下仙之人不見道性天尊妙法是故下仙之人所可談說皆悉妄語無有真實一切衆生先見衣服卧具車乘象馬城郭聚落後見相似便言是常當知其實非是常耳善男子一切有為之法皆是無常虛空無為是故為常道性無為是故為常虛空者即是道性道性者即是天尊天尊者即是無為元為者即是常樂常樂者即是法法者即是無為無為者即是常樂善男子有為之法凡有二種一者色法二者非色法非色法者心心數法色者地水火風善男于心名無常何以故性是攀緣相應分別故善男子眼識性異乃至意識性異是故無常善男子色境界異乃至法境界異是故無常善男子眼根相應異乃至意根識相應異是故無常善男子心若常者眼根應獨緣一切法善男子若眼根識異意根識異則知無常以法相似念念生滅凡夫見巳計之為常善男子諸因緣相可毁壞故亦名無常所謂因眼因色因光因明因思惟生於眼識耳識生時所因各異非眼識因緣乃至意識異亦皆如是復次定光真人諸善男子懷諸行因緣故心名無常所謂修無常心異修苦空無我心異心若常者應常修無常尚不得觀苦空無我况復得觀真常之樂以是義故下仙法中不能攝取真常之樂善男子當知心法必定無常復次善男子心性異故名為無常所謂邪見邪疑之人心性殊異不信真法不敬真人不崇有道作諸惡心善男子應知用心之法有三種心一者出家心二者在家心三者在家違離心樂相應心異苦相應心異不苦不樂相應心異貪欲相應心異瞋恚相應心異愚癡相應心異一切邪見邪魔心相應亦異所謂愚癡相應心異疑惑相應心異邪見相應心異動止運為其心亦異善男子心若真常者亦復不能分别諸色所謂玄黃朱紫赤白之色善男子心若常者諸憶念法不應忠失善男子心若常者凡所讀誦不應增長復次善男子心若常者不應說言巳作今作若有巳作今作當知是心必定無常善男子心若常者則無怨親非怨非親心若真者則不應言我物他物若生若滅心若真者雖有所作不應長善男子以是義故當知心性各各別異有別異故當知無真善男子我今於此非色法中演說元真其義巳顯復常為汝說色無真是色無真本無有生生巳滅故故知無真凡夫無知計以為真以是義故名曰無真若無真即是無苦若無苦即是不淨善男子我昔於元始之運先間斯事因得了然復次善男子諸法無我總一切事謂色非色色非我也何以故可毀可滅可破可壞生增長故我者不可毀滅破壞增長以是義故知色非我非色之法亦復非我何以故攀緣生故善男子若諸邪見以專念故知有我者專念之性實非我也若以專念為我性者過去之事則有忘失有忘失故定知無我善男子若諸邪見以憶想故知有我者無憶想故定知無我如說見人手有六指即復問言我先何處共相見邪若有我者不應復問以相問故定知無我善男子若有邪見以遮故知有我者善男子以有遮故定知無我如言童子者我亦如是若定是我終不遮我以遮我故定知無我若以遮故知有我者汝今不遮定應無我善男子若諸邪見以仲非伴知有我者以無伴故應無有我有法無伴所謂天專空虛道性我亦如是實無有伴以是義故定知無我復次善男子若諸邪見以名定故知有我者無我法中亦有我名如貧賤人名字富貴如言我死若我則殺我而我實不可殺假名殺我亦如座人名為長者以是義故定知無我復次善男子若諸邪見以生巳求乳知有我者善男子若有我者一切嬰兒不應執持不淨以是義故定知無我復次善男子一切衆生於三法中悉有等智所謂姦淫飲食恐怖是故無我若諸邪見以相貌故知有我者相故無我無相故亦無我若人睡時不能進止俯仰視瞬不知苦樂不應有我若以進止俯仰視瞬知有我者機關木人亦應有我善男子亦不進不止不俯不仰不視不瞬不苦不樂不貪不意不癡不行真道如是真實有我若諸衆生邪見以見他食果口必生咨知有我者善男子以憶念故見則生咨咨非我也我亦非咨非喜非樂以是義故定知無我善男子如是衆生癡如小兒不解智慧無有方便不能了達常與無常苦與無苦樂與無樂淨與無淨我與無我壽命非壽命衆生非衆生於道法中取少許分虛妄計有真常之樂而實不知真常之樂如生盲人不識乳色便問他言乳色何似他人答言乳色白如貝盲人復問是乳色者如貝聲邪答言不也復問具為何似邪答言如稻米味盲人復問乳色柔軟如稻米味邪稻米味者復何所似答曰如雪盲人復言彼米味者冷如雪邪雪復何似答言猶如白鶴是生盲人雖聞如是譬喻終不能得識乳真色是諸邪見衆生亦復如是終不能識真常之樂以是義故我道法中有真常之義非於邪見爾時定光真人復白天尊言希有大師於今過去方便更轉無上法輪乃作如是分別真常天尊告定光真人汝今云何故於大師生過去想善男子大師實是真常不變不過去若有計我是法成無上正真大道我即是法法是我身我即是道道是我身我即大師大師即是我身我即真仙真仙即是我身我能說法令他聽受我轉法輪餘人不能大師終不作如是計是故大師不轉法輪若有人作如是妾計我即是眼眼即是我身口意耳鼻亦復如是我即是色色是我身乃至真法亦復如是我即是地地即我身地水火風亦復如是若人計言我即是言言是我身我是多聞多聞即是我身我是布施布施即是我身我是持戒持戒即是我身我是忍辱忍辱即是我身我是靜定靜定即是我身我是精進精進即是我身我是智慧智慧即是我身我是六念處其六念處即是我身四種正勤四種如意五心淨分八聖道分亦復如是善男子大師終不作如是計是故大師不轉法輪若言常住無有變改云何說言大師轉法輪是故汝今不應說言大師方更轉上法輪善男子譬如因眼緣色緣明緣思惟因緣和合得生眼識善男子眼不念言我能生識乃至思惟終不念言我生眼識亦復不作念言我能自生如是等法因緣和合得名為見善男子天尊亦爾因六度行七種之法曉了諸法復因咽喉脣齒口舌言語音聲初始說法名轉法輪以是義故天尊不名轉法輪也善男子若不轉者即名為法法即大師善男子譬如因燧因鑽因手因草而得生火燧亦不言我能生火鑽手乾草各不念言我能生火火亦不言我能自生天尊亦爾因六度行乃至名轉法輪天尊亦復不生念言我轉法輪善男子若不生者是則名為轉正法輪是轉法輪即名天尊大師善男子譬如因酪因水因鑽因瓶因繩因人而得出酥酪不念言我能出酥乃至人手亦不念言我能出酥酥亦不言我能自生因緣混合故得出酥天尊亦爾終不念言我轉法輪善男子若不出者是則名為轉正法輪是轉法輪即是天尊善男子猶如因子及地水火風沃壤時節因人作業而牙得生善男子子亦不言我而能生牙乃至作業亦不念言我能生牙牙亦不言我能自生天尊亦爾必不念言我轉法輪善男子若不作者則名為轉法輪是轉法輪即是天尊善男子猶如因鼓因空因皮因人因緣混合出於音聲鼓不念言我能出聲乃至因緣亦復如是聲亦不言我能自生善男子天尊亦爾終不念言我轉法輪善男子轉法輪者名為不作者即是天尊善男子轉法輪者乃是諸仙大師境界非諸弟子所知善男子虛空非生非出非造非作非有為法天尊亦爾非生非出非造非作非有為法如大師性道性亦爾非生非出非造非作非有為法善男子諸仙大師之語有二種義一者世間語二者出世間語善男子天尊為諸弟子說世間語為諸真人說出世間語善男子是諸大衆之中復有二種一者求於小乘二者求於大乘我於昔日於元陽世界為諸仙弟子轉於法輪今者始於甘露城中為諸真人轉大法輪復次善男子有諸二人中根上根為中根人於元陽世界轉於法輪為上根人中法王定光真人等今於甘露城中轉大法輪廣開法幢為大利根善男子極下根者天尊終不為轉法輪極下根者即是邪魔愚癡之輩復次善男子求無上道者復有二種一者中心精進二者上心精進於元陽經中最能精進轉於法輪今於此城為上心精進轉大法輪復次善男子我往昔時於彼甘露城初轉法輪八萬真人得自然道果今於此城八千萬億人心無退轉於正真道中皆獲清淨復次善男子甘露城中元陽真人稽首請我轉於法輪今於此城定光真人稽首請我復轉法輪復次善男子我昔於彼甘露城轉法輪時演說無常苦空常樂今於此城轉法輪時如實演說真常之樂復次善男子我昔於彼甘露城轉法輪時所出音聲聞于大羅之上天尊今復於此城轉法輪時所出音聲遍於空歌國土九天恆河世界東西南北四維上下亦復如是善男子諸天真人凡有所說皆悉名為轉法輪也善男子譬如國王有所髙慢不生信敬未降伏者能令降伏巳降伏者能令信法得於安穩善男子諸天真人凡有所說亦復如是無量煩惱未調伏者能令調伏巳調伏者令生信向作諸善根譬如國王所有輕慢則能降伏信向真道天尊演法亦復如是能令一切諸煩惱賊皆悉清淨俱得寂定復次善男子譬如國王所有輕慢下上輪回天尊說法亦復如是能令下趣諸惡衆生上生人天乃至真道善男子是故汝今不應讃言天尊於此更轉法輪爾時元陽定光真人白天尊言我於此義非為不知所以問者為欲利益諸衆生故我以久知轉法輪者實是諸天具人境界非是邪見之人所能齊等爾時天尊告元陽真人善男子是名真人住於大乘得道之人所行聖行元陽真人白天尊言復以何羲名為聖行大尊告曰善男子聖者即是天尊以是義故名為聖行天尊若是諸真人之所行者則非邪見所能修行善男子是諸天尊安住於此元陽宮中而作如是開示分别演說其義以是義故名曰聖行及諸衆生邪見之人如是聞巳則能奉行故名聖行善男子是諸真人道士得是行已則得住於無所畏地善男子若有真人道士得住如是無所畏地則不復畏貪嗔煩惱生老病死亦復不畏惡道地獄餓鬼畜生之報善男子惡有三種一者邪淫恣意輕慢經寶二者誹謗善人不信有道三者犯五逆四重善男子住是地中諸真人道士終不畏墮如是惡處亦復不畏天魔惡鬼魑魅魍魎亦復不畏受諸汙穢苦惱悲酸是故此地名為無畏善男子真人道士百姓子等住是地中皆得無上正真大道自然福樂安穩之處善男子既得真道能壞地獄有能無退真道能壞畜生有得心樂真道能壤餓鬼有得飽滿真遒能壞天魔有得調伏真道能斷黑暗有得光明真道能斷寒氷夜庭有得溫暖真道能斷邊夷皆生中國真道能斷閻浮提皆得清淨無憂國土真道能斷諸天魔王皆信經法善男子是知真道能為一切衆生作大法眼能為一切衆生作大法幢能為一切衆生作大法航能為一切衆生作大法炬善男子當知真道即是天尊法王令諸衆生隨意即得欲知三千大千世界所有衆生心知所念亦悉能知欲以三千大千世界所有衆生內於已身一毛孔中隨意即能亦令衆生心無迫想若欲化作無量衆生悉令充滿三千大千世界中者亦能隨意能分一身以為諸身復合諸身以為一身雖作如是意無有著猶如寶華善男子真人道士得入如是真道法王巳即得住於自在之地真人道士住是自在地者得自在力隨欲生處即得往生善男子譬如聖王領四天下隨意所至無能障礙真人道士亦復如是一切生處者欲生者隨意往生善男子真人道士若見地獄一切衆生有可教化令住善根者真人即時往生其中真人雖生非本業果真人道士住自在地有因緣故而生其中善男子真人道士雖在地獄不受諸苦善男子真人道士所可成者如是善根無量無邊恆河億數尚不可說何況天尊威力功德福田而不測量爾時衆中有一真人名曰賢智有大威德成就神通得大總持法相具足得無畏𢣷即從座起前進作禮長跪執板白言如天尊所說諸真人道士所可成就功德智慧無量無邊百千萬億實不可說我意猶謂故不如是元陽經典何以故因是元陽大乘經力故能出生諸天尊無上正真大道爾時天尊讃言要乎深矣不可思議善男子如是如是如汝所說是諸大聖徽妙經典雖復成就無量功德欲比是經不得為喻百倍千倍無量元邊恆河沙數不可譬喻善男子譬如從牛出乳從乳出酪從酪生酥從酥生甘美法味若有服者衆疾皆愈所有諸藥悉入其中善男子天尊亦復如是從天尊出元陽妙經從元陽妙經出大道法從大道法出精進法從精進法出忍辱持戒法從忍辱持戒法出自然道果自然道果即是甘美法味所言甘美法味喻於道性道性者即是天尊善男子以是義故說言天尊所有善根恆河沙數不可稱計賢智真人白天尊言如天尊所說元陽妙經猶如甘美法味最為微妙若有凡夫衆生能服病自除愈一切諸無悉入其中我聞是巳竊復思念若有不能聽受是經當知是人為大愚癡無有善心天尊我於今者實能盡心盡意書寫如是元陽妙經受持讀誦令某痛利然後為人廣說其義天尊若有衆生貪著財物我當施財然後以是元陽妙經勸之令讀若尊貴者先以軟語隨順其心然後漸當以是元陽妙經勸之令讀若凡愚者當以威勢逼之令讀若驕慢者為作僕使隨順其心令其歡喜然復復以元陽妙經而教導之若有毀謗太乘經者當以威力迫之令伏既威伏巳然後勸令讀誦元陽妙經若有願樂真道經者我令應當躬往恭敬供養尊重彈指讚歎爾時天尊讚賢智真人善哉善哉汝今愛念真道經典貪真道經樂真道經信敬受持供養禮拜善男子汝今以此善心因緣當得超無量無邊恆河沙數真人道士成無上正真自然之果汝亦不久復當如我廣為大衆解說如是元陽妙經天尊所演祕密之藏善男子乃至過去天尊未出我於爾時作精進修天王修真人行悉能通達一切仙人所有經論修真常行具足威儀其心清淨不為邪見能生欲想之所破壞滅嗔癡火受持福業真常之樂周遍求索大乘妙典乃至不聞元陽經名字我於爾時住於妙樂之山其山淸淨流泉池沼樹木甘果仄塞其地處處充滿崖石之間有清流水多諸香華周遍界域驚禽駭獸不可因名甘果繁蔚種種芬苾復有無量香根我於爾時獨處其中准食諸果香根食巳繫心思惟精進忍辱之行無量嵗中亦不聞有天尊出世微妙經名善男子我修如是難行之行時彼天人等心大驚怪即共集會各各相謂而說偈言天尊說至典出法演元陽號為衆生父功德莊嚴王斷除貪惑行消滅愚癡狂淸淨妙樂山逍遙甘露場爾時衆中有一天王名曰普慧復說偈言如是諸真人淸淨為第一善解大乘義深能知祕密若有求至道當除意迹逸體逹苦空行永無煩惱疾爾時復有一仙人名曰定光而說偈言至法體玄妙寂寞理難窺自非總持者誰曉元始儀今得聞此教可以樹良規斷除諸惡業間出入無為說是偈巳諸真人天王言我今讚歎說偈咨請天尊為其賢士并諸衆生不為巳身為欲利益諸凡夫衆生而修種種無量苦行如是之人見生死中諸過咎故設見珍玩滿此地上諸山大海不生貪樂如果糞穢如是賢士棄捨珍寶所愛妻兒骨肉髓腦肢體手足所居屋室牛馬車乘亦不願求生於天上唯願一切得於歡樂如我所解如是賢士清淨無染衆結永盡唯欲志求無上正真大道自然之果復作是言如汝言者是人則為攝取一切世間有道樹者能除煩惱毀謗若諸衆生住是道樹蔭涼中者煩惱諸業皆得消滅若當未來世中作善逝者我等悉當得滅無量煩惱如是之事實為難信何以故一切衆生發自然道意見少微緣於自然意中即便動轉如水中月水動則動猶如畫像難成易壞自然道意亦復如是難發昜壞如有多人以諸鎧甲牢自莊嚴欲往討賊臨行陳時心生恐怖則便退走一切衆生亦復如是發自然道意從自堅牢見生死過心生憂怖即便退悔我見如是一切衆生發心之後皆生動轉是故我今雖見是人專修苦行無煩無惱住於道中其行清净未能信也我今要當自往試之知其真實堪任荷負正真大道自然重擔譬如車有雙輪則有載用鳥有兩翼堪任飛行修苦行者亦復如是我雖見其堅持禁戒未審其人有智慧不若有智慧則能堪任荷負正真大道自然之擔又如魚毋多有胎子成就者少又如果樹華多實少衆生發心求真無量及其終始少不是言真人我當共汝俱往試之猶如真金三種試之乃知堪燒打磨試彼苦行亦復如是爾是元陽真人自化其身變為猛獸形甚可長下至妙樂之山去其不遠而便立住是時猛獸心無所畏勇健難當辨才第一音聲清雅宣揚過去天尊所說以偈頌曰諸行本無為是其生滅法轉輪寄因緣雖捨還復合當諦專一心修持净三業正道可翹期度脫於貧乏說是偈巳便住其前所現形貌甚可怖畏顧盻左右觀於四方是苦行者聞說是偈心生歡喜譬如羈客於險難處夜行失伴恐怖憂遑忽遇同侣心生歡喜踊躍無量亦如宿病未遇良醫於鯈欻頃忽遇妙藥病得除愈心生歡善踴躍無量如人沒水遇得舟航得度彼岸心生歡悅亦復如是如人渴乏忽遇醴泉恣意酣飲得無渴乏心生歡喜亦復如是如被寃家趂逐匆然得脫無諸煩惱心生歡喜亦復如是如囚詣市卒聞恩赦而得解脫心生歡喜亦復如是亦如農夫遇旱忽便得雨而苗得長五榖豐熟心生歡喜亦復如是亦如人逺行忽便還家心生歡喜亦復如是善男子我於爾時聞此偈頌心生歡喜亦復如是即從座起四向顧盻而作是言向所聞偈誰之所演爾時四顧不見異物唯見猛獸即說是言誰開如是玄妙之門誰能雷震微妙音聲誰於生死眠睡之中而能曉了唱如是言誰能於斯開導生死飢餓衆生無上道味一切衆生迷淪苦海誰能於中作大船師一切衆生恆為煩惱疾病縈纒誰能於其中間為作良醫說是偈巳啓發我心猶如半月漸見光明善男子我於爾時一無所見唯見猛獸復作是念將是猛獸說是偈邪心復生疑似非其說何以故是物形容甚可怖畏若有得聞是偈頌者一切怖畏醜陋即除何有此物形容如是能説是偈不應火中遂生夜光芝草善男子我於爾時復作念言我今無有智慧而此猛獸或能得見過去仙人從天尊所聞如是偈頌我今當問即便前至是猛獸處作如是言善哉善哉汝於何所遇是過去離怖畏者所說偈頌定於何所而得如是光明寶珠偈頌之義乃是過去未來見在元始天尊正真之道一切世間無量無邊凡夫衆生常為疑惑羅綱所覆終身於道法中不能得間如是十方天尊所說玄義善男子我聞是巳即答我言是大真士汝今不應問我是義何以故我不飲食已經多日種種求覔了不能得飢餓困苦心迷誑語非是本心之所知也我今力能飛行虛空處處求食而不能得以是之故我說是語善男子我時即復語猛獸言若能為我說是偈頌竟我當終身為汝弟子汝所說者名字不終義亦不盡以何因緣不欲說耶夫以財物珍玩布施者則有竭盡而法施因緣不可盡也法施無盡多所利益我今聞此偈頌心有疑惑汝今幸可為我除斷說此偈竟我當終身為汝弟子猛獸語言汝今智太過物但自愛身都不見念今我定為飢餓困苦所遇實不能說我即問言汝所食者為是何物猛獸答言汝不須問我若說者令人怖畏我今復言此中險處更無有人我不畏汝何故不說猛獸答言我所食者唯人暖肉其所飲者唯人熱血自我所餐唯食人肉遍處求索困不能得世之多人皆有福德為諸天善神之所覆護而我無力不能得殺善男子我復語言汝但具足說此偈頌我聞偈頌已當以此身奉施供養猛獸我設命終如我之身無有所用當為惡蟲之所噉食而復不得一分之福我今為求無上正真大道之果捨不淨身以易淨身猛獸答言誰當信汝如是之言為真道故棄所愛身善男子我即答曰汝大無智譬如有人施他凡器而得真寶我亦如是捨不淨身得堅固身汝言誰當信者我今有證無量天王等皆證此事復有天眼諸真人道士為欲利益一切衆生修行供養大乘經典具四等六慧者亦能證知有十方天尊利益衆生亦能證我真道故捨此身猛獸復言汝若如是能捨身命當諦專心為汝分别說其偈頌善男子我於爾時聞是語巳心中歡悅即解巳身所著衣服為此猛獸敷置法座白言真人願上此坐我即於前長跪斂手而作是言唯願真人為我演說偈頌令得具足猛獸即說偈言生滅滅巳盡寂滅為常樂優遊七寶臺俳徊四明閣諸陋皆以滅清淨無穢惡捨命受真身善緣無愛著爾時猛獸說此偈巳復作是言神仙法衆汝今巳聞具足偈頌汝之所願為悉滿足必欲利益衆生可施我身我於爾時深忖斯義然後種種書寫此偈繫著衣服恐今死後形體露現即緣大樹時樹中神復問我曰咄哉仁者有何事故時答曰我欲捨身以答偈頌神又言曰如是偈頌何所利益我時答言如是偈頌乃是元始天尊之所演說我為此法棄拾身命不為名聞利養財物但欲利益無量凡夫故捨此身善男子我捨身時而作是念願令一切慳貪之人悉皆見我捨離此身若有愛惜有嗊嗃者亦令見我為一偈頌捨於身命如棄糞穢我於爾時作是語巳尋復捨命自投樹下下未著地虛空之中出百種聲爾時猛獸還復捨身於虛空之中捧接我身安置平地元陽真人神仙眷屬稽首作禮於我座前讃歡善哉真是賢智能大利益一切衆生欲於無明之中燃大法火為我愛惜天尊妙法故生撓惱唯願大德許今首悔懴謝罪愆汝於未來必定成就無上正真大道自然之果願見救度爾時真人及諸大衆一時辭退忽然不見太上靈寶元陽妙經卷之二
