front:
  text: 太上靈寶元陽妙經卷之三皇三
  hash: sha256:6c27f1f7a80f67ef4aeea94578395b83f106b871d5e10246c7afc73f22348c2c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_HFL_003-001a, image: hfl/0168/0168-110.png}
body:
  text: 慈行品爾時元始天尊於紫微瓊宫金暉玉殿九曲之房元陽世界告妙樂真人汝今於此國土修慈悲喜住於恩愛一子之地妙樂真人稽首禮拜上白天尊以何因緣名為恩愛一子之地天尊曰猶如父母養兒安穩心生歡喜善男子住此地中亦復如是觀諸衆生同於一地見有修善生大歡悅是故此地名曰恩愛猶如父母見子遇病心生憂惱初無棄捨善男子住是地中亦復如是見諸凡夫一切衆生為煩惱病之所縈纏心生憂惱哀愍如子諸毛孔中皆流出血是故此地名為一子之地如人小時拾取糞穢置於口中父母見巳心生愁怖恐為其患以水灌洗挑出糞穢善男子住是地中亦復如是見諸凡夫一切衆生身口意業多為不善真人見巳則以智手拔之令出憐愍凡夫不欲令彼流浪生死受諸煩惱是故此地名為一子猶如父母所念之子匆遇疾病俄頃之間子便終沒父母悲泣願與同命真人亦見一切衆生墮於三塗亦願與其俱生地獄何以故是一切衆生若受苦時或生一念攺悔之意我即為説修善方法彼於一念生善根是故此地復名一子猶如父母唯有一子行住坐卧心常愛念若有罪咎和聲軟語方便慰誘不加其惡真人道士亦復如是見諸凡夫一切衆生墮三惡道心生慈愍終不生瞋以惡加之是故此地復名一子妙樂真人向天尊言如尊所説其言袐密我今智短云何得解若諸真人住一子地能如此者云何天尊昔為甘露國王時行真人行斷法龍長者之命若得此地則應生心愛念凡夫若不得者復何因緣不墮三惡若憐愍衆生等視一子心無偏愛如此之言云何於義不相違背天尊住虛空地凡欲求乞飮食要須觀人若有於巳生嫉妬心則不須行乃至極飢亦不行乞何以故真人道士常作是念我憶往昔劫時於福田所生一惡念以是因緣墜落地獄受諸苦惱我今極飢終不乞食終不令彼於我有疑墮於地獄受諸苦惱復作是念若有凡夫一切衆生疑我立者我當終日端坐若有凡夫疑我坐者我當終日立不行卧是真人道士護念衆生尚有是心何況大聖通靈若得一子地者何緣天尊出如是言使諸凡夫起重惡心天尊告妙樂真人汝今不應作如此難言我為諸凡夫作煩惱因緣假使力能傾竭海水我終不為諸凡夫一切衆生作煩惱根本假令天地悉為非色水為堅相火為水相風為注相我終不為諧凡夫衆生作煩惱根本假使毁犯四盟禁罪及一凡夫誹謗正法現身得成十聖無畏我終不為諸凡夫衆生作煩惱根本假使下仙弟子及一邪見常住不變我終不為諸凡夫衆生作煩惱根本假使諸真人等犯四盟科律作於誹謗真正之法我終不為諸凡夫衆生作煩惱根本假使一切無量衆生斷滅道性我終不為諸凡夫衆生作煩惱根本假令擲索能繫縳風吹諸猛火燔燒石山我終不為諸凡夫衆生作煩惱根本寧與毒蛇猛虎同共一處不應發言聖人為諸凡夫衆生作煩惱根本善男子天尊真實能為凡夫衆生斷除煩惱終不為作煩惱根本妙樂真人如汝所言天尊往昔劫時殺法龍長者善男子我令小小蟲蟻尚爾不殺況法龍長者是於善士常作方便惠施衆生無量壽命夫施食者則為施命真人道士行布施時常施衆生無量危命善男子行不殺法壽命長遠真人道士行持戒時則為施與凡夫一切衆生元量壽命善男子檢口無惡得命長遠真人道士行忍辱時常勸凡夫一切衆生莫生怨想推直於人引曲還巳無有瞋恚得命長遠是故真人行忍辱時巳施凡夫一切衆生無量運命善男子專心修善得命長遠真人道士行精進時常勸凡夫一切衆生勤修善法凡夫行巳得壽命是故真人道士行精進時巳施凡夫一切衆生無量運命善男子修攝心法得壽長遠真人道士行靜定時觀諸凡夫一切衆生修平等意凡夫行巳得命長遠是故真人行靜定時巳施凡夫一切衆生無量運命善男子於諸法中心不放逸得命長遠真人道士行智慧時勸諸凡夫一切衆生於諸善法不生放逸凡夫行巳以此因緣得命長遠是故真人行智慧時巳施凡夫一切衆生無量還命善男子以是義故真人道士於諸凡夫一切衆生終無棄捨妙樂真人汝向所問殺法龍長者時得是地不善男子我時巳得愛念故斷甚命根非惡心耳善男子猶如父母唯養一子愛之甚重犯於官律是時父母以怖畏故若擯若殺雖復擯殺終無惡心真人道士為持善道亦復如是若有凡夫一切衆生謗元陽經者即以鞭杖苦而治之或害其命故令攺惡修於善道真人心常作如是思惟以何因緣能令凡夫一切衆生發起善心隨其方便要須為之法龍長者命終之後生玄沙北獄即有三念一者念我從何而來到此即便自覺從人道中來二者自念我今所生為是何處即便自覺知是玄沙北獄三者自念因何業緣而來至此即便自覺從謗元陽經典不信因緣為國王所殺而來生此覺是事已於元陽經典生恭敬意尋時命終生於福樂自在世界於彼而得壽命具足善男子以是義故我於往昔劫時乃與是人同於壽命云何名殺善男子善人掘地刈草斫樹斬截死尸罵詈呪詛以是因緣墮於地獄不妙樂真人白天尊言如我解聖人所説義者應墮地獄何以故如天尊昔為邪見説法汝諸弟子於諸草木莫知惡心何以故墮於惡道爾時天尊讃妙樂真人善哉善哉如汝所説應善受持善男子若因惡心墮惡道者真人時實無惡何以故真人道士於一切凡夫衆生乃至蟲蟻悉皆慈愍增益心故所以者何善知因緣諸方便故以方便力欲令凡夫一切衆生作諸福業善男子以是義故我於爾時以善方便雖奪其命而非惡心善男子若殺蟲蟻滿於億數微有罪報虎狼毒蛇蚊虻蚤虱熊羆貓獸能為一切凡夫衆生害者斬奪其命微有罪報若殺凶害惡人則有罪報殺巳不悔則墮三塗地獄若能懴悔發露三日斷食其罪即消無有遺餘若害善人德行道士及其父母女人與牛墮於地獄無有劫數善男子我及真人知殺有三何者名三所謂為三一者下二者中三者上下者蟻子乃至一切畜生唯除真人示現生者真人道士以願因緣示受畜生是名下殺以下殺因緣墮於三塗地獄具受諸苦何以故是諸畜生有徽善根是故殺者具受罪報是名下殺中殺者從凡夫乃至初學是名為中以是業因墮於三惡具受中苦是名中殺上殺者所謂謀危國主父母尊屬真士善人是名為上以是因緣墮於惡道三塗地獄具受上苦是名上殺若有能殺十惡五逆者則不墮於三種惡中善男子彼諸凶人等皆愚癡猶如掘地刈草斬斫樹木罵詈鞭撻無有罪報殺一凶逆之人亦復如是無有罪報何以故諸凶逆者無有信等無有利益衆生是故雖殺而無罪報善男子汝上所言天尊何故罵受業大士癡人食唾汝亦不應作如是問何以故天尊凡所發言不可譬喻善男子或有實語為人所愛非時非法不為利益如是之言我終不信善男子或復發言橫惡邪諂虛妄非時非法聞者不愛不能利益我亦不信善男子若有音聲雖復橫惡真實不謬是時是法能為一切凡夫衆生有於利益聞雖不信我要説之何以故天尊神通智力遍知方便善男子如我昔時遊於山林聚落城邑在樹下有一大鬼名曰警昌純食肉血多殺衆生復於其聚曰噉一人善男子我於其時為彼大鬼説諸法相然彼愚癡不受教法我即化身為大力神傾其宫室令不安住其鬼爾時率其部屬出其宫殿欲來拒擊大鬼見我時即惶怖迷悶躃地猶如死人我以慈念手摩其體即復起坐作如是言大哉有幸還得身命是大神力具大威儀有愍念心赦我罪咎即於我前生敬信心我即還復天尊之身復更廣説真要道法令其鬼神受不殺業即於其日聚落城中有一長者名曰法龍次應當死家人巳送付與鬼神鬼神得巳即以施我我既受巳而為長者更立名諱名曰儒首爾時其鬼即白我言今此眷屬唯仰血肉以供性命今以受法當何資給天尊答言從令巳去令諸真人道士隨有方法行業之處普皆令其施與飲食善男子如是因緣為諸仙人道士制如是法汝等從今常當施彼警昌鬼食若有住處不能施者當知是輩非我弟子即是天魔伴侣善男子天尊為欲調伏凡夫一切衆生故示如是方便之法非欲令彼生於怖畏善男子我今以木打護法鬼又於其時在一山頭推大鬼身令墮山下亦以針刺剪毛鬼身雖作如是亦不令彼諸鬼神輩有毁滅相直欲令彼安住正法示其如是方便之法善男子我於往時亦不罵辱邪見邪疑亦不愚癡食人涕唾亦不生諸惡道中三塗地獄受諸苦惱亦不毁謗道士及諸學人亦不違犯四盟之罪誹謗元陽正法微密經典非諸晚學之人亦非下仙之流善男子下仙晚學寶非邪見邪魔境界唯有聖人之所知委善男子是故汝爾不應問言天尊何緣嗔責諸仙晚學汝於諸天所有境界不應如是生於疑惑妙樂真人白天尊言猶如甘蔗噉嚼口中行於甘味我亦如是我聖人數聞經典多得法味所謂道味法味智慧味違解味天尊猶如真金屢加銷鍊轉轉益明調和柔軟光色妍淨其價難量然後乃為人天之寶天尊聖人亦復如是鄭重咨問則得曉諸深奧之義令得受持悟於無量凡夫衆生發自然道意然後為諸人天之所尊重爾時天尊讚妙樂真人善哉善哉真人道士為欲利益凡夫一切衆生故啓天尊如是妙法善男子以是義故隨汝意願説是元陽大乘微妙經典所謂愍念猶如一子之地妙樂真人白天尊言若諸真人道士修慈悲喜得一子地者修捨心時復生何地天尊言善男子汝善知時知我有説汝則咨問真人道士修捨心時則能住於虛空平等法地善男子真人道士住是虛空平等法地則不見有六親眷屬怨憎中心善男子猶如虛空無有六親眷屬乃至無有怨憎一切諸法亦復如是無有眷屬一切諸漏真人道士見一切法亦復如是其心平等猶如虛空何以故善能觀度諸空法故妙樂真人復白天尊言云何名空天尊曰善男子如是空者所謂內空外空無為空有為空一切諸法皆悉是空善男子云何觀於內空真人道士觀內法空是內法空無有眷屬怨憎中心真常之樂天尊法子所有財物是內法中雖有道性而是道性非內非外所以者何道性常住無有遷動是名真人道士觀於內空所謂外空者亦復如是無有內法內外空者亦復如是善男子唯有天尊法子道性不在內外二空何以故如是等法真常之樂是故道法不名為空是名內外俱空善男子有為空者有為之法悉皆是空所謂內空外空內空者真常之樂天尊法子第一義空是中道性非有為法是故道性非有為法空善男子云何真人道士觀無起空是無為法悉皆是空所謂無常苦樂無我隂界入衆生相有為漏內法外法無為法中平等一法非有為法非無為法非有為性非無為性是名常住非內非外是名真人觀無為空云何真人道士觀無始空是真人道士見生滅無始皆悉空寂所謂空者真常之樂皆悉空寂無有變易衆生命相三寶法性及無為法是名真人觀無始空云何真人觀於法空是真人道士觀一切法本性皆空所謂隂界入常元常苦無苦樂無樂淨不淨觀如是一切諸法不見本性是名真人道士觀於性空云何真人道士觀無所有如人無子言宅舍空究竟觀空無有親愛愚癡之人言諸十方皆空貧賤之人言一切空如是所計或空或非空真人觀時如貧賤人一切皆空是名真人道士觀無有空云何真人遒士觀第一法中皆悉是空善男子真人道士觀第一時是從眼生從何而來及其滅時去無所至昔無今有本有還無推其實性無眼無主一切諸法亦復如是云何名為第一義法有業有報不見作者如是空法名第一法空是名真人道士觀第一法空云何真人道士觀於空法空是空中乃是下仙弟子所迷沒處善男子是有是無是名空空是是非非是名空空善男子三世真人尚於是中通逹少分猶如微塵善男子如是空法亦復不同下仙弟子所得空空是名真人道士觀於空空之法善男子云何真人道士觀於大空善男子是大空者謂天眼智慧是名大空善男子真人道士得如是空妙則住於虛空等地我今於大衆中廣為演説諸空義時有無量無邊真人道士即得住於虛空等地善男子真人道士住是地中於一切法無有滯礙繫縳拘執心無迷悶以是義故名為虛空之地善男子猶如虛空於可愛色中不生貪著不愛色中不生喜怒真人道士住是地中亦復如是於好色中心無貪著善男子猶如虛空廣大悉能容受一切諸物真人道士住是地中亦復如是廣大虛空悉能容受一切諸法以是義故復得名為虛空之地善男子真人道士住是廣大虛空地中於諸妙法亦見亦知若行若緣若性若相若因若果若凡夫心若根若本若善知識若善因緑者善法戒若善施為若善科禁如是等法一切知見善男子真人道士住是地中知而不見云何為知知自我法投水赴火自墮深坑常翹一足五熱灰身常卧塵中棘刺樹木惡草牛糞之處粗在布服茹菜噉草若行乞食限至一家主若言無即便捨去設主更招終不顧盻不食肉味世問五味如是等法皆悉除斷能為無上解脫因者無有是處是名為知云何不見真人道士不見一人行如是法得正解脫是名不見善男子真人道士亦知何等為見見諸凡夫一切衆生行是邪法必墮地獄是名為見云何為知諸凡夫衆生從地獄出生於人中若能修行布施乃至具足諸精進法是人必得入正解脫是名為知善男子真人道士復有亦見亦知云何為見見常無常見苦無苦見樂無樂見淨無淨見我無我是名為見云何為知知諸聖人定不畢竟入不滅度知諸聖人身如金剛不壞非是煩惱所成就身又非臭穢腐敗之身亦復能知一切衆生悉有道性是名為知善男子真人道士復有亦如亦見云何為知知是衆生求於妙法是人順流是人逆流是人正住如是衆生巳到彼岸順流者謂凡夫之人逆流者從無為乃至諸仙正住者真人道士等到彼者所謂天尊神通慧眼應正遍知是名為知云何為見真人道士住於元陽世界大乘法門修行妙行妙行心以淨天眼見諸凡夫一切衆生造身心口業三事不善墮於幽牢地獄之中見諸衆生修善業者命終當生天上人中見諸凡夫一切衆生從暗入暗有諸凡夫一切衆生從暗入明有諸凡夫一切衆生從明入闍有諸凡夫一切衆生從明入明是為知見善男子真人道士復有亦知亦見真人道士知諸凡夫一切衆生修身修行修法修戒修定修慧是人今生惡業成就或因貪欲瞋恚愚癡是業必應三塗受報如是之人直以修身修行修法修戒修定修慧見世輕受不墮三塗云何是業能得理報發露懴悔所有諸業既悔之後更不敢作慙愧成就供養三寶故常自呵責故以是因緣不墮三塗見世受報所謂疾病百種疹患罹諸死殃飢餓困苦身體楚痛如是等事見世輕報是名為知云何為見真人道士見如是人不能修習身行法成定慧造少惡業此業因緣見受報對是人少惡不能懴悔不自憶貴不生慙悚無有畏忌是業增長幽牢受報是名為見復有知而不見云何知而不見知諸凡夫一切衆生皆有法性為諸煩惱之所覆蔽不能得見是名知而不見復有知而少見真人道士等知諸凡夫一切衆生皆有法性見不明了譬如暗夜所見不了復有亦見亦知所謂天聖人亦見亦知復有亦見亦知不見不知亦見亦知者所謂世間文字言語衣服卧具牀席屏帷飲食五味世間珍玩衆生命相是名亦見亦知云何不見不知聖人所有玄妙之義無有男女乃至園林是名不見不知復有知而不見知所布施知所供養知所受者知因果報是名為知云何不見不見布施供養受者果報是名不見真人道士知有八種即是元始天尊神通慧眼所知妙樂真人白天尊言真人道士能如是知得何等利天尊言善男子真人道士能如是知得四無礙力無礙法無礙義無礙智無礙慧無礙法者知一切法及法名字義無礙者知一切法所有諸義能隨諸法所立名字而為作義智無礙者隨有經論深奧之理而能解析慧無礙者所謂真人道士凡所演説諸仙有疑者無有障礙悉能明了一切法相善男子是名真人能如是知見即得如是四無礙法善男子法無礙者真人道士偏知神仙大士諸妙經典深奧之法義無礙者雖有三乘知歸其一終不有異差别之相智無礙者真人道士於一法中作種種名經歷天地無量劫中説不可盡下仙弟子能作是説無有是處慧無礙者真人道士於無量劫為諸凡夫一切衆生演説諸法若名若義方便異悅不可窮極善男子法無礙者真人道士雖知諸法而不取著義無礙者真人道士雖知諸義而亦不著智無礙者真人道士雖知名字而亦不著慧無礙者真人道士雖知有慧如是最上而亦不著何以故若取著者不名真人妙樂真人復白天尊言若不取著則不知法若知法者則是取著若不知著則無所知云何天尊説言知法而不取著天尊言夫取著不名無礙無所取著乃名無礙善男子一切諸真人等有取著者即名無礙若無無礙者不名真人當知是人名為愚凝何故取著名為愚凝一切愚癡取著於色乃至著識以著色故則生貪心生貪心故為色染繫乃至為識之所染繫以染繫故則不得免生老病死愁惱大苦一切煩惱是故取著名為愚癡以是義故一切愚癡無四無礙法善男子真人道士巳於無量恆河沙之劫知見法相以知見故則知其義以見法相及知義故而於色中不生繫著乃至識中亦復如是以不染故真人於色不生著心乃至識中亦不生著以無著故則不為色之所繫染乃至不為議之所染故則能免生老病死憂苦大悲諸煩惱業以是義故一切真人得無礙法善男子以是義故我為弟子元陽經中説繫染者名為邪執若不染者則脫邪執猶如有罪凡夫之人為官所繫無罪之人官不能執真人道士亦復如是有執染者為邪所執無染繫者邪不能執以是因緣真人道士而無所染善男子無礙法者真人道士善知方便而不妄失所謂方便者如土如山如眼如雲如人如母一切諸法亦復如是無礙義者真人雖知諸法名字而不知義得無礙義能知其意云何知義所謂如地能生一切草木凡夫衆生以是因緣名為如地善男子所謂如山者真人道士修學道法思惟其義令無搖動以是因緣故名如山所謂如眼能有諸光照了相見一切義以是因緣名為如眼所謂如雲能有蔭潤利益衆物以是因緣名為如雲所謂如人能持一切諸法妙義為世良醫療諸疾病以是因緣名為如人所謂如母愛養兒子心無偏黨以是因緣名為如母善男子真人道士知一切法深奧之義亦復如是無礙辭者真人道士以元陽妙典大乘之辭開演一句無有疑難亦無有義譬如一切舍宅草木等名善男子何故無義如是之義乃是真人道士諸天聖人境界辭者凡夫境界以知其義以是因緣名辭無礙無礙慧者真人道士知法義時於恆河沙劫説其義味理不可窮是名無礙慧者善男子真人道士於久遠劫時修第一義法故得無礙義亦於久遠劫時修習靈寶大洞真經故得無礙法亦於久遠劫時修習三清妙法得於智慧無有疑難善男子諸仙弟子若有得是四無礙力者無有是處如是元陽經中我説諸仙弟子有四無礙力諸仙弟子真實無有以是因緣真人道士為度凡夫故有如是四無礙力諸仙弟子修下仙法志願仙品未登妙果以是因緣諸仙弟子有四無礙力妙樂真人等即起于席長跪斂板上白天尊今聞宣説具了道源諸天時衆稽首作禮各還本座太上靈寶元陽妙經卷之三
