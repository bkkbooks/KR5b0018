front:
  text: 太上靈寳元陽妙經卷之九皇九
  hash: sha256:0851759e88cc1955467b968e9b0947fdffdac5d86a244aec4add22f9810b7fef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_SJB_009-050972a, image: sjb/05/050972a.png}
body:
  text: 德行髙貴品爾時元始天尊告元陽眞人言善男子善女人若有能修行供養无上元陽妙經得於十種功德不可恩議聞者驚疑非隱非顯非去非來非生非滅非難非易非相非非相如是法相無有形貌世間所無何等爲十種功德一者有五何等爲五一者所未聞者而能得聞二者旣聞玄妙能爲利益三者能斷諸疑體於至理四者智慧之心質直無曲五者深知元陽袐藏是爲五事何等所未聞者而能得聞所謂甚深玄妙之義一切衆生俱得道性一切經法無有差別若有善男女至心願念所營在法究竟得入无上正眞之道常住无變恒无懈退非有爲非无爲非有漏非无漏非色非不色非空非不空非名非不名非相非不相非有非不有非因非不因非果非不果非明非不明非闇非不闇非出非不出非常非不常非斷非不斷非過去非不過去非未來非不未來非因縁非不因縁如是等法甚深甚妙甚玄甚奥昔所未聞而令得聞苦所未見而令得見所謂一切經書所謂一切方法所謂一切伎藝所謂一切科律如是等經昔未曾聞今於此經而得了悟復有三清祕要七部神圖如是深奥之義今因此經而得知之善男子善女人是名所未聞者而能得聞旣得聞巳是大利益若能讀誦受持具自然道意能具知一切方法大乘經典甚深義味譬如有人懸於明鏡見其色像曉了分明无有障蔽元陽寳鏡亦復如是眞人執持得見元陽經典深奥之義亦如有人處於闇室執大炬火悉見諸物元陽法烥亦復如是眞人執持得見元陽深奥之義亦如日出睗谷有大光明悉能照朗令得一切遠見虛空是大元陽清浄慧日亦復如是照了幽㝠深遽之處令一切衆生遠見眞道所以者何以能聽受是元陽上品妙經皆獲无上道果善男子若有至心讀誦元陽微妙經典得知一切諸法名諱通達玄義爲他廣説開悟凢夫能知元陽諸法至理善男子其聽受者雖知元陽經字不知元陽義理深妙若能書寫授持讀誦爲人演說開導沉迷令知其義則能知其義是大利益增長法橋復次善男子聽此經者聞有道法未能得見至心願念即得悟解書寫讀誦爲人演說尋思其義則得見之聽是元陽經者聞有神通未能得見發心願念至慕神仙作是念巳便能知法具諸道意了逹道源於諸天魔惡鬼虎狼毒獸怖畏之處得無所畏開示分别玉簡金文丹章紫字演説其義无有差違不從他聞而能自知无上正眞道意是名聞巳能爲利益又復除疑心者疑有二種一者疑名二者疑義聽是經者斷除疑心思惟義者斷疑義心復次善男子疑有五種一者疑道虛空有指的不二者疑道恍惚是眞常不三者疑道隱祕是眞樂不四者疑道幽玄是清淨不五者疑道顯晦是實義不聽是經者則得永斷疑惑之心書寫讀誦爲人演説思惟其義五疑永斷復次善男子疑有三種一疑无上正眞之道爲有爲无二疑三十六部尊經爲有爲无三疑一切妙法爲有爲无聽是經者如是三疑永滅无餘書冩讀誦爲他廣說思惟其義則能了知一切衆生悉有法性復次善男子若有衆生不聞如是元陽經典疑心甚多所謂如常不常如樂不樂如浄不浄如我無我如命非命如凢夫非凢夫如究竟不究竟如未來非未來若有若非有若苦若非苦若樂若非樂若道若非道若滅若非滅若法若非法若眞若非眞聽是經者如是諸惑悉能除斷復以善男子若有不聞如是經者復有種種衆生多有疑心所謂色是我邪受質相因識是我邪眼能見邪我能見邪乃至識能知邪我能知邪色受報邪我受報邪乃至識受報邪我受報邪色至他境邪我至他境邪乃至識亦如是生死之法有始有卒邪無始無卒邪聽是經者如是等疑亦得永斷復有人疑邪見犯四盟科作五逆罪毁謗道經如是等人有法性邪無法性邪聽是經者如是等疑悉得永斷復有人疑世間有際邪世間無際邪有十方法界邪無十方法界邪聞是經者如是衆疑亦能除斷是名斷疑惑之心復次善男子慧心正直无邪曲者意若有疑則所視不正一切衆生若不得聞是元陽上品微妙經典所見邪疑乃至下仙悟道之人猶懷邪曲云何名爲一切衆生所見邪曲於有漏中見常樂我淨於天尊所見无常苦不淨無我見有凢夫壽命長短非有相處非無相處以爲元陽之宮有八聖道有見斷見如是等見名爲邪曲善男子善女人若得聞是大乘經典修行聖道則得斷除如是邪曲云何名爲一切邪曲若復有人書寫讀誦爲他演説通解其義則得正直無邪曲見善男子修如是元陽上品經典知此經微妙從无量劫來至心修行晨夕願念得入无上正眞之道復次善男子能知元陽上品深宻之義爲他演說曉悟衆生悉能知道除謗法心盡惡逆罪然後得成无上正眞道果是名甚深袐宻之義復次善男子云何復名甚深之義雖知衆生實无有我而於未來不失業果雖知六情於此滅盡善惡之業終不敗亡雖有業根不得作者雖有妙處無有去者雖有執縳無受縳者雖有劫濁終无滅者是名元陽德行髙貴甚深袐奥之義爾時元陽眞人上白天尊言如向所說聞不聞義是義不然何以故道若有者便應定有道若無者便應定無無不應生有有不應滅無如我所聞是則爲聞若不聞者則爲不聞云何而言聞所不聞天尊若不可聞是爲不聞若巳聞者則便不聞何以故巳得聞於道故云何而言聞所未聞見所未見譬如去者至則不去去則不至亦如生巳不生亦如聞巳不聞天尊若不聞聞者一切衆生未有道心即應有之未得尸解亦應得之未見法性應見法性云何復言眞人雖有法性未得明了天尊若不聞者眞人往昔曉悟從誰得聞若言得聞何故眞人於天尊所復言不聞若其不聞眞人何以得稟无陽之號若如是者一切衆生不聞經典亦得稟元陽之號不眞人若當不聞如是經典見無上道者一切衆生不聞是經亦應得見无上正眞道不天尊言是色者或可見或不可見響亦如是或是可聞或不可問是大變動非色非聲云何而言可得見聞眞人於是了然驚悟言過去巳滅則不可聞未來未至亦不可聞見在聽時則不名聞聞巳聲滅更不可聞亦非末來過去見在若非三世則不可說若不可説則不可聞云何而言眞人修是元陽妙經聞所不聞爾時天尊歡喜讃歎元陽眞人及諸大衆言善哉善哉汝今深知妙理洞達玄微一切諸法如幻如化如風如電亦如泡沫芭蕉之樹空無有實非命非我無有眞相時大衆中儵欻之頃有大光明徧照國境非青非黄非白非黒爾時大衆遇斯光巳身心快樂譬如眞人初得道果爾時元陽眞人白天尊言今此光明從何而有天尊嘿然不答元陽眞人心懷戰懼逡廵不安叩頭稽首瞻視靈顏輒敢諮問天尊以何因縁有此光明照於大衆天尊嘿然不答爾時無鞅數衆浮空道士見此明朗自相謂言今此光明誰之所有天尊又復嘿然不説明律仙人總持法衆復白天尊以何因縁有此盛光徧照虛空无有障蔽如是大衆自相諮問無能曉者爾時元陽眞人慇懃慊款頭腦至地泣淚和聲低心下意諮審尊顏願垂開示曉悟來生天尊於是含笑告元陽眞人曰如是光明名爲智慧智慧者即是眞道眞道之法無有因縁云何有問有何因縁故有是光明是光明者名爲元陽妙法元陽妙法者則名爲眞道眞道之法不從縁生云何仙人疑問何因縁故有是光明是光明者即是元始智慧元始智慧者即是眞道之法不從縁生云何道士問於因縁光明者名爲大慈大悲大慈大悲者名爲元陽眞道元陽眞道之法者不從縁生云何仙人問於縁生光明者即是思眞念道思眞念道者是名眞道之法不從縁生云何仙人問於因縁光明者即是一切學道之人吞精咽氣吐納服御之法即名眞道眞道之法不從因縁云何仙人問於因縁光明者即是元陽上品法燈天尊言眞人汝今莫入諸法麤穢之義我今於此東方恒河世界名曰不動之處國土緬平无有沙磧其地七寳莊嚴无有溝坑其諸樹木華果茂盛无時不有若有衆生聞其華香身心清浄曉悟大乘譬如仙士獲於道果復有一大河水其水香美八味具足若有衆生在中浴者皆得清浄了然悟道其河有種種之華種種之香一切衆生聞其華香皆得清淨釋然悟道復有无量虎狼獅子諸惡鳥獸其心相視猶如赤子彼世界中一切衆生無有犯負之者毁謗道法及有惡逆等罪其土調適无有瘴癘煩惱貪欲嫉妬之人无有日月晝夜時節猶如龍漢之運其土人民聦明正直无有憍慢之心一切衆生皆悉悟道具大功德其心悉皆尊重正法修於大乘愛樂大乘思念大乘護惜大乘功行成遂得大總持心常憐愍一切衆生復有達解眞人光妙音深曉元陽正教調御天人師隨其處所宣告衆生無不得聞爲十方至眞大聖衆講說如是大乘經典善男子及諸眷屬若能修行大乘元陽妙經所不聞者皆能得聞无上要道西方去此二十恒河沙國土彼有世界名曰大堂國土多有山陵岡阜沙礫荆棘周徧充滿其土人民常有飢渴四時苦惱恒無歡泰爲其愚癡不能恭敬求於正道貪著非法之縁於非法縁中習行邪法不信正道壽命短促常行奸詐王法持之王雖有國不知滿足於他所有生貪利心與兵相伐枉死者衆國王尋行如是非法諸天神祗心無歡喜故降災旱五榖不登人民飢餓多有疾病國土不寜達解眞人光妙音調御天人師愍念衆生遊行世界於其國土化作七寳香林種種莊嚴種種神變種種竒麗與諸總持大聖獨歩仙人演説元陽上品妙經開發衆生令解智慧歸依无上正眞之道其土人民聞説是經各各驚疑人人嗟訝以何因縁忽聞聖人微妙經典從何而來我今歡喜得遇眞道爾時達解眞人光妙音與七千四百眞仙春屬俱持幡蓋華香種種枝樂種種莊嚴供養之具至於極樂土中鶱林寳樹之間巳用所持供養之具供養元始天尊稽首恭敬左繞三帀恭敬巳畢却退一面天尊問逹解眞人光妙音及諸善男子等汝爲至來爲不至來眞人光妙音白天尊言至亦不來不至亦不來我觀此義都無有來天尊諸行若常亦復不來若是无常亦无有來若人見有衆生性者有來不來我今不見衆生定性云何當言有來不來有輕慢者見有去來无輕慢者則无去來有取行者見有去來无取行者則無去來若見眞人畢竟无上道者則有去來不見眞人畢竟无上道者則无去來不聞道性者則有去來聞道性者則無去來若見狐疑下仙之人則有去來不見狐疑下仙之人則无去來若見眞人无常樂我淨則有去來若見眞人有常樂我淨則无去來天尊且置斯事敢有諮問願垂哀愍少見聽許天尊言善男子隨汝所問今正是時我當爲汝次第分别一一解説曉悟諸疑所以者何諸法難見千載因縁有遇靈文三淸七部何由可見汝等應當精進專心聽受爾時逹解眞人光妙音元陽眞人等旣蒙聽許兼被教戒即白天尊言云何眞人有能修行元陽上品聞所不聞爾時天尊答言善哉善哉善男子汝今受持元陽妙經復值我能善爲講說汝今有所疑滯我爲大醫王爲汝剖判深疑汝於道性猶未明了我有法炬能爲照明汝今欲濟煩惱大河我能爲汝作於舟揖汝於我所生父母想我亦於汝生赤子心汝心今者貪正法寳諦聽諦聽善思念之吾當爲汝次第開張使无疑滯眞人善男子欲聽法者今正是時若得聞法當生恭敬至心讀誦尊重正法於其法所莫求其過莫念貪欲瞋恚愚癡莫覩法師縱性行惡旣聞經巳莫生輕慢莫爲貪求名譽利養當爲度世甘露法藥莫生憎愛起於疑心我聽法巳先自度身然後濟人先自悟身然後悟人先自安身然後安人於道法之中應生念想於生死中生大苦想於道法之中應生常樂我浄之想當爲大乘莫爲小見於一切法當無所住亦莫專執一切法相於諸法中莫生貪想常生知法見法之想善男子必須精進讀誦如是經典則能永出生死苦海登於慈善之岸汝冝遵奉不得起疑惑之心眞人光妙音稽首禮問元始天尊言有漏之法若有生者爲是常耶是無常耶生若是常有漏之法則典有生生若無常即有漏是常天尊若生自生生无自性若能生他以何因縁不生無漏天尊若未生時有生者云何於今名爲生若未生時无生者何故不說虚空爲生耶於是天尊告諸大衆善哉善哉善男子深達法相具了道源不生生不可說生生亦不可説生不生亦不可説不生生何以故以修道得故云何生亦不可說以生无故云何不生不可說以有得故云何有因有因縁故亦得説十因縁法爲生作因以是義故故亦可得説善男子汝今莫入甚深空定何以故大衆鈍故善男子有爲之法生亦是常以住无常生亦无常住亦是常亦生生故住亦无常以本無今壞亦无常善男子以性故生皆悉是常念念滅故不可說常是正眞之道能除滅故名无常善男子有漏之法未生之時己有生性故生能生無漏之法本無生性是故生不能生如火有本性遇縁即發眼有見性因色乃明故見一切衆生生法亦復如是由其有性遇感因縁父母和合便則有生爾時達解眞人光妙音元陽眞人及七千四百萬衆聞是經巳心懷踴躍恭敬慇戁叩頭稽首齊執玉板敢問元始天尊言今蒙故誨宣暢泠然元陽袐藏始得悟解聞所不聞亦令七千四百萬衆深解諸法不生生等天尊我今巳解斷諸疑網然此衆中有一眞人名曰眞定光復欲諮問唯願垂許爾時天尊告眞定光善男子隨意問難吾當爲汝分别解説於是眞定光與諸徒衆俱從座起更整衣冠長跪稽首而白天尊言此土衆生當造何業而得生彼不動世界其土眞人云何而得智慧成就人中之尊有大威德具修諸行利智捷疾聞則能解爾時天尊而說偈言一切諸衆生皆含至道性若能受妙經即登常樂淨布施及衆生救濟諸貧病斷除疑惑心調和於識鏡思念元陽經晨夕常歌詠從容出九天逍遥登八正善神相擁護天眞悉暉映旣得離三災復能超九橫書寫及受持當須勤苦行憐愍善男女成使終天命輪轉成高眞因縁偶賢聖今日得苦空永息於馳競天尊說此偈巳一切時衆咸皆醒悟更无疑滯爾時元陽眞人眞定光白天尊言我今巳知所造業因得生彼國是元陽髙貴之品憐愍一切衆生上所諮問天尊演此妙法則能利益安樂人天爾時天尊即告元陽眞人善哉善哉善男子汝今於此當須至心聽吾分别一一解説有因縁故未至不至有因縁故不至至有因縁故至善男子夫不至至者是大元陽高貴之品凢夫未至以有貪欲瞋恚愚癡故身口意業不清淨故及受一切不淨物故犯五逆罪謗眞善法故是義故未至不至善男子夫不至至者以無貪欲瞋恚愚癡身口惡故不受一切不淨物故不犯四重故不謗無上道故不作邪疑心故不作五逆罪故以是因縁名至不至善男子以何因縁故名至不至至者名爲二十五有一切衆生常爲无量煩惱諸結之所覆蔽徃來不捨猶如輪轉是名爲至爲欲濟度諸衆生故示現在中亦名爲至善男子何因縁故名爲至至至者即是二十五有一切凢夫煩惱因縁故名至至善男子聞所不聞亦復如是有不聞聞有不聞有聞聞云何不聞聞善男子不聞者名大元陽之品何故不聞非有爲故非音聲故不可說故云何亦聞得聞名故所謂常樂我淨以是義故名不聞聞爾時元陽眞人一切時衆稽首長跪白天尊言如天尊所說元陽髙貴袐宻之義不可得聞云何復言常樂我浄而可得聞何以故天尊斷煩惱者名爲元陽髙貴之品若未斷者名爲不得以是義故元陽髙貴之品本无今有若世間法本無今有則名无常譬如汝等本无今才巳有還无故名无常元陽髙貴之品若爾云何說言常樂我浄復次天尊凢因莊嚴而得成者悉名无常元陽髙貴之品若爾應是无常何等因縁所謂三十六部尊經三清祕藏七部眞書如是等法皆是成就一切因縁故名无常復次天尊才名无常若元陽髙貴之品是有亦應无常如天尊昔於元始之先說諸妙經皆有變化以是義故名爲无常復次天尊可見之法名爲无常如昔所説元陽髙貴之品則得斷除一切煩惱復次天尊譬如虛空於諸衆生等无障礙故名爲常若使元陽髙貴是常何故衆生有得有不得元陽髙貴若爾於諸衆生不平等者則不名常天尊譬如百人共有一怨若害此怨則多人受樂若使元陽髙貴是平等法一人得時應多人得一人斷結應多人亦斷若不如是云何名常譬如有人恭敬三寳供養經書尊重讃歎晨夕不倦國王王子父毋師長則得利養是不名常元陽高貴亦爾不名爲常何以故如天尊昔於元始之運演說此經告元陽眞人言若有人能恭敬讀誦此經則得斷結受无量樂以是義故不名爲常天尊若於元陽中有常樂我淨名者不名爲常如其無者云何可說爾時天尊告逹解眞人曰元陽之體非本无今有若元陽之體本无今有者則非无漏常住之法有道无道性相常住以諸衆生煩惱覆故不學眞道便謂爲无元陽眞人以戒定慧勤修其心斷煩惱巳便得見之當知眞道是常住法非本无今有是故爲常善男子如闇室中種種七寳人亦知有闇故不見有智之人善知方便燃大明燈持徃照朗皆得无之是人於此終不生念種種七寳本无今有眞道亦爾昔自有之非始今也煩惱闇故衆生不見大智眞人以善方便燃智慧燈令諸大衆得見眞道常樂我淨是故智者於此眞道不應說言本无今有如是大衆汝言因莊嚴故成眞應无常者是亦不然何以故如是大衆眞道之體非生非岀非實非虛非作業生非是有漏才爲之法非聞非見非墮生死非別異相亦非同相非徃非還非因非果以是義故眞道是常恒不變易是以无量劫中修習善法以自莊嚴皆得了見如是大衆譬如地有八味之水一切衆生而不能得才慧之人用功穿鑿則便得水眞道亦爾譬如盲人不覩日月良醫療之而能得見如是日月非是今有眞道亦爾昔來有之非在今也善男子如人有罪繫之牢獄久乃得岀還家得見六親眷屬眞道亦爾如是大衆汝言因縁故眞道之法應無常者是亦不然何以故善男子因有五種何等爲五一者生因二者和合因三者住因四者增長因五者逺因云何生因生因者即是種種煩惱種種狐疑及諸草木子是名生因云何和合因如善與善心和合不善與不善心和合無記與不記心能和合是名和合因云何住因如下有住屋則不傾山河樹木因大地故而得住立何有四大无量煩惱衆生得住是名住因云何增長因因縁服翫飲食等具故今衆生增長如諸種子火所不燒鳥所不食則得增長如諸道士四衆男女等依於眞人善能之者而得增長如因父毋子得增長是名增長因云何逺因譬如天尊徃昔劫時演說此經爲諸來生作大因縁所有疑滯皆能除洗是名遠因又如父母血氣爲衆生遠因如時節等名爲遠因善男子眞道之體非如是等五因所成云何當言是无常因復次善男子復有二因一者作因二者了因何等爲作因如陶師輪繩是爲作因如燈燭照闇中物是名了因善男子元陽髙貴經者不從作因而有唯有了因了因者所謂明了元陽上品深奥義味爲諸來生作大舟檝作大橋梁作大因縁作大福田令諸時衆皆得无上正眞道果爾時元陽逹解眞人光妙音稽首上白元始天尊曰旣蒙訓誨開導衆生種種方便種種宣說委曲教化子細讃揚過泰之歡實爲无量然由宿滯尚才狐疑不鄙卑陋輕觸靈顏叩頭上啓更有諮問天尊未審一切衆生修何功德免離哀憂修何布施可得富饒修何福田可得豐足發何志願可得道眞天尊曰如人種樹爲得隂涼爲得花果及以材木若人修行心力專精嘿念洞思自然廣作功德布施窮乏貧賤之人慈念衆生恩愛萬物不惜珍寳所營在法修如是行則能深解妙法成於眞道能爲一切衆生斷除業障善男子譬如有人墮大海水抱持死屍則得度脫眞人修无上道行布施時亦復如是如彼死屍善男子譬如有人閉在深獄門户堅牢唯有厠孔便從中至无礙處眞人修无上道行布施時亦復如是善男子譬如貴人恐怖急危更无恃怙發心願念元陽經者皆得安穩眞人修无上道者行於布施亦復如是善男子及諸時衆汝等當知元陽祕藏即是无上正眞之道若能按經修行晨夕願念於家别立精舍方丈之室燒香供養積年不退如此精誠皆獲自然之果見世得免憂危煩惱之患爾時元陽眞人及諸大衆神仙眷屬七千四百萬衆一時稱善而作偈言眞道體靈妙至法甚冲玄祕跡紫微宫曜景大羅天玄都至學士清虚常自然轡鵠遊碧漠策鳳徃青煙金閣禮大聖玉戸會髙賢元陽時四衆偶此大因縁三淸旣啓蘊七部己相傳開發深疑滯晩悟昔憂煩一切善男子皆得淨身田逍遙四正道放曠九華巔蕭聲岀雲外梵響度風前偶逢元始運不謝上皇年調御天人師割我恩愛纒損絶諸疑網瞋癡遂乃捐四衆稽首慶辭謝大神仙今日蒙開度願卒大慈憐元陽眞人及諸時衆說偈都畢一時恭敬作禮而去太上靈寳元陽妙經巻之九
