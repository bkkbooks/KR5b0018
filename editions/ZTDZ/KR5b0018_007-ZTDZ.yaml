front:
  text: 太上靈寳元陽妙經卷之七皇七
  hash: sha256:adc73421b2e2fa65f91110ce7711f4345f950c9aa01af852abdc517ddbf351c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_SJB_007-050960b, image: sjb/05/050960b.png}
body:
  text: 觀行品下爾時元始天尊在元陽世界寳騫林樹間將欲遁世時見國王名曰善種悶絶躃地即告大衆我今當爲是王住世至無數劫不入眞道於是元陽第三眞人名曰隨業稽首上白天尊言當爲一切衆生不入眞道何故獨爲善種國王天尊言善男子是大衆中无有一人謂我必定入於眞道善種國王定謂我當畢竟永滅是故躃踊自投於地善男子如我所言爲善種國王不入眞道如是深奥之義汝未能解何以故我言爲者一切凡夫造五逆者又復爲者即是一切有爲衆生我終不爲无爲衆生而住於世何以故夫无爲者非衆生故善種國王即是具足煩惱又復爲者即是不見道性若見道性我終不爲久住於世何以故見道性者則非凡夫善種國王即是未發无上正眞大道之心又復爲者名爲道性善種國王者名爲不生故不見道性以不生煩惱故則見道性以見道性則安住正眞之道是名不生善男子天尊宻語不可思議道法玄妙不可思議眞人淸淨不可思議元腸經典不可思議爾時元始天尊放身威光八十種好七十二相光明徧照國土淸涼元陽眞人與諸太衆神仙眷屬自相謂言我今鄙陋諸穢未盡以何因縁逹茲瑞相天尊所放光明其光本无云何忽有非色非无色非相非无相非無非不无非有非不有非白非黑非青非黄非欲度衆生故發斯瑞故使可見有相可說有熱有冷有青有黄有赤有白是光雖爾實不可說以何因縁放此光明時衆之中有一第四眞人名曰拘正林答言今此瑞相將爲善種國王身有重疾言世无良醫治療身心故放光明先治王身然後及心王言眞人天尊亦見念邪眞人答言譬如一人而有七子是七子中一子遇病父毋之心非不平等然於病子心生偏愛大王天尊亦爾於諸衆生非不平等然於罪者心生偏愛於逰逸者則生慈念不逰逸者心則放捨何者名爲不遊逸者所謂天尊眞人神仙眷屬於諸衆生不觀種性下賤僮僕卑陋之人唯觀衆生有善心者若有善心則便慈念大王當知如是瑞相即是天尊威徳所被能令衆生除煩惱熱大王當知甘露法味亦復如是一切衆生之所愛樂眞道名爲甘露法味灌洗身心得悟眞道是謂良醫善穜大王問元陽第四眞人言我聞天尊不與惡八同止坐起語笑談論猶如大海不宿死屍如青鸞赤鳯不棲雜本我觀天尊亦復如是我等云何而得徃見設令見者我身將无陷入地耶我觀天尊寜近虎狼師子猛獸大火可畏之處終不親近四種五逆之人是故我今若爲思念當發何心徃見天尊第四眞人拘正林答言大王譬如有人飢渴欲求飲食疾病之人求於良醫苦惱之人求於敕護大王思求道果亦應如是大王天尊尚爲邪疑衆生說元腸祕藏何況大王非是邪疑而不慈悲救濟大王言眞人我昔曾聞有一邪疑不信不聞不能觀察不得義理何故天尊而爲說法眞人答言大王猶如有人身遇重病是人夜夢齒髮墮落祼形露體卧糞穢中復與亡者行住坐起携手食噉毒蛇滿路而從中過是人夢覺心生煩惱以煩惱故身病轉增以病增故家人遣使迎醫貧乏无可遣使形體短缺六根不具語其良醫遼隨我去爾時良醫即自思惟今見是使相貌不吉當知病者難可療治復行是念使雖不吉當復占之爲可醫不於是占日候星皆非吉祥如是病人亦難可治復作是念占日候星雖復不吉應當觀時秋時冬時日入夜半時又不吉當知是病亦難可治復作念巳衆相不吉雖復衆相不吉或定不定當觀病人若有福德皆可療治若无福德雖吉則不可治思惟事巳尋與使俱在路復念若彼病者有長壽相則可療之如无長壽相則不可治作是念巳即於路中逢二童兒闘爭罵詈頭面流血或見人持大炬火忽然自滅或見有人斫伐樹木或見虎狼惡獸見如事巳復作是念所見諸相皆非吉祥當知病者難可救濟復作是念我若不徃則非良師如其徃者不可救治復更念言如是衆相雖復不祥我今旣爲良醫當徃救濟思惟事巳復於前路聞有哭聲號天叩地復聞犬鳴鳥噪惡獸之聲種種音響喧動土境聞是事巳復作是念當知病者難可療治旣至病家即觀是病或寒或熱頭靣洪腫形容臭穢大小便利閉塞不通言聲喘急眠寢不安醫見是巳問瞻病人病者昨來氣息是何答言大師其人本來敬信三寳恒無怠慢今者變異敬信心息本好布施今來慳恡本性少食今則過多本性和善今則弊惡本性慈孝愛念父毋今於父毋无恭敬心醫聞是巳種種諸相悉皆不吉定知病者必死不疑語瞻病人言吾今且還明日復來随病人所須恣意勿禁至明日復遣使徃因即延引言我事未訖了兼未合藥智者當知如是病者必死不疑大王天尊亦爾於一邪疑善知根性而爲說法何以故若不爲說一切凡夫當言天尊无大慈悲有慈悲者名爲智慧若言无慈悲云何說言一切智人何以故天尊爲一邪疑而說妙法大王當知天尊見諸病者常施妙藥病者不服非天尊无恩愛心大王當知邪疑之人分别有二一者得見在善根二者得後世善根天尊知有一邪疑能於見在得善根者則爲說法後世得者亦爲說法今雖無益作未來因是故天尊爲一邪疑演說元陽妙經者復有二種一者利根二者中根利根之人於見在世能得善根中根之人後世則得見法大王譬如才人墮墜圖厠糞穢之處在此厠中云何得出有善男子見而愍之尋前捉髪拔之令出因善男子而能清浄天尊恩濟亦復如是諸衆生墮三惡道方便救濟令出三惡道是故天尊爲一邪疑演說元陽寳藏亦復如是爾時善種大王問第四眞人拘正林若天尊審如是者明當選擇良時吉日然後乃徃眞人白王言道法之中无有選捧良時吉日大王當知譬如重病之人不擇良曰時節吉凶唯求良醫大王今病重求天尊艮醫不應選擇良時好日大王當知如本中之火竹中之火二俱相燒無有異也吉日凶日亦復如是若能念道恩眞俱能消滅一切衆罪唯願大王今日速徃爾時大王即命一臣名曰吉楨而告之言大臣當知吾今欲徃元陽世界天尊之所速辦供養所須之具皆令備是臣言大王欲徃元陽世界諮問眞道善哉善哉所須供養之具一切悉才於是善種大王與其眷屬公卿宰相諸大臣等各各荘嚴浄潔衣服及諸供養駿馬金鞍種種車乘齎持幡蓋香花伎樂種種珍玩无不備足導從馬騎有數千萬衆來詣元陽世界天尊之所諮請眞道良醫妙藥爾時天尊告諸大衆言一切凡夫爲无上正眞大道者無有因縁無先善友何以故善種大王若不隨順眞人教化者來月中間必定命終墮於三惡道是故欲除身心之病者莫若善友良醫妙藥能除重病煩惱之業大王當知元陽上品妙經即是一切衆生良醫妙術當須恭敬禮拜晨夕誦習積年不退必獲自然之果爾時元始天尊告諸大衆言善種大王猶有疑意我今當爲作決定心時衆之中有元陽第六眞人名淨德白天尊如先說一切諸法皆无定相所謂色无定相所謂空无定相所謂法无定相所謂眞无定相乃至無極大道亦无定相云何天尊今者厠言爲善種大王作決定心天尊言善哉善哉善男子我今定爲善種大王作決定心何以故若王疑心可破壞者當知一切諸法皆无定相是故我爲善種大王作決定心當知是心爲定善男子若彼王心是決定者王之逆罪云何可壞以无定相其罪可壞是故我爲善種大王作決定心爾時善種大王即徃香林騫樹間至天尊所瞻視威光相好微妙於是口吐八種音聲告言大王時善種顧視左右此時衆中護是大王我旣罪逆又無福德天尊不應稱爲大王爾時天尊即復喚言善種大王時王聞巳心大歡悅即作是言天尊今日故以慈愍於諸衆生大慈大悲等無差别善種即上白天尊言昔日欵心今得悟解定知天尊眞是衆生无上大師爾時元陽第六眞人淨德語諸衆言天尊巳爲善穜大王作決定心得於自然果報深疑醒悟宿滯便開即以所持幡蓋香華伎樂供養之具稽首禮拜左繞三帀却退一面爾時元始天尊告善種大王今當爲汝說元腸上品觀行妙法微宻之義汝當歛意尊心聽我宣說一切凡夫常當觀身檢行有二十種事一者我此身心空虚无滿二者无諸善根堪有開發三者我此生死未獲和順四者堕墜深坑无處不畏五者以何方便得見眞道六者云何修定得見天尊七者生死常苦无常我淨八者八難之難難得遠離九者恒爲寃家之所隨逐十者無有一善能遮諸惡十一者於三惡中未解脫十二者具足種種諸惡邪見十三者亦未造立度五逆律十四者主死無際未得眞趣十五者不作諸業不得果報十六者无有我作他人受果十七者不作善因終凢善果十八者若有造業果終不失十九者因無明生亦因而死二十者去來見在常行放逸大王雖爲人中長者當於此身常作如是二十種觀度作是觀巳身心淸淨無有穢惡則得正觀次第觀行生相住相滅相次第觀心生住滅相心定慧進戒亦復如是觀生住滅巳知心相乃至戒相終不作諸惡无有死畏三惡道畏若不用心觀察如二十種事者心生放逸无種不作善種大王言如我解天尊所說義者我從昔來未曾觀是二十種事故多造衆惡造惡故則有无畏三惡道畏設觀必定當墮三塗地獄天尊告善種大王一切諸法性相无常无有決定王云何言必定墮三塗地獄善種大王稽首上白天尊言若一切法無定相者我之殺罪亦應不定若殺定者一切諸法則非不定天尊言大王善哉善哉諸眞人説一切諸法悉無定相王復能知殺亦不定是故當知殺無定相大王如彼所言父王无辜枉加逆害者何者是父但假名衆生五隂妄生父想於十二法十八界中何者是父若色是父四隂應非若四是父色亦應是若色非色合爲父者无有是處何以故色與非色性無合故大王凡夫衆生於是色隂妄生父想如是色隂亦不可害何以故色有十種是十種中唯色一種可見可持亦可稱量可牽可縳雖可見縳其性不住以不住故不可得見不可得捉不可稱量不可牽縳色相如是云何可殺若色是色可殺可害獲罪報者餘九應非若九非者則慮無罪大王當知色有三種過去未來見在過去未來則不可害何以故念念滅故如是一色或有可殺或不可殺有殺有不殺其色不定色若不定殺亦不定殺不定故報亦不定云何説言定入地獄大王當知一切衆生所作罪業凡有二種一者輕二者重若心口作則名爲輕身心口作者則名爲重大王心念口説身不作者所得報輕大王昔日口不教殺唯言削足而无實想況王不勑云何得罪一切諸眞人亦應得罪何以故大王受生尊貴良由昔日種於善根稟道氣而生是故今日得居王位若王不稟善業而生當知受報則不爲王若不爲王汝則不能爲國興害若汝殺父王當有罪者如是眞人亦應得罪若眞人无有罪者汝獨云何而得罪耶大王徃有惡心於山遊行射獵周徧曠野竟无所得唯見一仙人五通具足見巳即生嗔恚惡心我今遊獵所以不得正坐此人驅逐令去大王即勑左右而令殺之其人臨終生嗔惡心退失神通而作誓言我實无辜汝以心口横加屠戮我於來世亦當如是還以心口而害汝命時王聞巳即生悔心供養死屍大王如是尚得輕受不墮地獄況王不爾而當地獄受果報耶王先自作還自受之云何令王而得殺罪如王所言父王无辜者云何言无失有罪者則有罪報无惡業者則無罪報汝父先王若無有罪云何有報大王於見在中亦得善果及以惡果是故先王亦復不定以不定故殺亦不定殺不定故云何而言定入地獄大王當知衆生狂惑凡有四種一者心生貪狂一切財物二者藥狂欲求潤體三者呪狂猒有嫌疑四者本業縁狂貪求財物大王應知我弟子中有是四種狂雖多作惡我終不記是人犯戒是人所作不至三趣若還得心亦不言犯王本貪國典此逆害貪狂心作云何得罪大王如人醉酒而害其母旣醒悟巳心生悔恨當知是業亦不得報王今貪醉非本心作若非本心云何得罪譬如幻化之師於四衢道幻作種種服玩男女車馬瓔珞衣被愚癡之人謂爲眞實逹辭之人知非眞有殺亦如是凡夫謂實天尊慧眼知其非眞大王當知譬如山谷響聲愚癡之人謂之實聲違解之人知其非眞殺亦如是凡夫謂實天尊眞人知其非眞大王如人有怨詐來親附愚癡之人謂爲眞實智者了達知其虛詐殺亦如是凡夫謂實天尊眞人知其非實大王如人執鏡自見面像愚癡之人謂爲真面智者了逹知其非眞殺亦如是凡夫謂實天尊眞人知其非實大王如熱時炎愚癡之人謂之是水智者曉逹知其非水殺亦如是凡夫謂實天尊眞人知其非實大王如寳聚城從地涌出愚癡之人謂爲真實智者曉逹知其非實殺亦如是凡夫謂實天尊眞人知其非實大王如人夢中受五欲樂愚離之人謂之爲實智者曉逹知其非實殺亦如是大王應知殺法殺業殺果及以解脱我皆了之則無有罪王雖知殺云何有罪大王譬如有主知典酒知而不飲則亦不醉雖復如火亦不燒然王亦如是雖復知殺云何有罪大王有諸衆生於日出時作種種罪於月出時復行劫盗日月不出則不作罪雖因日月今其作罪而此日月實不得罪殺亦如是雖復因王王實無罪大王應知如王宫中常勑暑羊心初无懼云何於彼獨生𢣷心雖復人獸尊卑差別保命畏死二俱无異何故於羊心輕无懼於父先王生重憂苦大王世間之人是愛僮僕不得自在爲愛所使而行殺害設有果報乃是愛罪王不自在當有何咎大王譬如元陽妙經非有非无而亦是有殺亦如是雖非有非無而亦是有慙愧之人則是非有无慙愧者則爲非无受果報者名之爲有空見之人則爲非有有見之人則爲非无有有見者亦名爲有何以故有有見者得感果故无有見者則无感果常見之人則爲非有无常見者則爲非无常常見者不得爲无何以故常常見者有惡果報故是故常常見者不得爲无以是義故雖非有非无而亦是有大王應知一切衆生者名出息入息斷出入息故名爲殺聖人随俗亦說爲殺大王色是無常色之因縁亦是无常從无常因生色云何常乃至識无常識之因縁亦是无常從无常因生識云何常以无常故苦故空故以空故无我若是无常苦空無我爲何所殺无常者得常聖人殺苦得樂殺空得實殺於無相而得眞相大王應知若殺无常苦空无相者則與相同相亦如殺是无常苦空無相不入地獄汝云何入爾時善種大王言如天尊所説觀色乃至覯識作是觀巳即白天尊言我今始知色是无常乃至識是无常我本若能如是觀者則不作罪即稽顙恭敬上白天尊我昔曾聞聖人常爲衆生而作父母雖聞是語猶來能審今乃定知天尊眞爲一切衆生父母我亦曾聞王京山王四寳所成所謂金銀瑠璃瑪瑙若有衆馬随所集處則同其色雖聞是説亦不審定我今來至玉京山則與同色者則知識法無常苦空无相作是觀巳皆悉无常一切諸性悉尤根本无根本者我初不知思念聖人不信眞道是名无根我今有常得見天尊開闡玄妙剖析眞經所得功德悉能毀壞衆生煩惱諸惡之心天尊言大王善哉善哉我今知汝必能消滅衆生惡心破壞衆生煩惱之結大王又白天尊若我審能明了破壞衆生諸惡心者使我在太山二十四獄之中无量劫中爲諸衆生受大苦惱不以爲苦爾時復有無量世間衆生不信眞道常有邪疑愚癡之人聞是語巳悉發无上正眞大道之心以如是等无量人民發大慈故善種大王所有重罪即得微薄王及夫人復宫綵女見王明了法相身心清浄悉皆同發无上自然道意爾時善種大王白天尊言我今未死巳得深了眞宗捨於短命而得長夀捨无常身而得眞常之身令諸衆生發无上正眞道意即得長命眞常之身即是天尊眞常弟子説是語巳即以種種寳幢幡蓋香花伎樂種種微妙珍竒服玩供養天尊復以偈頌而讃歎言天尊體玄妙道德冠太清逍遙歩金闕容與遊玉京時演元陽義至理甚威靈是名甘露藥復號大乘經若信及不信受持罪自㝠慈悲救苦惱恩愛及衆生若能晚深義即會玄都庭无相寄有相无形寄有形一切善知識當須盡至誠存想一句偈歛念除縁情旣離煩惱結道性自然明神仙當擁護無憂體自輕爾時善種大王旣蒙天尊訓誨曉示慇懃與諸眷屬皆得曉悟元陽袐典深知因果作偈讃歎奉謝天尊禮拜都畢左繞三帀辭退各還本國太上靈寳元陽妙經巻之七
