front:
  text: 太上靈寳元陽妙經卷之四皇四
  hash: sha256:230be6778fbbec103a3c5ad4bd55327436f594bc3a5ff54fafff40725f7914ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_HFL_004-001a, image: hfl/0168/0168-150.png}
body:
  text: 問行品諸弟子等上白師尊言衆生各有縁品及諸大士男官女官等如弟子惟忖今聖非過去聖師廣演次第即元陽昇仙大法演大義經諸法衆聖男官女官外契内契我於過去諸仙男女得大莊嚴神通明了曽見此瑞放斯光明即說大法是故當知師尊現示變化廣演言敎神通第二一切諸法亦復如是故令弟子等咸得聞知一切世間難信之人故發斯瑞諸男官女官等若過去無量無邊不可思議劫時有一王名大相燈清淨法王應化八萬四千地其地乎整歡樂饒人無有山河沙石溝坑原陸堆阜其城黃金爲壁水銀爲池眞珠玉室瑪瑙華寢連綿四百餘里人民慈善有一弟子名大法林廣聞諸法明惠具足超登无上化導天人其義不雜其音巧妙具足明白五通之相說法利益度脫衆生了一切法空是爲眞人與上六神王俱次得道元陽上品眞人第二能成就一切道智次復有一弟子名常精進行相大士名曰明如長相是人曾於二十二身得生文昌宫由以宿植德本靈智自天稟化玄風餐訓妙法積福具備證果九天獲慶將來得䕃太清凝神天府功德彌厚靈嶽眞府仙官授手其所習翫紫陽仙公太清圖品應爲第七未出家時有一大士智慧具足其所祖述紫陽爲師而每勤學神仙元陽爲上天圖仙品其人能知初仙中仙下仙初善中善後善其義深遠最後仙眞人未出家時有八從弟子一名晃林二名珍林三名意林四名表林五名善林六名樂林七名寳林八名除疑林是人而繫名天宫元陽上品具是智行備五神通威德自在各領天人初岀家時思惟樹下棄捨髙位發大悲心秉意逃逝常修眞行皆爲仙伯於千萬巖後所植諸善悉皆成就夜半子時建剛仰北斗魁中紫微文昌怱然而開但見太上老子乘雲青龍而下下則青馬也謂其人曰是何眞賢時老子答言吾是東海小童李元眞人天慶會遣我來下化子林大士後能演无量義經開敷元陽神仙第二天花覆其上普化世界種種震勤爾時會中有一眞士厥年十二上白師尊曰如我大衆得未曽見今歡娱喜樂長跪端心觀師尊所説善辭巧妙善喻方便能放光明普照一切令其會中蒙得開明所爲因縁照明元陽上品仙聖大品天人之界其土清淨得未曹有故使百千萬歳中衆生永安大福條林法靜眞人曰吾師說元陽上品以來曾經六十小劫不起于座今欲攝應歸本正月七日當還天宫慶集天人汝等若有一人二人乃至十人於我去後能宣傳妙法勸化衆生皆當徃生元陽品中莫得懈倦六十小劫天人並位齊心受記乃告諸大士等得條林法靜眞人言今當慶會天人其人去後妙元林與光妙林應逹五通廣智神仙巧利經記當得淨惠開悟衆生號曰淨惠度眞人授記巳便於壬辰年正月七日忽然去矣元陽浄惠度林眞人者生於深妙王宫其先代積行勤心翹念躭讀眞經每習仙記常所祖述太一元宫其所修學太一仙經八百卷其中廣演言教化度衆生說妙林仙記八千卷滿八十小劫不起于座爲人演說有八弟子一名晃林二名妙林三名教林四名堅園林五名燈香林六名樂林七名度林八名化林是八弟子皆有明行於元陽上品第三弟子也處臺榭園田廣林樹下有成仙品者名曰伯皇眞人求在左右通利誦典廣演諸經宣暢至品曾於大衆過去之世經六十小劫其衆嚴敬演教度一切無數令入元陽上品初岀家時有三弟子見神大聖諸仙随從説此經中无量種義諸天仙人當廣分别吾當說此時即於天上玄坐虚空中八十小劫下觀汝等廣演言敎昇入无量品天香寳蓋天龍仙王供養人中一切諸仙世界嚴淨其土如脂多諸寳樹名獅子象王官即時種種天人神響震動浄惠度林眞人放神通光明見諸希有之相悉見彼土一切人民其土清浄眞珠爲地黄金爲城白銀爲壁瑠璃爲室黃青赤繩連綿其中瑪瑙界側水精爲殿白玉爲棲處處行樹園林臺榭清淨蓮池花果茂盛一切衆生受樂其中連綿相續四千餘里天光普照衆寳莊嚴瑠璃玻瓈内外朗微不由日月諸仙供辯餚饍飲食自然天厨供具餚饍彼有天人明淨第一出乘雲車駕龍神虎飛鳯嘯歌四面懸鈴八方安施自然伎樂身色光明如金寳山端嚴奇妙如淨瑠璃内外圓滿次一大士厥名辯惠度厄眞人所從弟子皆得昇天太一宮府開度無數因我光明飛行自在悉見大衆諸仙山林精進大士持戒符契妙靈仙品猶如明珠有一弟子名莊妙林其人修行常在山林精進持戒淨行施惠忍辱元陽仙品有一弟子名大智藏入深妙定身心寂滅廣智定慧次一弟子名妙梵林智法深曠寂滅神智不動各於其國說法上品次一弟子名大梵林現大神通其心歡喜四部弟子廣演言敎各各相問元陽仙品次一弟子名觀梵林好樂至道天人所尊二界第一能讚諸仙世間希有次一弟子名眞妙音廣知一切天人所趣歸信大行能奉至業次一弟子名寳玄林玄智虛空照明仙記每讚隂陽廣演言敎慶集天人妙光世度次一弟子名智慧深智慧五通滿八十小劫能開世敎不起於座所説上品妙奥難測號曰月光无上仙師次一弟子各寳妙林天人並悦諸法實相巳爲汝說於中長短十月五日歸還天宫語諸弟子言汝等一心精進當昇天宮號曰太清天人如是弟子皆是元陽仙品神通无硋淨惠度眞人說是旣巳語諸弟子言自吾與子仙紀斷絶慶會天宫有何隔手吾至十月五日當還天宫上命甚速吉會非常於是眞人還以此月十五日日中之時與諸衆仙雲車羽蓋侍從八千萬人飛仙天仙无量聖衆乘之而去元陽度太清天人從无著王宫乘三世界安庠而起告諸弟子曰吾受眞人智慧甚深无量智慧見生智慧門五神洞朗諸根猛利饒益衆生一切世間難解難了難入一切天人所不能及所以者何吾曾親近百千萬億无數眞人大士盡行无量大道勇猛精進名稱普聞成就甚深得希有法嶽靈天圖仙官授法下化三界隨冝啓導吾從成眞人以來種種因縁種種譬喻廣演言敎无數方便引導衆生今離諸著所以者何吾之方便知見深遠皆以具足百姓子人我太上先師其智廣深遠无量无邊无所畏憚心定解脱深入秘藏知見无際成就一切未曾有法皆至天宫大妙仙圖元陽上品大仙寳經種種分別巧說諸法言辭柔軟悅可衆心百姓子等取我要言之法无有限量承我所説悉皆成就不可思議子等不須復說何以故我所成就徽妙第一義趣難解唯吾上師乃能分別諸法深奥不能究盡吾今有如是相有如是性如是體如是力如是作如是縁如是因如是果如是報如是本末盡等究竟爾時天人授記與信行善男善女一切咸使聞知悉皆開悟及天老玄淨王少子其先自出慰田王宫其所祖述大寳爲上甚所修習太清經八千卷能廣演言教六十小劫不起于座本從无數具足諸行甚深甚妙難見難了有從弟子三人一名玄妙眞人二名證果眞人三名明智眞人然此弟子有大聖行能說法元陽仙品干日千夜不起于座次一弟子名眞梵林諸根猛利甚深微妙行此諸品還得成果我以悉知如是大果元陽功德次一弟子名大梵林種種方便我及十方諸餘衆生悉能演化開悟暗冥吹一弟子名眞浄林其人智慧信力堅固及諸弟子煩惱漏盡住是最後悉皆昇天太上仙宫依位各處太上靈寳元陽妙經卷之四
