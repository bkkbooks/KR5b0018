front:
  text: 太上靈寳元陽妙經卷之五皇三
  hash: sha256:daa2678a44d26b8b4e217968cf98b19436a96dfd0c77411849bbb5af27a2b472
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0018_HFL_005-001a, image: hfl/0168/0168-166.png}
body:
  text: 觀行品上爾時東方玉實皇上天尊於空歌國土清浮世界與其神仙眷屬飛天神王至眞大聖衆八萬四千徒侣俱會香林七寳樹間演說元陽上品觀行妙經爲諸來生作大福田曉悟深疑令知妙道善男子應當發心願念遵行四種修學之法作是語巳時衆之中有一眞人名曰靈華整頓衣冠手執香鑪長跪白言宿因有幸得遇威光過泰之歡實爲慙悚今聞演説元陽袐藏甚深義味不可思議云何天尊答曰善男子四種修學之法一者從師受與元陽經典二者從善知識開道深疑三者思推玄義得苦空法四者修行精進志願成道善男子當知四種之業親近明師尋如識請脫玄義得解疑難眞人應知思其四種修學之法復次善男子身口意業有四種惑何等爲四一者貪惑二者癡惑三者淫惑四者嗊嗃惑善男子修學大乘經典求自無果者應當捨除如是四種惑法云何貪惑所謂貪惑者非分貪求世間榮華衣服珍玩種種䂓求種種計度殺害衆生侵損物命恣意所爲縱情吞噉如是之事是名貪惑云何癡惑所謂癡惑者身心意業所作罪愆不避三光日月星宿不敬三寳有道之人聞他作善心生破壞談説是非謀謗尊老師父有命避會不肯依從如此之事是名癡惑云何淫惑所謂淫惑者愛樂女色不避親踈姦人妻妾私懷謀度潜欲誘引離人骨肉放蕩无度如此之事是名淫惑云何嗊嗃惑所謂嗊嗃惑者心懷諂妄構架百端因公傍私潛行威勢身爲出家誑惑衆生取他財物詐言道術无眞實相如是之事名爲嗊嗃惑善男子若欲至心求无上自然果者眞人當知四種惡惑悉皆除斷復次善男子有二種信一者至心信二者心不信眞人當知心信者是善心不信者不名爲善復次信有二種一者常徃法座二者不徃法座眞人當知常往法座者善不往者不名爲善徃法座者復有二種一者禮拜二者不禮拜眞人當知禮拜者善不禮拜者不名爲善其禮拜者復有二種一者至心聽法二者不至心聽法眞人當知至心聽法者善不至心聽法者不名爲善眞人當知至心聽法者復有二種一者思尋其義二者不思尋其義眞人當知思尋其義者善不思尋其義者不名爲善思尋甚義者復有二種一者如說行二者不如說行如説行是則爲善不如說行者不名爲善如說行者復有二種一者有大智慧而能利益一切衆生二者有大智慧而不能利益一切衆生所謂能利益一切衆生者是則爲善不能利益一切衆生不名爲善眞人童子應知利益衆生安穩歡喜得自然果報善男子如諸寳中有明月寳珠最爲勝妙如諸味中有甘露槳最爲勝妙眞人能於人天之中演説元陽經義利益衆生最爲勝妙不可譬喻善男子是名眞人童子住於大乘清浄无爲九法之中眞人童子住是九善即得眞於觀行復次善男子有觀行心謂慈悲喜捨靈華眞人長跪白天尊言若多慈心能斷瞋意修悲心者亦斷瞋恚云何而言四无量心尋理而言則應言三天尊曰慈有三縁一縁衆生二縁於法三則無縁悲喜捨心亦復如是若推其意唯應有一不應有四衆生縁者縁於五情願與其樂是名衆生縁法所謂縁者縁諸衆生所須之物而施與之是名法縁無縁者縁於天尊是名無縁慈者多縁貧窮衆生天尊大師永離貪窮受第一樂若縁衆生則不縁道法亦如是以斯義故縁天尊者名爲無縁天尊慈之所縁一切衆生如縁父母兄弟妻子眷屬以是義故名衆生縁法縁者不見父母兄弟妻子眷屬見一切衆生皆從縁生是名法縁无縁者不住法相及衆生相是名無縁悲喜捨心亦復如是是以名三不應有四天尊曰人有二種一者見行二者愛行見行之人多修慈悲愛行之人多修喜拾是故應二不應有四天尊曰夫无量者名曰无邊邊不可及故名无量者則應是一不應有四若有四者何得无量是故應一不名四也天尊告靈華眞人善男于諸天聖人爲諸衆生所宣法要其言祕宻唯子可知或爲諸衆生說一因縁如説何者爲一因縁所謂一切有爲之法善男子或説二種因縁及果或説三種煩惱業苦或說四種无明諸行生與老死或說五種所謂受取有及生或說六種三世因果或說七種謂識名色六入觸受及以愛取或說八種元明行及生老死其餘八事或說九種生老病死善男子如是因縁爲衆生故種種分别無量心法亦復如是善男子以此義故於諸天尊深祕行處不應生疑善男子天尊有大方便委曲敎化子細宣掦令一切衆生深解法性除疑惑心无苦說苦无樂説樂无因説因无果說果无眞説眞无法説法无仙説仙无道説道善男子天尊以是无量方便爲調伏衆生豈虚妄耶善男子或有衆生貪於財寳我於其人自化其身富貴長者於无量劫歳随其所須種種供給然後敎化令其解悟无上正眞大道若有衆生貪著五欲於无量歳以知五欲充滿其願然後勸化令其安住无爲之地曉悟无上正眞大道若有衆生自恃榮豪我於其人无量嵗中爲作僕使趨走給侍得其心巳即復勸令安住无爲之境明逹无上正眞大道若有凡夫衆生心生狠戾自作惡事須人呵諌我於无量歳中教誨呵諌慰喻其心令復調順然後復勸令入清淨之境明曉悟解无上正眞大道之心善男子天尊如是於无量歳以種種方便令諸衆生入清淨之境修是无上正眞大道豈虚妄耶諸聖人雖處穢惡无所染污猶如明珠在沙磧中猶如蓮花在濁水內善男子應知如是四無量義是無量心如汝所言慈能斷瞋悲亦斷恚何以故善男子恚有二種一能奪命二能鞭撻修慈則能斷彼奪命修悲則能除彼鞭撻善男子以是義故豈非斷恚耶復次瞋有二種一瞋衆生二瞋非衆生修慈心者斷瞋衆生修悲心者斷非衆生復次瞋有二種一者有因縁二者无因縁修慈心者斷有因縁修悲心者斷无因縁復次瞋有二種一者於遏去乆巳積集二者於見在今始積集修慈心者能斷過去修悲心者斷於見在復次瞋有二種一瞋聖人二瞋凡夫修慈心者斷瞋聖人修悲心者斷瞋凡夫後次瞋有二種一者上二者中修慈斷上修悲斷中善男子以是義故則名爲四何故難言應三非四是故靈華眞人是无量心類例相對分别爲四復以器故應名爲四若有慈則不得有悲喜捨心以是義故應四不减善男子以行分別故應有四若行慈時無悲喜捨是故善男子以无量故亦得名四无量者則有四種有无量心有縁非自在有无量心自在非縁有无量心亦縁亦目在有无量心非縁非自在何等无量有縁非自在縁於无量无邊衆生不能得自在雖得叅眞染法或得或不得何等无量自在非縁如縁父母兄弟姊妹妻兒欲令安樂无量縁何等无量亦縁亦自在謂諸天聖人何等无量非敢非自在晚學法人不能廣縁无量衆生亦非自在善男子以是義故名四无量非諸晚學法人所知乃是諸天聖人境界善男子如是四事晩學法人雖名无量少不足言諸天聖人乃得名爲无量无邊靈華眞人白天尊言如是如是實如聖言諸天聖人所有境界非諸晚學法人所及天尊頗有眞人住於大乘元陽經中得慈悲心非是大慈大悲心不天尊言有善身子眞人若於諸衆中三品分別一者所親二者怨憎三者中人於親人中復作三品謂上中下怨憎亦爾是眞人童子於上親所與憎上樂於中下親亦復平等與憎上樂於上怨所與少分樂於中怨所與中品樂於下怨所與憎上樂眞人如是轉憎修習於上怨所與中品樂於中下怨等與上轉復修習於上中等與上樂若上怨所與上樂者爾時得名慈心成就眞人爾時於善父母及上怨所得平等心无有差異善男子是名得慈悲大慈也天尊何縁眞人得如是慈猶故不得名爲大慈悲善男子以難成故不名大慈何以故昔於无量劫中多集煩惱不修善法是以不能於一日中調伏其心得堅固相无有懈退善男子煩惱之人堅牢難去眞道之心輕浮易去譬如家犬不畏於人山林野鹿見人怖走瞋恚難去如守家犬慈心易失猶如野鹿是故此心難可調伏以是義故不名大慈復次善男子譬如畫石其文恒在畫水易滅勢不可住瞋志難除譬如畫石善根易滅猶如畫水是故此心難得調伏如大火聚其明乆住電光之明其光不停瞋火聚慈如電光是故此心難得調伏以是義故不名大慈善男子眞人童子住於眞地名曰大慈何以故善男子最極惡者名爲邪見初住眞地修大慈時作邪見時心无差别不見其過不生其瞋以是義故得名大慈善男子爲諸凡愚除无利益是名大慈欲與凡愚无量利樂是名大悲於諸凡愚心生歡喜是名大喜无所擁護名爲大捨若不見我法相巳身見一切法平等无二是名大喜捨自捨已樂施與他人是名大喜捨善男子唯四无量能令眞人增長具足四種威儀其餘諸行不必能爾善男子眞人童子先得四无量心然從乃發无上正眞大道之心次第方得出世間者善男子因世无量得出世无量以是義故名大无量靈華眞人白天尊言除元利益與利樂者實无所爲如是思惟即是虚觀无有實利天尊譬如道士觀不浄時見所著衣服悉是皮相而實非皮所可食噉皆作蟲相而實非蟲觀好美羹作糞穢汁相而實非糞穢觀所食乳酪猶如髓腦而非髓腦觀骨碎𥹫猶如粉相而寳非粉四无量心亦復如是不能眞實利益衆生令其得樂雖言發口與衆生樂而寶不得如是之觀非虚誑耶天尊若非虚妄實與樂同者彼諸衆生何故不以諸天聖人威力故一切受樂若當眞實不得樂者如天尊所說我念徃昔唯修慈心經此劫世界百返成壞不來此生世界成時生於龍變梵度天上世界破時生於太極平育天上若有衆生能發道心於我所唯修慈悲乃得如是人天果報若不實者云何得與此義相應天尊言善哉善哉善男子汝眞勇猛元所畏懼即爲靈華眞人而說偈言善能明法相不起三毒心所爲平等行是能宣妙音百姓男女軰當以淨神襟是名觀行品得果會香林天明諸道士明律善幽深從容紫微上窈窕玉京岑若能體眞實玄義必須尋六時常讀誦八莭恒歌吟凡夫及衆生當除殺盗婬身口意業盡邪鬼不能侵一切善因果皆縁願所欽我今說此頌開發諸迷沉聖人甘露味妙漿随意斟仙意奉法服玉女上神簮元陽隱宻偈猶如五合琴子能辯至要身體淨黄金善男子夫修大慈者實爲非妄想是其眞實理若是下仙初學之人是名虚妄諸天聖人眞實不虚云何知耶善男子眞人童子修行如是元陽上品大乘經者觀土爲金觀金如土地爲水相水爲地相水爲火相火爲水相地爲風相風爲地相有爲无相眞爲假相實爲空相隨心所成无有虛妄觀諸衆生非爲衆生觀非衆生爲實衆生随其心成无有虚妄善男子當知眞人童子四无量心是眞實義非眞實義復次善男子云何名爲眞實思微謂能斷除疑網息諸煩惱故善男子夫修慈心者能斷貪愛修悲心者能斷瞋恚修喜心者能斷不樂修捨心者能斷貪恚及衆生相以是義故名眞實義復次善男子眞人修四無量心能爲一切諸善根本善男子眞人重子若不得見貧窮衆生无緑生慈若不慈則不能起惠施心以是因縁令諸凡夫得安穩樂所謂飲食車乘衣服香華牀席卧具種種珍玩種種甘果種種文繒種種錦繡如是施時心无悔惜不生貪著必定廻向无上正眞大道其心爾時无所歸依妄想永斷不爲恐懼名稱利養不求人天所受快樂不生驕慢不望及報不爲斑他故行布施不求報故諸所施時不見受者持法破法是由非由此是善知識作此施時不擇日揀時直心布施无有悔恨亦復不計飢窮豐樂不見因果此是凡夫此非凡夫是福非福雖後不見施者受者及以衣物乃至不衆斷及果報而常行施无有斷絶善男子眞人若見持法破法乃至果報終不能施若不散捨則不具足自然果若不具足自然果則不能成无上正眞大道善男子譬如有人身被毐箭其人親戚欲令貞言爲除眞故即命良醫而爲㧞箭彼人方言且持莫解我今當觀如是毒箭從何方來誰之所射爲是憎惡之人爲是鬼神所害爲是自然自有如是癡人竟未能知尋便命終善男子眞人亦爾若行施時分别受者得法破法乃至果報終不能施若不能施則不具足自然之果則不能成无上正眞大道復次眞人童子行施散時於諸凡夫慈心平等猶如子想又行施時於諸凡夫衆生起慈念想譬如父毋瞻視病子行施散時其心喜悅猶如父母見子病愈想旣施散之後其心施捨猶如父母見子長大能自養活想是眞人童子於慈心中布施食時常作是念我今所施悉與一切凡夫共之以是義故令諸凡夫得大智食勤心廻向无上大乘元陽妙經願諸凡夫一切衆生平等一想得善智食不求高貴富饒之人乞求飲食願諸凡夫衆生得食吾食不求他食願諸凡夫一切衆生悉得自然之食皆令飽滿攝取无礙增於善根願諸凡夫一切衆生解逹空相得元礙身猶如虛空願諸凡夫一切衆生常爲受者憐愛一切爲衆福田善男子眞人童子修慈心時凡所施食應當堅發如是无上正眞等願復次善男子眞人童子於慈心中布施漿時常作是願我今所施悉與一切凡夫衆生共之以是義故令諸凡夫衆生趣大乘河飲八種味水速悟无上正眞之道離諸疑滯斷煩惱業渴仰法味愛樂大乘元陽經典具足法身得諸法藏入於甚深智慧大海願諸凡夫一切衆生得甘露水飲醴泉味眞道出世皆得清淨如是諸法願諸凡夫一切衆生具足无量百千法味具法味巳得見道性見道性巳能雨法雨雨法雨巳道法徧覆猶如虚空復令其餘无量衆生得一法味所謂大乘非諸邪見衆生異種差別非善之味善男子眞人童子於慈心中布施飲時應當堅發自然之誓如是等願復次善男子眞人童子於慈心中施諸衣服錦繡車乘卧具常作是願我今所施悉與一切凡夫衆生共之以是因縁普令一切凡夫衆生成於大乘元陽之果得住大乘元陽之果不退大乘元陽之果不有動轉大乘元陽之果善男子於慈心中施諸衣服錦繡車乘卧具時當應如是堅發誓願復次善男子眞人童子於慈心中布施衣時常作是願我今所施悉與一切凡夫衆生共之以是因縁令諸凡夫一切衆生得慙愧衣法界覆身裂諸邪見衣服離身得清淨身所受諸觸淳善无礙顔色温潤肌膚柔軟恒光无色願諸一切凡夫衆生皆得无色之身過諸色境得入无色大乘袐藏善男子眞人童子於慈心中布施衣時應如是念堅發自然誓願復次善男子眞人童子於慈心中布施百和寶香時常作是願我今所施悉與一切凡夫衆生共之以是因縁令諸凡夫一切衆生聞其香熏皆得悟道願諸凡夫一切衆生形如皎月所見諸色微妙第一願諸凡夫一切衆生皆獲一切萬善莊嚴願諸凡夫一切衆生隨意得見可意之色願諸凡夫一切衆生常值名友得无礙香離諸穢氣願諸凡夫一切衆生具諸善業无上貴寳願諸凡夫一切衆生知識和悅无有憂惱悉悟苦空不相愛念願諸凡夫一切衆生持无礙法香氣苾芬布滿世界願諸凡夫一切衆生得堅固法无悔恨法一切戒法離諸破法悉得无法未曾有法无師法无作法无穢法无汚法染竟法畢竟法得平等法塗割善惡等无偏愛願諸凡夫一切衆生得无上法大乘之法非小乘法願諸凡夫一切衆生具足自然道果猶如眞人初得法時願諸凡夫一切衆生悉爲布施持戒忍辱精進神妙香華之所熏修願諸凡夫一切衆生皆得成就元陽上品微妙寳香其寳香氣徧滿虛空願令凡夫一切衆生純食元陽上品大乘香饍如蜂採花取其香味願諸凡夫一切衆生得成自然无量功德所被之身善男子眞人童子於慈心中布施香時當當堅發如是自然誓願復次善男子眞人童子於慈心中施榻席時常作是願我今所施皆與一切衆生共之以是因縁令諸凡夫得天中所卧之榻得大智慧坐四如意處卧於眞人之榻不卧邪魔非法之榻願諸凡夫得安穩卧離生死席成自然師子卧榻願諸凡夫坐此榻巳復爲其餘无量凡夫示現神通有大智力願諸凡夫住此元陽大宫爲諸凡夫演説道法願諸凡夫坐无上榻不爲世法之所降伏願諸凡夫得忍辱榻離於生死飢餓困苦願諸凡夫得无畏榻永離煩惱一切怨賊願諸凡夫得清浄榻專无上正眞之道願諸凡夫得善法榻常爲善友之所擁護願諸凡夫得左脇卧榻依於聖人所行之法善男子眞人童子於慈心中施榻席時應當堅發如是誓願復次善男子眞人童子於慈心中施屋宅時常作是願我今所施皆與一劫凡夫共之以是因縁令諸凡夫處大乘屋修行善友所行之行修大悲行度妙行諸天眞人所行之行无邊廣大如虚空行願諸凡夫皆得正念遠離惡想願諸凡夫悉得安穩住常樂淨永離四傾願諸凡夫悉皆受持微妙文字願諸凡夫必爲无上一切智屋願諸凡夫悉皆得入觀喜甘露法屋願諸凡夫初中後心常入元陽清淨之宅願諸凡夫於未來世常處眞人所居宫室善男子眞人童子於慈心中施屋宅時常當堅發如是誓願復次善男子眞人童子於慈心中施燈明時當作如是願我今所施悉與一切凡夫共之以是因縁令諸凡夫光明无量安住道法願諸凡夫常得明朗願諸凡夫得色光澤微妙第一願諸凡夫肉眼清淨天有翳障願諸凡夫得大惠炬善解无我无凡夫相无人无命願諸凡夫皆得了見清淨法性猶如虚空願諸凡夫其目明皎遠見十方恒河世界願諸凡夫得法光明徧照十方无量國土願諸凡夫得元礙明皆悉得見清淨法性願諸凡夫得大智明破一切闇及有邪魔願諸凡夫得无啚光明普照无量无邊諸天世界願諸凡夫燃大乘法燈離小乘見願諸凡夫所得光明滅無明闇過逾千日願諸凡夫得大光明徧無三千世界所有幽闇皆悉朗微願諸凡夫具足五眼悟於法相成无上師願諸凡夫不見無明願諸凡夫悉得大乘元陽微妙光明示悟凡夫眞人實法之性善男子眞人童子於慈心中施燈明時常應堅發如是誓願善男子諸天眞人童子慈爲根本修習慈心能生如是无量善業所謂穢惡出息入息无常生滅四聖果處五種善業三達觀行八種功德一切入空無有形相知他人智及諸神通智本際智仙人智童子智眞人智天尊智善男子如是等法慈爲根本以是義故慈是眞實非虛妄也善男子能爲善者名實思微寳思微者即名爲慈慈即天尊慈即大乘大乘即慈慈即天尊善男子慈即自然慈即眞道眞道即慈慈即天尊善男子慈即仙人仙人即慈慈即天尊善男子慈者能爲凡夫一切衆生作於父母父母即慈慈即天尊善男子慈者乃是不可思議諸法境界不可思議諸法境界即是慈也當知慈者即是天尊善男子慈者即是凡夫法性如是法性乆鳥煩惱之所覆蔽故令凡夫不得覩見法性即慈慈即天尊善男子慈即太虛太虚即慈慈即天尊善男子慈即虚空虛空即慈慈即天尊喜男子慈即是常常即是眞眞即是道道即是慈慈即天尊善男子慈即是喜喜即是仙仙即是法法即是慈慈即天尊善男子慈即是清淸即是淨淨即是道道即是法法即是慈慈即天尊善男子慈即是我我即是道道即是法法即是士士即是慈慈即天尊善男子慈即甘露甘露即是慈慈即法性法性即是道道即是士士即是慈慈即天尊善男子慈者即是眞人无上之道道即是慈慈即天尊善男子慈者即是諸天聖人无量世界无量世界即是慈也當知是慈即是天尊善男子慈若有無非有非無無如是慈非諸下仙初學等能思義善男子慈若不可思議法不可思議法性不可思議天尊亦不可思議善男子眞人童子住於大乘妙死修如是慈雖復安於睡眠之中而不睡眠勤精進故雖常明了亦無明了以無眠故於其眠中諸天雖護亦無護者不行惡故眠不惡夢無有不善雖睡眠故命終之後雖得生天亦無所生得自在故善男子夫修慈能得成就如是無量无邊功德善男子是大元陽上品徽妙經典亦能成就如是无量无邊功德諸天眞人亦得成就如是元量无邊功德靈華眞人白天尊言一切眞人童子所有思微悉是眞實下仙晚學非眞實者一切衆生何故不以眞人童子威力等受快樂若諸衆生實不得樂當知眞人所修慈心爲樂利益天尊言善男子眞人之慈非不利益有諸衆生一切凡夫或必受苦或有不受若有衆生必受苦者眞人之慈爲無利益謂一切凡夫若有受苦不必定者眞人之慈則爲得益令彼衆生悉受快樂善男子譬如有人遙見猛獸毒蟲自然生於憂怖夜行見鬼亦生恐懼善男子如是諸人自然怖畏衆生如是見修慈者自然受樂善男子以是義故眞人修慈是實思微非無利益一切衆生應當至心供養讀誦元陽觀行上品妙經深解慈悲喜捨之心皆得度脱登无上自然大道之果善男子等勿得輕慢疑惑邪心不信經教警毁聖文若有心生不信當墮三惡道中畜生之報於是靈華眞人神仙眷屬善男子等旣得明了心無疑滯一時恭敬作禮左繞三帀稽首而去太上靈寳元陽妙經卷之五
