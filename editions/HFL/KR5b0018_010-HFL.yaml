body:
  text: 昇大羅品如是我聞一時天尊在蒲林國中樊華樹下元陽宫中與大聖眞人大仙道士男女官等百萬人俱前後圍繞爾時天尊剋以七月七日昇於大羅上宫思惟入定見威神力放大光明雜色青黄赤白遍照三千大千世界及至十方虛空邊際亦復如是其中所有六趣衆生遇斯光者四垢煩惱一切消除是諸衆生見聞是巳心大憂惱同時舉聲涕泣自相謂言且各裁抑莫大愁苦當共疾徃詣元陽官中至天尊所頭靣著地頂禮勸請天尊莫向大羅住此元陽或百年或千載互相執手復作是言世間空虚衆生福盡不善諸業增長我等今當速徃天尊不久即去又作是言世間虛空我等從今无有救護无所宗仰貧窮孤露一旦遠離无上天尊設有疑惑當復問誰時有无量諸大聖衆眞人大仙道士男女官等及諸清信士清信女遇見天尊光者其身顫掉乃至大動不能自持心昏迷悶怳惚无寜爾時復有松靈眞人光妙眞人鬱羅眞人等百千萬人心得自在所作巳辨離諸煩惱調伏諸根如大龍王有大威德成就空慧逺得己利如栴檀林栴檀圍遶如師子王師子圍遶成就如是无量功德一切皆是天尊弟子各於晨朝日初岀時離常住處手執香罏遇天尊光明更相謂言我等冝速澡漱清淨作是言巳舉身毛竪不能自持涕泣盈目生大苦惱爲欲利益安樂衆生成就大乘第一空行顯發大道方便宻教爲不斷絶種種說法爲諸衆生調伏因縁故疾至天尊所稽首尊足圍繞百帀稽首恭敬却坐一靣爾時復有道士男官女官男職女職二十四職將領徒衆百千萬人等諸漏巳盡心得自在所作已辨離諸煩惱調伏諸根如大龍王有大威德成就空慧亦於晨朝日初岀時舉身毛竪涕泣盈目生大苦惱亦欲利益安樂衆生成就大乘第一空行顯發大道方便宻教爲不斷絶種種說法爲諸衆生調伏因縁故疾至尊所稽首尊足繞百千市稽首恭敬却坐一靣人中之龍位階十地安住不動方便現身其名曰大王納善眞人決理眞人最勝眞人妙思眞人大慧眞人而爲上首其心皆悉敬重大乘安住大乘深解大乘愛樂大乘守護大乘善能隨順一切世間作是誓言諸未度者當今得度巳於過世无數劫中修持淨戒善持所行解未解者紹三寳種使不斷絶於未來世當轉法輪以大莊嚴而自莊嚴成就如是无量功德等觀衆生如視一子亦於晨朝日初岀時遇天尊光時舉身毛竪涕泣盈目生大苦惱亦爲利益安樂衆生成就大乘第一空行顯發大道方便宻教爲不斷絶種種說法爲諸衆生調伏因縁故疾至尊所稽首尊足繞百千帀稽首恭敬却坐一靣爾時復有无量淸信士女受持五戒威儀具足其名曰威德干吉逺遊董雙成許飛瓊宛陵華等而爲上首深樂觀察諸對治門所謂苦樂常淨我无我寶不寳歸依非歸依衆生非衆生恒非恒安非安爲無爲斷不斷常不常如是觀察等法對治之門亦欲樂聞无上大乘如所聞已能爲他說善持淨戒渇仰大乘旣自充足復能充足餘渇仰者善能攝取无上智慧愛樂大乘守護大乘善能随順一切世間度未度者解未解者紹三寳種使不斷絶於未來世當轉法輪以大莊嚴而自莊嚴心常染味淸淨戒行悉能成就如是功德於諸衆生生大悲心平等无二如視一子亦於晨朝日初岀時爲欲莊嚴道敎人人各取香木萬束栴檀沉水牛頭栴檀天木香等是一一木文理及附皆有七寳微妙光明譬如種種雜綵畫飭以道力故有是妙色青黃赤白爲諸衆生之所樂見諸木皆以種種香塗鬰金沉水殳膠香等以諸華而爲莊嚴衆寳蓮華諸香木上懸五色幡柔軟微妙猶如天衣繡縠繒綵錦綺是諸香木載以寳車是諸寳車岀種種光青黄赤白轅輻皆以七寳厠塡是一一車駕以駟馬是一一馬駿疾如風一一車前建立五十七寳妙幢眞金羅網彌覆其上一一寳車復有五十微妙寳蓋一一車上乘諸華等青蓮華白蓮華紅蓮華金蓮華紺蓮華其華純以眞金爲葉金剛爲臺是華臺中多有黑蜂逰集其中歡娱受樂又岀妙音所謂無常苦空無我是音聲中說眞人本所道復有種種歌舞伎樂箏笛箜篌蕭瑟鼓吹是樂音中復岀是言苦哉苦哉世間虛空一一車前有善男子擎四寳案是諸案上有種種雜華及鬱金諸香及餘薰香微妙第一諸淸信士女若老若少各各運心爲天尊及徒衆辦諸食具種種備足皆是栴檀沉水香薪八味之水之所成熟甘食甘羙有六種味一苦二酢三甘四辛五鹹六淡復有三德一者輕軟二者淨潔三者如法作如是等種種莊嚴王元陽宫中以黄金徧敷其地繒綵衣物寳蓋以覆地上周偏一宫爲天尊徒衆敷置七寳師子之座其座髙大如玉京山是諸座上皆有寳帳垂諸瓔珞悉懸種種微妙幡蓋種種好香用塗其座復以種種名華以散座間諸淸信士女各作是念一切衆生若有飲食衣服頭目肢體隨其所須悉皆給與作是施時離欲瞋恚穢濁毒心无餘思願求世福樂唯志无上清淨法戒是清信士女等皆以安住眞人之道復作是念天尊今者受我食巳當向大羅上界捨離我等作是念巳身毛皆竪涕泣盈目生大苦惱各各賫持供養之具載以寳車香水幢幡寳蓋飲食並至尊所稽首尊足以其所持供養之具供養天尊圍遶百帀舉聲號泣哀動天地淚下如雨復相謂言苦哉仁者世間虛空便自舉身投天尊前而白尊言唯願天尊大慈大悲哀憐我等受我等施受我懴悔除我宿愆我等從无始世界百千萬劫來至于今日凢經无量生凢經无量死六慾枷鎻五隂𦆑縳貪愛恡惜惟知造罪不識大乘今籍天尊大乘光明業力各自呵貴自觀巳身如四毒蛇是身常爲无量諸蟲之所唼食是身臭穢貪欲獄縳是身可惡猶如死狗是身不淨九孔常流是身如城血肉筋骨皮𠂻其上手足以爲却敵楼櫓目爲察孔頭爲殿堂心王處中如是身城諸善眞仙之所棄捨凢夫愚人常所味著貪婬瞋恚愚癡羅刹止住其中是不堅固猶如蘆葦伊蘭水沬芭蕉之樹是身无常念念不住猶如電光卑水幻炎亦如畫水隨畫随合是身易壞猶如河岸臨峻之樹是身不久當爲狐狼鴟裊鵰鷲鳥鵲餓狗之所食噉惟有智者當樂此身寜以牛跡盛大海水不能具說是身无常不淨臭穢寜久大地使如棗等漸漸轉小猶華藶子乃至微塵不能具說是身過患是故當捨如棄涕唾以是因縁諸人士女以空无相无願之法常修其心深樂諮受大乘經典聞巳亦能爲他演說護持本願毁訾是身甚患猒不堅牢心常修集如是正觀破壞生死无際輪轉渇仰大乘旣自充足復能充足餘渇仰首深樂大乘守護大乘雖現是身實是眞仙等類善能随世間度未度者解未解者紹三寳種使不斷絶於未來世當轉法輪以大莊嚴而自莊嚴堅持禁戒皆悉成就如是功德於諸衆生生大悲心平等无二如視一子皆發是願㐲願天尊受我供施容我懴悔久住下界開度衆生授度經典得法益利莫捨我等向於上界譬如父母未象成就忽捨而去无所成就諸子孤劣貧窮失於覆廕天尊還於上方捨我等去亦復如是伏願天尊且住世間成就諸法覆廕我等如此諮請鳴𠰸頓悶大衆哀泣淚下盈目不能自止爾時天尊從其靣門岀種種光明其光明曜大衆大衆遇斯光巳即知是事傳相告語天尊今者現是瑞相不久必當反於上界所有供養之具宜施天尊及於大衆松靈眞人及大衆等知天尊放是種種光明非无因縁松靈眞人等默然良久天尊告松靈眞人汝等所奉施天尊及大衆今正是時天尊正爾當欲還上方第二第三亦復如是爾時松靈眞人等大衆聞此語巳舉聲號哭悲咽而言苦哉苦哉世間虛空復白大衆我等今者一切當共五體投地同聲勸諸天尊且住下界覆廕我等勿捨我去還於上方爾時天尊告松靈等莫大啼哭自亂各當觀是身猶如芭蕉熱時之炎水泡幻化乹闥婆城坏器電光亦如畫水臨死之囚熟果叚肉如織碓上下當觀諸行猶雜毒食有爲之法多諸過患於是松靈眞人復白天尊言尊不久住於下界我等云何而不啼哭苦哉苦哉世間虛空唯願天尊哀愍我等及諸衆生久住於下方勿返於上界天尊告松靈眞人汝今不應發如是哀憐我故久住於下方我以哀憐汝及一切是故今日欲還上界何以故諸尊法爾有爲亦然是故天尊而說偈言有爲之法其性无常生巳不住寂滅爲樂松靈眞人汝今當觀一切行新諸法無我無常不住此身多有无量過患猶如水泡是故汝今不應啼泣爾時松靈復白天尊言如是如是誠如尊敎雖知天尊方便示現欲還上方捨我等去我等不能不懷憂惱得自思惟復生慶恱天尊讃松靈善哉善哉能知天尊示同衆生方便去來諸法皆如幻相大聖在中以方便力无所染著何以故諸有教化隨方利益欲度脫衆生死老病苦悉皆當得不動果報常受安樂何以故我是衆生良福田故汝若復欲爲諸衆生作福田者速辦所施不冝久停爾時松靈爲諸衆生得度脫故低頭飮淚而白天尊言善哉善哉我若堪任爲福田時則能了知天尊還於上方及非還上方我等今者及諸眞人仙人等猶如蚊蚋實不能量天尊還於上方及非還上方爾時松靈眞人及其徒衆憂愁啼泣圍遶天尊燒香散花盡心敬奉尋與衆眞從座而去共辦食具松靈去後神洲赤懸三界内外地大震動一切衆生聞見知覺天尊還於上方是故此地大動時諸三界内外一切衆生聞是語巳身毛皆竪同聲哀泣而說偈言稽首調御師我等今勸請違離於人仙永无有救護尊今還上方我等没苦海悲戀懷憂惱如犢失其毋貧窮无救護猶如困病人无醫隨自心食所不應食衆生煩惱病常爲諸見害遠離法醫王服食邪毒藥是故大聖仙不應見遺捨如國無君主人民皆飢饉我等亦如是失廕及法味天尊還上方我等心迷亂如彼大地動迷失於諸方大仙向上界我等於今日云何不愁苦天尊見放捨猶如棄涕唾譬如日初岀光明甚暉炎旣能還自照亦滅一切暗天尊神通光能除我苦惱處在大衆中譬如玉京山天尊言譬如國王生育諸子心常愛念教以仁義忠孝悉令通曉然後聽之不意諸子所習不善王乃棄之天尊告松靈曰我今爲法敎誨汝等已具正見願莫放捨如其放捨則同王子矣天尊譬如有人善學諸論復於此論而生怖畏天尊亦爾通達諸法而於諸法復生怖畏若使天尊久住於世說甘露味充足一切如是衆生則不復畏墮於地獄天尊譬如有人初學作務爲官所收閉之囹圄有人問之汝受何事答言我今受大憂苦若其得脫則得安樂天尊亦爾爲我等故修諸苦行我等今者猶未得免生死苦惱云何天尊得受安樂天尊譬如醫王善解方藥偏以祕方教授其子不教其餘外受學者天尊亦爾獨以甚深袐宻之藏偏教老子遺棄我等不見顧愍天尊於法應无祕恡如彼醫王偏敎其子不敎外來諸受學者彼醫所以不能苦教情存勝負故有袐惜天尊之心終无勝負何故如是不見敎誨唯願久住莫向上方天尊譬如老少病苦之人捨逺夷途而行險道險道多難備受衆苦更有異人見而愍之即便示以平坦好路天尊我亦如是所言少者譬未增長法身之人所言老者譬重煩惱所言病苦譬未脫生死所言險道譬二十五有准願天尊示導我等甘露正道久住於世勿遠上方爾時天尊告諸法衆汝等莫如凢夫諸天人等愁憂啼哭當勤精進繫心正念時諸天人及大衆等聞天尊所說止不啼哭猶如有人喪其愛子殯送巳訖抑止不哭爾時天尊爲諸大衆說是偈言汝等當開意不應大愁苦大道法皆爾是故當嘿然樂不放逸行守心正憶念逺離諸非法自慰受歡樂復次松靈等若有疑惑今皆當問若空不空若常無常若苦不苦若依非依若去不去若歸非歸若恒非恒若斷非斷若衆生非衆生若有若无若實不實若眞不眞若滅不滅若宻不宻若二不二如是等種種法中有所疑者今應諮問我當隨順爲汝斷之亦當爲汝先說甘露然後乃當還於上方諸大衆等天尊岀世歎人身難得值道生信是事亦難能忍是亦復難成就禁戒具足无缺得无上道果是事亦難如求金玉衆寳妙華亦難離於八難得人身難汝等遇我不應空過我於徃昔種種苦行今得如是无上方便爲汝等故无量劫中捨身手足頭目髓腦是故汝等不應放逸汝等大衆云何莊嚴正法寳城具足種種功德珍寳戒定智慧以爲墻壍汝今遇是道法寳城不應取此虛僞之物譬如商主過眞寳城取諸瓦礫而便還家汝亦如是值遇寳城取虛僞物汝諸大衆勿以下心而生知足汝等今者雖得岀家於此大乘不生貪慕汝諸大衆身雖得服黃褐染衣心猶未染丸乘淨法汝諸大衆雖行乞食經歷多處初未曾求大乘法食汝諸大衆雖復大衆未爲正法除諸結縳汝諸大衆今當眞實敎勑汝等我今見在大衆和合法性眞實不倒是故汝等應當精進攝心勇猛摧諸結縳十方慧曰旣潜没巳汝等當爲无明所覆諸法衆等譬如大地諸山藥草爲衆生用我法亦爾出生妙善甘露法味而爲衆生種種煩惱病之良藥我今當令一切衆生及我諸子四部之衆悉皆安住袐宻藏中我亦復當安住是中入於上方何等名爲袐宻之藏猶如三際去來不斷何以故前際不去中際不住後際不來來无所從去无所至上中下亦復如是上不上中不中下不下去不去住不住諸法如是三法各異亦非向於上方汝等應如是觀時到當還上方爾時諸法衆聞天尊定向上方皆悉憂愁身毛爲竪涕淚交流稽首尊足繞无量帀白天尊言天尊妙說无常苦空无我天尊譬如一切衆生迹中鳥迹爲上是无常想亦復如是於諸想中最爲第一若有精勤修習之者能除一切欲界貪愛色无色愛无明驕慢及无常想天尊大聖若離無常想者今則不應向於上方若不離者云何説言修无常想離三界愛无明驕慢及无常想天尊譬如農夫於秋月時深耕其地能除穢草是无常想亦復如是能除一切欲界貪愛色无色愛无明驕慢及无常想天尊譬如耕田秋耕爲上如諸迹中鳥迹爲勝於諸想中无常爲最天尊譬如帝王知將升遐恩赦天下獄囚繫閉悉令得脱然後捨命天尊今者亦應如是度諸衆生一切无知无明繫閉皆令解脫然後向於上方我等今者皆未得度云何天尊便欲放捨向於上方天尊譬如有人爲鬼所持遇良呪師以呪力故便得除差天尊亦爾爲諸法衆除无明鬼令得安住大善福業譬如香鳥爲人所縳雖有良師不能禁制須絶羈鎻自恣而去我未如是脱五十七煩惱繫縛云何天尊便欲放捨向於上方天尊如人病瘧值遇良醫所苦得除我亦如是多諸患苦邪冷熱病雖遇天尊病未除愈未得无上去穩常樂云何天尊欲放捨向於上方天尊譬如醉人不自知不識親踈母女姊妹迷荒淫亂言語放逸卧不淨中時有良師與藥令服服巳即吐還自憶識心懐慙愧深自尅責酒爲不善諸惡根本若能除斷則遠衆罪天尊我亦如是往昔巳來轉輪生死情色所醉貪嗜王欲非母母想非姊姊想非女女想於非衆生生衆生想是故輪轉受生死苦如彼醉人卧不淨中天尊今當施我法藥令我還吐煩惱惡酒而來未得醒寤之心云何天尊便欲放捨向於上方天尊譬如有人歎芭蕉樹以爲堅實无有是處天尊衆生亦爾若歎我人衆生壽命養育知見作者受者是眞實者亦无是處我等如是修无我想天尊譬如漿滓无所復用是身亦爾无我无主天尊如七葉華无有香氣是身亦爾无我无主我等如是心常修習无我之想如尊所説一切諸法无我想汝諸法衆應當修習如是修己則除我慢離我慢巳便向上方天尊譬如鳥迹空中現者无有是處有能修習无我想者而有諸見亦無是處爾時天尊讃諸法衆善哉善哉汝等善能修无我想時諸法衆即白天尊我等不但修无我想亦更修習其餘諸想所謂苦想无常无我想天尊譬如人醉其心眩亂視諸山川城郭宫殿日月星辰皆悉廻轉天尊若有不修苦无常想无我等想如是之人不名爲聖多諸放逸流轉生死天尊以是因縁我等善修如是諸想爾時天尊告諸大衆言諦聽諦聽汝向所引醉人譬者但知文字未逹其義何等爲義如彼醉人見上日月實非迴轉生迴轉想衆生亦爾爲諸煩惱无明所覆生顛倒心我計无我常計无常淨計不浄樂計爲苦以爲煩惱之所覆故雖生此想不逹其義如彼醉人於非轉處而生轉想我者即是道義常者是法身義樂者上方義淨者是法義汝等法衆云何而言有我想者驕慢嗊嗃流轉生死汝等若我言亦修習无常苦无我等想是三種修无有寳義我今當説勝三修法苦者計樂樂者計苦是顛倒法无常計常常計无常是顛倒法无我計我我計无我是顛倒法不淨計浄淨計不尊是顛倒法有如是等四顛倒法是人不知正修諸法汝諸法衆於苦法中而生樂想於无常中而生常想於无我中而生我想於不浄中而生淨想世間亦有常樂我淨出世亦有常樂我淨世間法者有字无義出世間者有字有義何以故世間之法有四顛倒故不知義所以者何有想顛倒心倒見倒以三倒故世間之人樂中見苦常見无常我見无我淨見不淨是名顛倒以顛倒故世間知字而不知義何等爲義无我者即生死我者即天尊无常者聲聞縁教常者天尊法身苦者一切外道樂者即是上方不淨者即有爲法淨者諸天尊眞人所有正法是名不顚倒以不倒故知字知義若欲遠離四顛倒者應知如是常樂我淨時諸法衆復白天尊言如天尊所説離四倒者則得了知常樂我淨天尊今者永无四倒則巳了知常樂我淨若以了知常樂我淨何故不住一劫半劫教道我等令離四倒而見放捨欲向上方天尊若見顧念教勑我當至心頂受修習天尊若當向上方者我等云何與是毒身同共止住修於梵行我等亦當随天尊向於上方爾時天尊告諸法衆汝等不應作如是語我今所有无上正法悉以付囑老君是老君者當爲汝等作大指歸猶如天尊爲諸衆生作指歸處老君亦復如是當爲汝等作指歸處譬如大王多所統領若遊廵時悉以國事付囑大臣天尊亦爾所有正法亦以付囑老君汝等當知先所修智无常苦想非是眞實譬如春時有諸人等在大池浴乘船遊戲失琉璃寳珠没深水中是時諸人悉共入水求覔是寳競捉瓦石草木沙礫各各自謂得琉璃珠歡喜持岀乃知非眞是時寳珠猶在水中以珠力故水皆澄清於是大衆乃見寳珠故在水下猶如仰觀虛空月形是時衆中有一智人以方便力安徐入水即便得珠汝等法衆不應如是修習无常苦無我想不淨想等以爲實義如彼諸人各以瓦石草木沙礫而爲寳珠汝等應當善學方便在在處處常修我想常樂浄想復應當知先所修習四法相貌悉是顛倒欲得眞實修諸想者如彼智人巧出寳珠所謂我想常樂浄想爾時諸法衆白天尊言如天尊先説諸法无我汝當修學修學是巳則離我想離我想者則離驕慢離驕慢者得向上方是義云何天尊告諸法衆善哉善哉汝今善能諮問是義爲自斷疑譬如國王暗鈍少智有一醫師性復頑囂而王不別厚賜俸䘵療治衆病純以乳藥亦復不知病起根源雖知乳藥復不善解風泠熱病一切諸患悉教服乳是王不别是醫知乳好醜善惡復有明醫曉八種術善療衆病知諸方藥從遠方來是時舊醫不知諮受反生嗊嗃輕慢之心彼時明醫即便依附請以爲師諮受醫方袐奥之法語舊醫言我今請仁以爲師範唯願爲我宣暢解說當醫答言卿今若能爲我給便四十八年然後乃當教汝醫法時彼明醫即受其教我當如是我當如是随我所能常給走使是時舊醫即將客醫共入見王是時客醫即爲王説種種醫方及餘伎藝大王當知應善分别此法如是可以治國此法如是可以療病爾時國王聞是語巳方知舊醫癡暗无智即便驅逐令出國界然後倍復恭敬客醫是時客醫作是念言欲教王者今正是時即語王言大王於我實受念者當求一願王即答言從此右臂及餘身分随意所求一切相與彼客醫言王雖許我一切身分然我不敢多有所求今所求者願王宣令一切國内從今巳徃不得復服舊醫乳藥所以者何是藥毒害多傷損故若故照者當斬其首斷乳藥巳絡无復有横死之人常處安樂故求是願時王答言汝之所求蓋不足言尋爲宣令一切國內凢諸病人皆悉不聽以乳爲藥若爲藥者當斬其首爾時客醫和合衆樂謂辛苦鹹甜酢等味以療衆病无不得差其復不久王復得病即命是醫我今病困當云何治醫占王病應用乳藥尋白王言如王所患應當服乳我於先明所斷乳藥是非實語今若服者最能除病王今患熱正當服乳時王語醫汝今狂邪爲熱病乎而言服乳能除此病汝先言毒今云何服欲欺我邪先醫所讃汝言是毒令我驅遣今復言好最能除病如汝所言我本舊醫定爲勝汝是時客醫復語王言王今不應作如是語如蟲食木有成字者此蟲不知是字非字智人見之終不唱言是蟲解字亦不驚恠大王當知舊醫亦爾不別諸病悉與乳藥如彼蟲道偶得成字是先舊醫不解乳藥好醜善惡時王問言云何不解客醫答王是乳藥者亦是毒害亦是甘露云何是乳復名甘露若是乳牛不食酒糟滑草麥戮其犢調善放牧之處不在髙原亦不下濕飮以清水不令馳走不與犢牛同共一群飲食調適行住得所如是乳者能除諸病是則名爲甘露妙藥除是乳巳其餘一切皆名毒害爾時大王聞是語巳讃言大醫善哉善哉我從今日始知乳藥善惡好醜即便服之病得除愈尋時宣令一切國内從今巳徃當服乳藥國人聞之皆生瞋恨咸相謂言大王今者爲鬼所持爲是狂邪而誑我等復令服乳一切人民皆懐瞋恨悉集王所王言汝等不應於我而生瞋恨如此乳藥服與不服悉是醫敎非是我咎爾時大王及諸人民踊躍歡喜倍共恭敬供養是醫一切病者皆服乳藥病原闕太上靈寳元陽妙經卷之十終
